acceptance:
  - given: Generational 策略需要生成 summarization prompt
    when: Compress 執行
    then: 使用 dotprompt 從 .prompt 檔案載入 Handlebars template，而非 text/template
  - given: prompts/summarize.prompt 定義了 frontmatter（model, input schema）和 Handlebars body
    when: Compress Worker 載入 prompt
    then: 使用 DirStore 載入，變數透過 DataArgument.Input 傳入
  - given: prompt 需要 existingSummary 和 turns 變數
    when: 渲染 prompt
    then: renderedPrompt.Messages 產生正確的結構化訊息，可直接傳給 genai
  - given: 開發者想自訂 prompt
    when: 修改 prompts/summarize.prompt
    then: 不需改 Go 程式碼，只需修改 .prompt 檔案
