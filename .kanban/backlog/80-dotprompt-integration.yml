description: |
  將 Generational 壓縮策略的 prompt template 從 Go text/template 改為 Google dotprompt。

  dotprompt (github.com/google/dotprompt/go/dotprompt) 提供：
  - .prompt 檔案格式：YAML frontmatter + Handlebars template body
  - DirStore：從目錄載入 .prompt 檔案
  - 結構化渲染：產生 RenderedPrompt（Messages + Model + Config）
  - Picoschema：輕量的 input/output schema 定義

  變更範圍：
  1. go get github.com/google/dotprompt/go/dotprompt
  2. 建立 prompts/summarize.prompt（Handlebars 語法）
  3. 修改 compress.go：Generational.buildPrompt 改用 dotprompt 載入+渲染
  4. 修改 GenaiWorker：接收 RenderedPrompt.Messages 而非 raw string
  5. 移除 text/template 相關程式碼
  6. 更新測試

  .prompt 檔案範例：
  ```
  ---
  model: googleai/gemini-2.0-flash-lite
  input:
    schema:
      existingSummary?: string
      turns: string
  ---
  {{#if existingSummary}}
  Previous context summary:
  {{existingSummary}}

  {{/if}}
  Summarize the following conversation turns, preserving key information:
  {{turns}}
  ```
