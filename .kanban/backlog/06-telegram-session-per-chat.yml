title: "Telegram Bot：每個 chat ID 複用同一個 Session"
assignee: neokn
labels:
  - backend
  - core-logic
depends-on:
  - 05-session-persist-jsonl
history:
  - stage: backlog
    at: 2026-03-22T00:00:00+08:00
description: |
  前置依賴：卡 05（JSONLService）完成後才能實作本卡。

  目前 cmd/telegram 的 handler 對每則訊息都呼叫 sessionSvc.Create()，
  建立一個全新的 session。這意味著每則訊息都是孤立的對話，bot 完全
  沒有上下文記憶。

  本卡的目標：在卡 05 提供的持久化基礎上，讓同一個 Telegram chat ID
  的所有訊息複用同一個 session。

  實作策略：
  - 以 chat ID 作為 sessionID（或用穩定的 mapping）
  - handler 收到訊息時先呼叫 Get，若 session 存在則複用；若不存在則 Create
  - Get-or-create 邏輯需要 thread-safe（同一 chat 可能快速連發訊息）

tasks:
  - text: "在 runBot 中實作 get-or-create session 邏輯（以 chat ID 為 session key）"
    done: false
  - text: "確保 get-or-create 是 thread-safe（同一 chat ID 的並發訊息）"
    done: false
  - text: "更新 cmd/telegram 的 package doc，移除『每則訊息建立新 session』的說明"
    done: false
  - text: "整合測試：同一 chat ID 的連續訊息能讀到前輪的對話內容"
    done: false

acceptance:
  - given: "Telegram bot 已啟動，chat ID 12345 尚無歷史 session"
    when: "chat 12345 傳送第一則訊息"
    then: "bot 建立新 session，session ID 與 chat ID 有穩定對應關係，data/sessions/ 下出現對應 .jsonl 檔案"
  - given: "chat ID 12345 已有一個持久化 session（含至少一輪對話）"
    when: "同一 chat 傳送下一則訊息"
    then: "bot 複用現有 session（不建立新的），runner.Run 使用的 sessionID 與前一輪相同，舊對話內容對 LLM 可見"
  - given: "chat ID 12345 在 1 秒內連續傳送兩則訊息"
    when: "兩個 handler goroutine 同時呼叫 get-or-create"
    then: "兩則訊息都使用同一個 sessionID，data/sessions/ 下只有一個對應的 .jsonl 檔案（不產生重複檔案）"

completed-by: {}
