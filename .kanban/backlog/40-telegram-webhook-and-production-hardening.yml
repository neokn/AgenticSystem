history:
  - stage: backlog
    at: 2026-03-22T22:00:00+08:00
description: |
  Upgrade the Telegram Bot from MVP Long Polling to Webhook mode and add
  production-grade reliability features. This story improves capacity and
  operational quality — the feature already works after 10b; this story makes
  it production-ready.

  Scope:
  1. Webhook mode: register a public HTTPS endpoint with Telegram; handle
     incoming Update POSTs. Requires a publicly reachable URL (e.g. behind
     a reverse proxy or deployed to Cloud Run).
  2. Per-chat concurrency control: ensure messages from the same chat are
     processed sequentially (one goroutine per chat) to prevent out-of-order
     replies when a user sends messages quickly.
  3. Graceful shutdown: on SIGTERM, stop accepting new messages, wait for
     in-flight handlers to complete (deadline: 10s), then exit cleanly.
  4. Persistent SessionStore: replace the in-memory session map with a
     file-backed or SQLite-backed store so ADK session IDs survive restarts.
     (Architecture decision required: Jensen to advise on storage backend choice.)

  Trade-off deferred from 10b: Long Polling's ~1s latency and restart-lost
  sessions are acceptable for MVP but not for production.

  Note: this card carries the `architecture` label because the persistent
  session store backend choice (SQLite vs file vs Redis) requires architectural
  review before implementation begins.

