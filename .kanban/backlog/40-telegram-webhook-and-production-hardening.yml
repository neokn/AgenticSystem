acceptance:
  - given: "TELEGRAM_WEBHOOK_URL is set and the bot is running in webhook mode"
    when: "Telegram delivers an Update POST to the webhook endpoint"
    then: "The handler responds with HTTP 200 within 2 seconds and the user receives a reply"
  - given: "A user sends 5 messages in rapid succession (within 1 second) to the same chat"
    when: "All 5 messages are processed"
    then: "Replies arrive in the same order as the messages were sent; no reply is dropped"
  - given: "The bot is in the middle of processing a message when SIGTERM is received"
    when: "The process handles the signal"
    then: "The in-flight message completes and a reply is sent before the process exits; new messages are rejected after signal receipt; process exits with code 0 within 10 seconds"
  - given: "The bot has an active conversation (session) and is then restarted"
    when: "The user sends a new message after restart"
    then: "The bot resumes the same ADK session (same session ID) and context is preserved"
  - given: "TELEGRAM_WEBHOOK_URL is set to an invalid (non-HTTPS) URL"
    when: "The bot attempts to register the webhook with Telegram"
    then: "The process exits with a non-zero exit code and logs the Telegram API error response"

