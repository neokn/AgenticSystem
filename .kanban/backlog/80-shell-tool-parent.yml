      此卡已精煉並拆分為三張子卡：
        - 20a-shell-tool-adk-spike（Learning story：ADK 選型 + 安全模型設計，時限 2 工作天）
        - 20b-shell-tool-core-execution（Earning story：白名單內安全指令執行 + 輸出擷取）
        - 20c-shell-tool-human-approval-gate（Earning story：危險指令人工核准閘道）

      拆分策略：
        - Strategy 8（Split Learning from Earning）：20a 為 spike，產出決策文件而非功能
        - Strategy 4（Split by Examples of Usefulness）：20b 先交付安全指令場景，20c 再疊加危險指令監督

      交付順序：20a → 20b → 20c（20c depends-on 20b, 20b depends-on 20a）

      20b 可在沒有 20c 的情況下單獨上線（危險指令由白名單擋下），提供獨立業務價值。
