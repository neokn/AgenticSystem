description: |
  讓 agent 具備執行 shell 命令的能力，透過 ADK 的 Tool 機制
  註冊一個 shell execution tool，使 LLM 可以在對話中主動
  執行系統指令並取得結果。

  需要評估：
  - 安全性：沙盒、白名單、timeout、資源限制
  - ADK Tool 註冊方式（FunctionTool 或 MCP toolset）
  - 輸出處理：stdout/stderr 擷取、大輸出截斷
  - 使用者確認機制：危險指令是否需要人工核准
