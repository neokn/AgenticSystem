description: |
  在 Phase 1 的 agent tree 基礎設施之上，建立第一批可重用的 workflow patterns。
  這些 pattern 是通用骨架，不綁特定 domain——任何需要「多步驟」或「迭代」的任務都能套用。

  ─── 建構在 Phase 1 之上 ───

    Phase 1 提供：宣告式 agent tree + Root routing + session state + transfer/escalate
    Phase 2 提供：具體的 workflow pattern，用 ADK workflow agents 組合而成

    觸發/排程 → Root
                  ├─ （簡單）直接處理
                  ├─ （多步驟）→ Plan-Execute-Report pattern
                  └─ （迭代）  → Iterative Refinement pattern

  ─── Pattern 1: Plan-Execute-Report（SequentialAgent）───

    通用複雜任務骨架：

      SequentialAgent
        ├─ Planner   (LlmAgent) — 理解需求，擬定分步計畫，寫入 state
        ├─ Executor  (LlmAgent) — 讀取計畫，逐步執行，產出 artifacts
        └─ Reporter  (LlmAgent) — 彙整成果，總結回報

    state 流動：user_intent → plan → artifacts → summary
    適用場景：技術調研、程式重構、文件撰寫——任何「先想再做再報告」的任務

  ─── Pattern 2: Iterative Refinement（LoopAgent）───

    反覆逼近目標的迭代骨架：

      LoopAgent (max_iterations)
        └─ SequentialAgent
             ├─ Worker    (LlmAgent) — 執行任務，產出 draft
             └─ Evaluator (LlmAgent) — 檢查結果，判斷是否達標，寫 state 控制 loop 結束

    state 流動：draft → evaluation → (不滿意) → revised_draft → re-evaluation → ...
    結束條件：Evaluator 設定 escalate 或 state flag，或達到 max_iterations 安全上限
    適用場景：寫 code 跑測試、修潤文章、polling 等待——任何「做完檢查、不滿意就重來」的任務

  ─── 混合組合 ───

    兩個 pattern 可以嵌套使用：

      SequentialAgent (Plan-Execute-Report)
        ├─ Planner
        ├─ LoopAgent (Iterative Refinement)  ← Executor 階段用迭代
        │    └─ Sequential[Worker, Evaluator]
        └─ Reporter

    Phase 1 的宣告式 config 讓這種組合在設定檔中描述，不需要改 Go code。

  ─── 設計重點 ───

    - Workflow-specific state keys 建立在 Phase 1 的通用 state schema 之上
    - 每個 pattern 內的 agent 都是可替換的：換 prompt + tool 就變成不同 domain 的 workflow
    - Root 根據意圖分析決定啟動哪個 pattern（或不啟動，直接處理）
    - Pattern 定義在 config 中，作為可重用的 template
