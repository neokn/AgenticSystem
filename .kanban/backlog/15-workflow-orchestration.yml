description: |
  引入 ADK Workflow Agents，讓 Root 可以觸發多步驟任務流程。

  新增兩個通用 workflow pattern：

  1. Plan-Execute-Report (SequentialAgent)
     通用複雜任務骨架：理解需求 → 擬定計畫 → 執行 → 總結回報
     適用：技術調研、程式重構、文件撰寫等任何多步驟任務

  2. Iterative Refinement (LoopAgent, max_iterations)
     執行 → 檢查結果 → 不滿意就修正 → 重複
     適用：寫 code 跑測試、寫文章修潤、等 API 完成（polling）

  設計重點：
    - State Layer：定義通用 state keys（user_intent, plan, artifacts, evaluation...）
    - 每個 agent 像純函數：讀 state → 做事 → 寫 state
    - Workflow pattern 是可重用的，不限特定 domain
