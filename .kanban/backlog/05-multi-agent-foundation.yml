description: |
  將現有單一 LlmAgent 演進為完整的 agentic system 基礎架構。
  核心概念：清楚的 Root 入口，加上可組合的 agent tree，
  讓任務在閉環 loop 中反覆「感知 → 決策 → 行動」直到達成目標。

  ─── 三層架構 ───

    觸發層（Trigger）
      排程 / Webhook / 使用者請求 → 喚醒 Root

    Root Agent（LlmAgent — 系統唯一入口）
      接住所有觸發，判斷意圖，決定啟動哪個 workflow 或直接處理。
      簡單請求自己完成，複雜任務 transfer 給 workflow / sub-agent。

    Workflow + Agent 層（可組合的 ADK agent types）
      ├─ SequentialAgent  — 固定步驟的多階段任務
      ├─ LoopAgent        — 反覆逼近目標的迭代任務
      ├─ ParallelAgent    — 併行多分支後彙整
      └─ LlmAgent         — 末端具體執行者（掛 tool / MCP toolset）

  ─── 兩層 Loop ───

    1. Task-level agentic loop（ADK LlmAgent 內建）
       每次任務內：read state → think → call tools/sub-agents → update state → 判斷完成
       生命週期跟著任務走，達成條件或安全上限就結束。

    2. System-level heartbeat（排程器週期性喚醒 Root）
       每次喚醒開一輪新任務，跑完就結束，等下次觸發。
       保證長期使命必達，不依賴永駐 process。

  ─── 設計原則 ───

    - Agent tree 由設定檔宣告式描述，不 hard-wire 在 Go code 裡
    - 每個 agent 像純函數：讀 state → 做事 → 寫 state，透過 session state 溝通
    - Workflow pattern 是通用骨架，不綁特定 domain（具體 pattern 見 Phase 2）
    - Root 透過 transfer/escalate 與 sub-agent 雙向流動
    - 善用 ADK agent types：LlmAgent、SequentialAgent、LoopAgent、ParallelAgent

  ─── 本階段範圍 ───

    Phase 1 聚焦「基礎設施」：讓 agent tree 可以被宣告、建構、運行。
    不包含具體的 specialist 或 workflow pattern（那是 Phase 2-4 的事）。
    驗收標準：Root 能載入 config → 遞迴建構 agent tree → transfer/escalate 正常運作。

  ─── 心智模型 ───

    先畫出：觸發/排程 → Root → 各種 workflow → 末端 sub-agent 的樹狀架構。
    再決定：哪些地方需要「反覆靠近目標」就放 task-level loop，
    哪些需要「長期自我維護」就用 heartbeat 不斷重啟 Root。
    兩層 loop 共同保證任務使命必達。
