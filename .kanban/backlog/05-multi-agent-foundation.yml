description: |
  將現有單一 LlmAgent 架構演進為 Root + Specialist Agents 樹狀結構。
  Root Agent（現有 demo_agent 演進）作為萬能私人助理的大腦，
  能判斷意圖後 transfer 到 specialist agent，specialist 完成後 escalate 回 Root。

  目標架構：
    Root Agent (LlmAgent — 私人助理大腦)
      ├─ shell_agent   (LlmAgent — 系統操作/指令執行)
      ├─ coder_agent   (LlmAgent — 程式碼理解/修改)
      └─ search_agent  (LlmAgent — 知識檢索，掛 Weaviate tool)

  設計原則：
    - Root 自己能處理簡單對話，只在需要專業能力時 transfer
    - 每個 specialist 只掛自己需要的 tool，降低 tool selection 複雜度
    - Agent tree 由設定檔描述，不 hard-wire 在 Go code 裡
    - ADK v1.0.0 的 llmagent.Config.SubAgents + agent transfer 機制

  關鍵改動：
    - 升級 go.mod → ADK v1.0.0
    - 設計 agent tree 設定檔格式
    - 改造 agentdef 支援載入多個 agent prompt
    - 改造 appwire 建構 agent tree
    - 撰寫 root/shell/coder/search agent 的 prompt
    - Tool 拆分到各自的 specialist
