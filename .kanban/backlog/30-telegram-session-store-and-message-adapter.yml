title: "Telegram Session Store and Message Adapter"
assignee: ""
labels:
  - backend
  - integration
history:
  - stage: backlog
    at: 2026-03-22T22:00:00+08:00
description: |
  Implement two foundational components required by the Telegram Bot integration,
  with no dependency on any live Telegram connection:

  1. SessionStore: maps Telegram chat IDs to ADK session IDs. Persists the
     mapping in-memory (with a documented interface so a persistent backend can
     be swapped in later). Each unique chat ID gets exactly one ADK session for
     the lifetime of the process.

  2. MessageAdapter: converts a Telegram message text into a *genai.Content
     (genai.RoleUser) suitable for runner.Run, and converts the agent's plain-text
     response back to a Telegram-safe string (stripping unsupported markdown
     that would cause Telegram parse errors).

  Both components must be unit-testable in isolation using table-driven tests.
  No Telegram Bot API dependency is required in this story — just the adapter
  interface and the session store.

  Value: unblocks story 10b; provides a tested, mockable boundary between
  Telegram protocol concerns and ADK concerns.

  Trade-off: the SessionStore is in-memory only — data is lost on restart.
  Persistent storage is deferred to a follow-up story.

