  - text: "Implement MessageAdapter: agent response text -> Telegram-safe string"
    done: false
  - text: "Table-driven unit tests for SessionStore (new chat ID, existing chat ID, concurrent access)"
    done: false
  - text: "Table-driven unit tests for MessageAdapter (plain text, markdown edge cases)"
    done: false

acceptance:
  - given: "A SessionStore is initialized and a Telegram chat ID has never been seen before"
    when: "GetOrCreate(chatID) is called"
    then: "A new ADK session ID is returned and stored; a second call with the same chatID returns the identical session ID"
  - given: "Two goroutines simultaneously call GetOrCreate with different chat IDs"
    when: "Both calls complete"
    then: "Each goroutine receives its own distinct session ID; no data race is detected (go test -race passes)"
  - given: "A Telegram message text of 'Hello!' is passed to the MessageAdapter"
    when: "ToGenaiContent(text) is called"
    then: "The returned *genai.Content has Role == genai.RoleUser and Parts[0].Text == 'Hello!'"
  - given: "An agent response containing Telegram-unsupported markdown (e.g. triple-backtick code blocks)"
    when: "ToTelegramText(response) is called"
    then: "The returned string contains no triple-backtick sequences and the semantic content is preserved"
  - given: "An empty string is passed to ToGenaiContent"
    when: "ToGenaiContent('') is called"
    then: "An error is returned (empty message is rejected before reaching the ADK runner)"

