description: |
  時限制 spike（learning story）：調研 ADK FunctionTool vs MCP toolset 的差異，
  並決定 shell execution tool 的註冊方式與安全模型設計。

  交付物（不是功能，是決策文件）：
  - ADK tool 選型結論（FunctionTool 或 MCP toolset，含理由）
  - 安全模型草案：允許指令白名單規則、timeout 上限、資源限制策略
  - 使用者確認機制的範圍定義（哪類指令需要人工核准）

  價值：讓後續實作卡（20b、20c）可以在確定的技術決策上動工，避免回頭重構。

  時限：2 個工作天。超過時限仍未有結論，立即升級討論。

acceptance:
  - given: spike 時限到期
    when: 產出 ADK tool 選型結論文件
    then: 文件明確說明選擇 FunctionTool 或 MCP toolset，並列出至少 2 條支持理由，以及與 Google ADK Go v0.6 API 的對應呼叫方式
  - given: spike 時限到期
    when: 產出安全模型草案
    then: 草案包含：(1) timeout 數值（毫秒）、(2) 至少 5 條白名單規則或拒絕模式、(3) 是否採用 OS-level 沙盒的明確結論
  - given: spike 時限到期
    when: 產出使用者確認機制範圍文件
    then: 文件列出「需要人工核准」的指令分類，以及判斷條件（例如：rm -rf、sudo 開頭等），stakeholder 可根據此文件決定是否繼續 20c
  - given: spike 超過 2 個工作天仍無結論
    when: 觸發時限
    then: 卡片標記 blocked，並記錄目前已知資訊與阻塞原因，不得靜默延期
  - given: 選型結論文件完成
    when: 選擇了 ADK 目前版本不支援的 API
    then: 文件必須標注該 API 的版本要求，並提出降級方案

