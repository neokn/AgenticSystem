  - author: jobs
    at: "2026-03-22T04:24:43+00:00"
    text: |
      ## Code Review by Jobs

      **Overall Assessment:** LGTM WITH COMMENTS
      **Code Health Impact:** Improves

      ---

      ### Critical Issues (Must Fix)

      None.

      ---

      ### Should Fix

      **1. `cmd/agent/main.go:185-189` — Duplicate `genai.Client` creation**

      A second `*genai.Client` is created inside `runDemo` solely for `gemini.NewModel`. The same `genaiClient` constructed in Step 1 is passed to `NewMemoryPlugin` (correct, per ADR-0003), but a brand-new client is constructed again on line 185:

      ```go
      llmModel, err := gemini.NewModel(ctx, profile.ModelID, &genai.ClientConfig{
          APIKey: apiKey,
      })
      ```

      ADR-0003 explicitly states: "The same *genai.Client that the caller creates for the main gemini.NewModel() call is passed to NewMemoryPlugin — one client, one connection." This violates the consequence "One genai.Client connection for the whole process." Two separate TCP connections are opened for the same API key. The first `genaiClient` should be passed to `gemini.NewModel` as well (if the ADK model constructor accepts a pre-built client) or, at minimum, the `ClientConfig` should be constructed once and reused rather than duplicated.

      If `gemini.NewModel` does not accept a pre-built `*genai.Client` and always creates its own internally, add a code comment here explicitly noting why a second `ClientConfig` is required, so future readers do not assume ADR-0003 is violated unintentionally.

      **2. `cmd/agent/main.go:95-113` — `formatMetrics` float format: `%f` vs. spec requirement of 6 decimal places**

      The spec (acceptance criterion AC5) says `compress_cost_usd` must have "6 decimal places". The code uses `fmt.Sprintf("%f", ...)` for both `usage_ratio_curve` values and `compress_cost_usd`. In Go, `%f` defaults to 6 decimal places, which technically satisfies the spec. However, the test at line 165 checks for `"0.123457"` (6 places via rounding), confirming `%f` is the intended verb.

      The issue: `%f` for `usage_ratio_curve` values also produces 6 decimal places (e.g. `0.120000`), whereas the spec example shows `0.12,0.24,...,0.81` — i.e., minimal decimal places. This is a spec/implementation mismatch in presentation. The test at line 132 enforces `"0.120000,0.240000,0.480000"`, which means the test and code are consistent, but the spec example and the test disagree. Before finalising, confirm with Jules/James whether the spec example was illustrative or prescriptive. If it was illustrative, add a comment to `formatMetrics` stating that trailing zeros are intentional for uniform precision.

      **3. `cmd/agent/main.go:303` — `compressCostUSD` is always 0.0**

      The comment says "full cost calculation is out of scope for MVP", and `CompressResult.Cost` is always `0` in compress.go line 207. However, the metrics field `compress_cost_usd` is part of the acceptance criteria (AC5). The spec metrics table lists `compress_cost` as a Counter($). Having a permanently-zero metric that is part of the published interface can mislead operators. The comment in the code is correct, but there is no corresponding comment in the metrics output itself to indicate the value is not yet computed. Consider either printing `compress_cost_usd: N/A (not yet implemented)` or adding an inline comment in the output header. A one-line code comment is the minimum bar here.

      ---

      ### Nit

      **4. `cmd/agent/main.go:284-286` — OOM fallback response is printed regardless of whether the runner already emitted an OOMWarning to stderr**

      The OOM warning is written to `errOutput` at line 274. The fallback `responseText` override at line 285 writes `[OOM] Context window exhausted...` to `output` (stdout). This is correct Level 3 behaviour. A small nit: the two messages are slightly different in wording ("context window exhausted, please start a new conversation" vs. "Context window exhausted. Please start a new conversation."). Unifying the capitalisation and punctuation avoids user confusion when both streams are read together.

      **5. `cmd/agent/main.go:205` — `userID` and `appName` are module-level magic strings, not constants**

      Nit: `appName := "demo_agent_app"` and `userID := "demo_user"` are inline string literals. Promoting them to `const` at the top of the function or package level would make it clear they are intentional fixed values and not accidental duplication.

      **6. `cmd/agent/main_test.go:193` — test name does not match test function name**

      Nit: The function is named `Test_should_assemble_memory_layout_with_default_config` but the comment above it says "should_assemble_memory_plugin_dependencies". Minor — the comment is from an earlier iteration and was not updated.

      **7. `cmd/agent/main_test.go:278-300` — `Test_should_print_metrics_to_writer` tests `formatMetrics` indirectly**

      Nit: This test manually calls `fmt.Fprint(&buf, content)` where `content` was already produced by `formatMetrics`. The test is effectively retesting `formatMetrics` through a `fmt.Fprint` pass-through. There is no testable `printMetrics` function in main.go — the metrics printing is inlined in `runDemo`. The test is not wrong (it exercises the content, not the writer path), but the test comment says "printMetrics writes to an io.Writer correctly" which implies a function that does not exist. Either rename the test to `Test_should_format_and_buffer_metrics` or extract a `printMetrics(w io.Writer, content string)` helper in main.go so the test description matches what is being tested.

      ---

      ### Good Things

      - **Exemplary ADR-0003 compliance on the primary path.** Passing `genaiClient` to both `NewMemoryPlugin` and `NewGenaiWorker` demonstrates the correct "one client" intent; the issue noted in Should-Fix #1 is about the secondary `gemini.NewModel` call, not the core DI wiring.
      - **`runDemo` extraction for testability** is exactly right. Separating the conversation loop from `main()` means tests can call it with injected `io.Reader`/`io.Writer` without `os.Exit` side effects.
      - **Fail-fast API key check** is clean and placed correctly before flag parsing. The error message "GEMINI_API_KEY is not set" is an exact match to the acceptance criterion.
      - **Two-client genai struct design** (`genaiAPICounter` wrapping `*genai.Client`) demonstrates good interface segregation — the `apiTokenCounter` interface keeps `MemoryPlugin` testable without a live network.
      - **Context threading.** `context.Background()` passed all the way through `runDemo` rather than calling `context.Background()` inside each callback is clean. The BeforeModelCallback uses `context.Background()` internally (a known limitation of ADK not exposing ctx through CallbackContext), which is correctly documented.
      - **Conversation loop** handles EOF, empty lines, and turn limits cleanly with no off-by-one risk.
      - **Test quality is high.** 13 unit tests, AAA structure, no logic in assertions, descriptive scenario names, appropriate boundary values (nil curve, empty curve, 6-decimal precision, 2000-token OOM window). Judge already verified race detector and go vet — no issues found.
      - **`buildOOMTestProfile` as a package-level function** makes the OOM scenario reusable from tests without repeating the magic value `2000` in multiple places.

      ---

      ### Code Smells Detected

      | Smell | Location | Severity | Treatment |
      |-------|----------|----------|-----------|
      | Duplicate Literal | `main.go:141,185` — `GEMINI_API_KEY` env var read twice, `ClientConfig` constructed twice | NIT | Extract a `buildClientConfig(apiKey string) *genai.ClientConfig` helper or reuse the first `*genai.Client` |
      | Dead Comment | `main_test.go:191` — stale comment "should_assemble_memory_plugin_dependencies" | NIT | Update comment to match function name |
      | Speculative Field | `main.go:303` — `compressCostUSD` always 0.0, no in-output annotation | NIT | Add output comment or TODO |

      ---

      ### Recommended Next Steps

      1. **Resolve the dual-client question (Should-Fix #1):** Check whether `gemini.NewModel` accepts a pre-existing `*genai.Client`. If yes, pass `genaiClient`. If no, add an explanatory comment referencing ADR-0003 so the intent is clear.
      2. **Clarify the `usage_ratio_curve` format question (Should-Fix #2):** Confirm with Jules whether the spec example values (`0.12,0.24`) were illustrative. If `%f` (6 decimal places) is the agreed format, add a comment. If minimal decimals are required, switch to `%g`.
      3. **Add a TODO for `compress_cost_usd` (Should-Fix #3):** One line in `formatMetrics` or `runDemo` noting it is not yet computed.
      4. Fix the stale test comment (Nit #6) — one-line change.
      5. Rename or refactor `Test_should_print_metrics_to_writer` (Nit #7) to match its actual behaviour.

      This is the final sprint card. The system assembles correctly, all 7 components are wired per ADR-0003, the fail-fast and OOM paths work, and the test suite is solid. The issues above are polish items, not blockers. LGTM WITH COMMENTS.
