description: |
  Design the target Explicit Architecture (Hexagonal / Ports & Adapters / Clean Architecture)
  for the project before any code moves. This story produces three artefacts:

  1. A dependency map of the current internal/ packages (who imports whom)
  2. The target directory structure showing four layers:
       internal/domain/   — pure logic, zero external deps
       internal/app/      — use case orchestration, assembly (appwire)
       internal/infra/    — ADK adapters, Gemini, MCP, sessionstore, shelltool, memory
       cmd/               — thin entrypoints (CLI, Telegram, Web)
  3. Port interface definitions (Go interfaces) that domain uses to call out to
     infrastructure, without importing infrastructure packages:
       - AgentLoader    (load agent definition from dotprompt)
       - SessionStore   (alias for adk/session.Service — already an interface)
       - ToolProvider   (provide []tool.Tool and []tool.Toolset from config)
       - MemoryService  (compress strategy + plugin lifecycle)
  4. An ADR document (docs/adr/NNNN-explicit-architecture.md) recording the
     decision, rationale, layer boundaries, and dependency direction rule:
       Interface -> Application -> Domain <- Infrastructure

  This is a DESIGN-ONLY story. No package directories are moved. No imports change.
  The ADR and port interface file serve as the contract that card 01b implements.

  Value: Jensen can review and approve the architecture before any code changes land.
  Subsequent multi-agent cards (05, 15, 20) depend on these layer contracts.
acceptance:
  - given: The current internal/ packages have no documented layer boundaries
    when: The dependency map is produced
    then: Every package in internal/ is assigned to exactly one of domain/app/infra, and the map has no cycle from domain to infra (verifiable by reading the map)
  - given: The target directory structure is agreed
    when: The port interfaces file is reviewed
    then: All four port interfaces are defined as Go interfaces in a file that imports only stdlib and adk/session (no genai, no MCP SDK, no dotprompt), and each interface method signature matches the corresponding adapter that will implement it in 01b
  - given: The ADR document is written
    when: It is reviewed in docs/adr/
    then: The ADR states the four layers, names each existing package and its target layer, and specifies the no-reverse-dependency rule as a testable constraint (i.e., "no file in internal/domain/ may import internal/infra/")
  - given: Port interfaces are defined
    when: A Go file containing only the interfaces is compiled (go build ./...)
    then: Build passes with zero errors and zero new external dependencies added to go.mod
  - given: The ADR is absent or the port interface file has outbound infra imports
    when: Jensen reviews the refined card
    then: Jensen routes the card back to backlog with a comment listing the gaps
architecture:
  component: AgenticSystem Core
  layer: Domain Layer (ports.go) + Application Layer (app/ports.go)
  pattern: Ports and Adapters (Hexagonal Architecture)
  boundary: |
    Driving adapters: cmd/agent, cmd/telegram, cmd/web (all drive through internal/app/appwire)
    Ports (interfaces the core defines):
      - domain.AgentLoader — Load(baseDir, name string) (*AgentDefinition, error)
        lives in internal/domain/ports.go; pure stdlib, zero external deps
      - app.ToolProvider — Tools(cfg *domain.MCPConfig) ([]tool.Tool, []tool.Toolset, error)
        lives in internal/app/ports.go; references adk/tool return types (cannot be in domain)
      - session.Service (adk) — already a Go interface; used directly as a port in app/appwire
    Driven adapters (implement ports, live in internal/infra/):
      - agentdef.Loader implements domain.AgentLoader
      - A new mcp adapter implements app.ToolProvider (wrapping mcpconfig + mcptoolset)
  notes: |
    Key architecture decisions made by Jensen:

    1. TOOLPROVIDER SPLIT: ToolProvider cannot live in internal/domain/ because its
       return type references google.golang.org/adk/tool. It lives in internal/app/ports.go
       instead. Its input type (*domain.MCPConfig) is still owned by the domain layer.
       This is the correct placement — the Application Layer is permitted to reference
       ADK framework types; the Domain Layer must not.

    2. MCPCONFIG PLACEMENT: mcpconfig belongs in internal/infra/ (not internal/app/).
       It reads from the filesystem (external I/O = infrastructure). The domain layer
       owns the config data types (domain.MCPConfig, domain.MCPServerConfig) as pure
       structs. The infra adapter will translate mcpconfig.MCPConfig -> domain.MCPConfig.

    3. MEMORYSERVICE DEFERRED: MemoryService is not defined as a port in this card.
       memory.MemoryPlugin is a concrete infra type; appwire (app layer) is permitted
       to import it directly as an infrastructure dependency injected during assembly.
       Whether to introduce a MemoryService port is deferred to card 05.

    4. SESSION.SERVICE IS THE PORT: adk/session.Service is already a Go interface.
       No wrapper port is needed. This is explicitly noted in the ADR.

    5. DEBUGPLUGIN EXTRACTION: The 70-line debug plugin inline in appwire/wire.go
       must be extracted to internal/infra/debugplugin/. Card 01b implements this.
       appwire must contain only assembly logic after the migration.

    6. AGENTDEF DUAL RESPONSIBILITY: agentdef/ has both Load() (infra loader) and
       InstructionOverridePlugin() (infra ADK adapter). Both stay in internal/infra/agentdef/
       after migration — no split needed. Both are infrastructure concerns.

    Dependency direction rule (testable CI constraint, see ADR-0009):
      internal/domain/ MUST NOT import: internal/infra/*, internal/app/*,
        google.golang.org/adk, google.golang.org/genai,
        github.com/google/dotprompt, github.com/modelcontextprotocol/go-sdk

    Multi-agent readiness:
      Phase 1 (Root + SubAgents): AgentLoader port supports multiple agent loads
        with different name args. No new ports needed.
      Phase 2 (Workflow agents): internal/app/ provides a clean home for
        workflow orchestration logic (e.g. internal/app/workflow/).
