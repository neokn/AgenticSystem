comments:
  - author: jules
    at: 2026-03-23T10:00:00+08:00
    text: |
      Split from parent card 01-explicit-architecture-restructure using
      "Split Learning from Earning" (strategy 8) and "Split by Examples of
      Usefulness" (strategy 4).

      This card (01a) is the learning/design story. It produces the dependency
      map, port interfaces, and ADR that card 01b uses as its specification.
      No package directories are moved here — Jensen can approve the architecture
      before any code changes land.

      Key observations from codebase analysis:
      - appwire/wire.go currently does both assembly AND inline business logic
        (the 70-line debug plugin is defined inline — this must move to infra/).
      - shelltool already documents itself as "Infrastructure / Driven Adapter"
        but lives flat in internal/shelltool — it just needs to move.
      - mcpconfig has zero ADK/genai deps (pure stdlib) — it belongs in infra/
        as a configuration loader, or possibly app/ since it drives assembly.
      - memory/ has direct genai and ADK plugin imports — clearly infra/.
      - sessionstore/ implements adk/session.Service — clearly infra/.
      - agentdef/ has dotprompt import — infra/ (it adapts an external format).
      - adk/session.Service is already a Go interface, so no new SessionStore
        port interface is needed; it IS the port.

      The port interfaces worth defining explicitly:
        - AgentLoader: Load(baseDir, name string) (*AgentDefinition, error)
          Abstracts dotprompt away from the app layer.
        - ToolProvider: Tools(cfg MCPConfig) ([]tool.Tool, []tool.Toolset, error)
          Abstracts MCP subprocess launch away from assembly.
        - (MemoryService may remain concrete in app layer for now — revisit in 05.)

      Dependency direction to enforce after 01b:
        cmd/* -> internal/app/ -> internal/domain/ <- internal/infra/
        internal/app/ may import adk/runner, adk/session (framework interfaces).
        internal/domain/ must not import anything outside stdlib.
