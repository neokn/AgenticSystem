description: '最小可行版本：讓 LLM 可以執行 shell 指令並取得結果。


  MVP 簡化：

  - 用 ADK FunctionTool 註冊（最直接的方式）

  - 不做白名單、不做人工核准

  - 有 timeout（30 秒）防止 hang

  - 輸出截斷（8192 bytes）防止爆 context

  - 安全機制留給後續卡片


  交付：一個可被 LLM 主動呼叫的 shell tool，註冊到 LLMAgent。

  '
architecture:
  component: ShellTool
  layer: Infrastructure
  pattern: none — functiontool.New generic constructor handles the Tool interface
    boilerplate; no additional pattern warranted for a single handler
  boundary: 'Port (implied): func(tool.Context, ShellInput) (ShellOutput, error)

    Adapter: internal/shelltool package — wraps os/exec, implements the handler function

    Wiring site: wherever llmagent.New is called, pass functiontool.New(cfg, shelltool.Handler)
    into llmagent.Config.Tools

    '
  notes: "ADK FunctionTool API (google.golang.org/adk/tool/functiontool v0.6.0):\n\
    \n  tool, err := functiontool.New(functiontool.Config{\n      Name:          \
    \      \"shell_exec\",\n      Description:        \"Execute a shell command and\
    \ return stdout and exit code.\",\n      RequireConfirmation: false,\n  }, shelltool.Handler)\n\
    \nHandler signature required by functiontool.New[TArgs, TResults]:\n  type ShellInput\
    \ struct {\n      Command string `json:\"command\"`\n  }\n  type ShellOutput struct\
    \ {\n      Stdout   string `json:\"stdout\"`\n      ExitCode int    `json:\"exit_code\"\
    `\n      Error    string `json:\"error,omitempty\"`\n  }\n  func Handler(ctx tool.Context,\
    \ input ShellInput) (ShellOutput, error) { ... }\n\nThe input struct MUST be a\
    \ struct or map (not a primitive) — enforced by\nfunctiontool.New at construction\
    \ time.\n\nTimeout: use context.WithTimeout(ctx, 30*time.Second) derived from\
    \ tool.Context.\nOutput truncation: after CombinedOutput(), if len(out) > 8192,\
    \ truncate and\nappend \" [output truncated]\".\n\nTArgs/TResults JSON Schema\
    \ is auto-inferred from the struct types via\ngithub.com/google/jsonschema-go\
    \ — no manual InputSchema/OutputSchema needed.\n\nWire into LLMAgent:\n  a, err\
    \ := llmagent.New(llmagent.Config{\n      ...\n      Tools: []tool.Tool{shellTool},\n\
    \  })\n\nADR: docs/adr/0006-shell-tool-mvp-functiontool-adapter.md\n"
