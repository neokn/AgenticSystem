  text: "Architecture decision: Infrastructure / Driven Adapter.\n\nThe shell tool\
    \ is an adapter that wraps os/exec and exposes it through the\ncontract implied\
    \ by ADK's FunctionTool mechanism. It belongs in\ninternal/shelltool — not in\
    \ cmd/ — so the handler is independently testable\nand reusable across multiple\
    \ entrypoints.\n\nKey API facts verified against google.golang.org/adk v0.6.0\
    \ source:\n- functiontool.New[TArgs, TResults](cfg Config, handler Func[TArgs,\
    \ TResults])\n  requires TArgs to be a struct or map; JSON Schema is auto-inferred.\n\
    - RequireConfirmation: false is the explicit MVP choice (no approval gate).\n\
    - The returned tool.Tool is passed directly to llmagent.Config.Tools []tool.Tool.\n\
    - context.WithTimeout should be derived from tool.Context (which embeds\n  agent.CallbackContext)\
    \ for the 30s execution limit.\n\nADR filed at docs/adr/0006-shell-tool-mvp-functiontool-adapter.md.\n\
    \nAccepted MVP risk: no command sanitization. Shell injection is possible\nsince\
    \ the LLM constructs the command string. Document and address in a\nfollow-up\
    \ security card.\n"
