- author: jobs
  at: '2026-03-22T14:00:00+08:00'
  text: '## Code Review by Jobs


    **Overall Assessment:** LGTM WITH COMMENTS

    **Code Health Impact:** Improves


    ### Critical Issues (Must Fix)

    None.


    ### Should Fix


    - `internal/shelltool/tool.go:93-101` — `isExitError` is a Lazy Class / dispensable
    helper. It wraps a single `errors.As` call, adds no logic, and forces the reader
    to jump out of the error-handling block to understand what is happening. Inline
    it directly at the call site using the idiomatic `errors.As` pattern. The current
    double-pointer indirection is harder to read than the standard form it wraps.


    - `cmd/agent/main.go:163-166` and `cmd/web/main.go:68-70` — TEMP comment (`//
    TEMP: shrink context window...`) is alive in both entrypoints. TEMP comments are
    not a substitute for a follow-up task. Either remove the hack now or file a card
    and reference its ID in the comment. This is pre-existing but the shell-tool wiring
    landed in the same functions, so worth calling out.


    ### Nit


    - `internal/shelltool/tool_test.go:90-94` — `max(a, b int)` replicates the built-in
    `max` added in Go 1.21. If the module go directive is >= 1.21, delete this function
    and use the built-in directly.


    - `internal/shelltool/tool.go:56` — The tool description in both wiring sites
    says "Execute a shell command" without specifying which shell. Consider mentioning
    `sh -c` in the `Description` field of `functiontool.Config` so the LLM knows exactly
    what interpreter it is targeting.


    - `internal/shelltool/tool.go:27` — `truncationMarker` is unexported while `MaxOutputBytes`
    is exported. The asymmetry is minor but slightly inconsistent. Consider exporting
    `TruncationMarker` so test assertions can reference the constant rather than a
    string literal.


    ### Good Things


    - The split between `Handler(ctx context.Context, ...)` and `ToolHandlerFunc(ctx
    tool.Context, ...)` is an excellent testability decision. The inner handler is
    exercisable with a plain `context.Context` in unit tests, completely decoupled
    from ADK runtime types. This is the right pattern.


    - Error handling is precise: `exec.ExitError` (non-zero exit) is cleanly distinguished
    from execution errors (timeout, binary missing). The `exitCode = -1` sentinel
    for non-exit errors is a reasonable signal for callers.


    - The `defer cancel()` on the derived timeout context is correctly placed immediately
    after `context.WithTimeout`, preventing context leaks even on early returns.


    - Test names are requirement statements, not implementation descriptions -- exactly
    the right naming convention. AAA structure is explicit and consistent across all
    4 tests.


    - The truncation test uses `/dev/urandom | base64` to generate >8192 bytes, which
    is robust against byte-value-specific edge cases.


    - The cancellation test pre-cancels the context rather than racing a real `sleep`,
    making it deterministic and fast.


    ### Code Smells Detected


    | Smell | Location | Severity | Treatment |

    |-------|----------|----------|-----------|

    | Lazy Class / Middle Man | tool.go:93-101 isExitError | SHOULD_FIX | Inline the
    errors.As call; delete the function |

    | Dead Code (TEMP hack) | cmd/agent/main.go:163-166, cmd/web/main.go:68-70 | SHOULD_FIX
    | Remove or track with a card ID (pre-existing, not introduced by this CL) |


    ### Recommended Next Steps


    1. (Should Fix) Inline `isExitError` -- single line change, net reduction in code.

    2. (Should Fix) Resolve or track the TEMP context-window hacks in both main.go
    files.

    3. (Nit) Check the go directive -- if >= 1.21, delete the hand-rolled `max` helper
    in tool_test.go.

    4. (Follow-up card) Security hardening: command sanitization / allowlist. Acknowledged
    MVP risk, but a card should be filed before this goes to production.

    5. (Follow-up card) `RequireConfirmation: false` in both wiring sites means the
    LLM can execute arbitrary shell commands without user approval. A follow-up card
    should evaluate whether `RequireConfirmation: true` is appropriate for the web
    UI entrypoint at minimum.'
