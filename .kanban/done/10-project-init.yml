acceptance:
  # Happy path — successful scaffold
  - given: 空專案目錄（僅含 docs/）
    when: 執行 go mod init github.com/neokn/agenticsystem
    then: go.mod 存在，module 路徑為 github.com/neokn/agenticsystem，go directive 為 1.24 以上
  - given: go.mod 已建立
    when: 執行 go get google.golang.org/adk@v0.6 及 google.golang.org/genai
    then: go.mod require 區段包含兩個依賴；go.sum 存在且包含對應 hash；go mod verify 通過
  - given: 所有依賴已 fetch、骨架檔案已建立
    when: 執行 go build ./...
    then: 零編譯錯誤；零 warning；輸出 binary 可在 cmd/agent/ 產生（或 go build 不報錯即可）
  # Edge / failure scenarios
  - given: cmd/agent/main.go 骨架中 import ADK package
    when: ADK import path 拼錯或版本不存在
    then: go build 報 cannot find module 或 no required module provides；錯誤訊息明確指出問題 package
  - given: configs/default.json 內容為空 JSON 物件 {}
    when: go build ./... 或 go vet ./...
    then: 不因 JSON 格式而造成 build/vet 失敗（JSON 解析留給 runtime）
  - given: internal/memory/ 目錄存在但為空（無 .go 檔）
    when: 執行 go build ./...
    then: build 成功（空 package 目錄不影響 build）；未來新增 .go 檔不需變更 go.mod
architecture:
  component: memory
  layer: Infrastructure
  pattern: none — pure project scaffolding; no behavioural pattern warranted at this stage
  boundary: |
    No ports or adapters in this card. This card establishes the module root and
    dependency graph only. Future cards (S0-S4) will define ports (CompressStrategy
    interface, ModelProfile loader) inside internal/memory/ and the driving adapter
    entry point in cmd/agent/main.go.
  notes: |
    Conventions established by this scaffolding card:

    1. MODULE PATH: github.com/neokn/agenticsystem
       All import paths in the project start with this prefix. Once go.sum is
       committed this is immutable — verify carefully before running go mod init.

    2. DIRECTORY MAPPING TO EXPLICIT ARCHITECTURE LAYERS:
         cmd/agent/main.go        -> UI / Driving Adapter (wires Runner + Plugin)
         internal/memory/*.go     -> Application Layer + Domain Layer (co-located)
         configs/default.json     -> Infrastructure config, parsed at startup

       Co-locating Application and Domain in a single package is acceptable for
       MVP given the spec's explicit "internal-first, single package" decision.
       Split into sub-packages when the package exceeds ~5-6 files or distinct
       domain concepts need isolation.

    3. INTERNAL PACKAGE BOUNDARY:
       Go's `internal/` rule enforces that only code rooted at agenticsystem/ can
       import internal/memory. This satisfies the component isolation principle at
       the module level without extra tooling.

    4. ERROR HANDLING CONVENTION:
       Return (value, error) — standard Go idiom. No panic except unrecoverable
       programmer errors (nil config at startup). Use sentinel error values for
       cases where callers need to branch (e.g. ErrOOM, ErrConfigInvalid) rather
       than error string matching.

    5. CONFIG LOADING CONVENTION:
       configs/default.json is parsed at startup in main.go into a Go config struct
       defined in internal/memory/. main.go passes the struct into MemoryPlugin via
       constructor — no global config variable, no init() side effects. Config
       validation (missing required fields) happens at construction time and returns
       an error, not a panic.

    6. ADK COUPLING BOUNDARY:
       cmd/agent/main.go imports the ADK runner and wires the Plugin. The
       internal/memory/ package implements ADK's Plugin interface callbacks
       (BeforeModel / AfterModel) but should not import ADK types deeper than the
       callback signatures require. This keeps internal/memory/ testable without
       a full ADK runner.

    7. GO VERSION: 1.24+ required (genai tokenizer sub-package dependency).
