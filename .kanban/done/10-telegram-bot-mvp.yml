comments:
- author: jensen
  at: 2026-03-22 21:30:00+08:00
  text: 'Architecture decision: cmd/telegram/main.go is a pure Driving Adapter in the

    Infrastructure layer — the outermost concentric ring. It translates Telegram

    Update events into ADK runner.Run() calls, exactly as cmd/agent translates

    stdin lines. The Application Core (internal/memory, internal/agentdef, ADK

    runner/session/llmagent) is completely unchanged.


    Recommended library: github.com/go-telegram-bot-api/telegram-bot-api/v5.

    This is the most stable, widely-adopted Go Telegram library and fits the

    Long Polling MVP requirement without ceremony. See ADR-0005 for the full

    option comparison.


    No design pattern is needed here. The polling loop is a straightforward

    sequential loop with a single branch. Introducing Strategy or Observer

    for two cases (text message / skip non-message) would be speculative

    generality.


    Session handling: each incoming Telegram message creates a fresh

    session.InMemoryService() session. UserID is the Telegram user''s numeric ID

    as a string. This satisfies the MVP requirement of zero persistence.


    The wiring duplication across cmd/agent, cmd/web, and cmd/telegram is

    acknowledged. An internal/appwire shared factory becomes justified when a

    fourth entrypoint is added or when the assembly logic grows. That is a

    follow-up card, not part of this MVP.


    Full ADR at docs/adr/0005-telegram-bot-mvp-architecture.md.

    '
