description: '最小可行版本：用 Long Polling 接上 Telegram Bot，讓使用者可以

  透過 Telegram 與 agent 對話。


  MVP 簡化：

  - 每則訊息都是獨立的新 session（不做 session 持久化）

  - Long Polling（不需要 public HTTPS endpoint）

  - 不做 Webhook、不做 graceful shutdown

  - MemoryPlugin 接上但在單 session 短對話中不一定會觸發壓縮


  交付：cmd/telegram/main.go，跑起來能收發 Telegram 訊息。

  '
architecture:
  component: TelegramDelivery
  layer: Infrastructure (Driving Adapter)
  pattern: none — simple sequential wiring; Long Polling loop mirrors cmd/agent stdin loop. No pattern needed at this scale.
  boundary: 'Port (inward): ADK runner.Run() — same port used by cmd/agent and cmd/web.

    Driving Adapter (this card): cmd/telegram/main.go polls Telegram API,

    translates Update.Message.Text into genai.Content, calls runner.Run(),

    sends reply via bot.Send(). All Telegram API knowledge is contained here.

    Driven Adapters (unchanged): internal/memory (MemoryPlugin), internal/agentdef

    (agent definition loader), google.golang.org/adk (session, runner, llmagent).

    '
  notes: "ADR: docs/adr/0005-telegram-bot-mvp-architecture.md\n\nRecommended Telegram library: github.com/go-telegram-bot-api/telegram-bot-api/v5\n\
    - Most widely adopted Go Telegram Bot library.\n- Stable Long Polling API: tgbotapi.NewUpdate(0) + bot.GetUpdatesChan(u).\n\
    - No abstraction layer needed over it for MVP.\n\nAssembly pattern (mirror cmd/agent/main.go exactly):\n  1. godotenv.Load()\
    \ + checkBotToken() + checkAPIKey()  — fail fast\n  2. agentdef.Load(\".\", \"demo_agent\")\n  3. genai.NewClient  → \
    \ memory.NewRegistry  →  reg.GetProfile\n  4. memory.NewGenaiWorker  →  memory.NewGenerational  →  memory.NewMemoryPlugin\n\
    \  5. memPlugin.BuildPlugin()\n  6. gemini.NewModel  →  llmagent.New\n  7. session.InMemoryService()  →  runner.New(...)\n\
    \  8. Long Polling loop:\n       for update := range updates {\n         if update.Message == nil { continue }\n     \
    \    // create fresh session per message (MVP: no persistence)\n         sess, _ := sessionSvc.Create(ctx, &session.CreateRequest{...})\n\
    \         userMsg := genai.NewContentFromText(update.Message.Text, genai.RoleUser)\n         reply := \"\"\n         for\
    \ event, err := range r.Run(ctx, userID, sess.ID(), userMsg, agent.RunConfig{}) { ... }\n         bot.Send(tgbotapi.NewMessage(update.Message.Chat.ID,\
    \ reply))\n       }\n\nUserID for ADK sessions: use strconv.FormatInt(update.Message.From.ID, 10)\nAppName: \"telegram_bot_app\"\
    \n\nNo pattern needed: the loop has a single branch (text message) and is\nunlikely to grow at MVP stage. Simple conditional\
    \ is correct here.\n\nDependency direction check: cmd/telegram imports internal/agentdef,\ninternal/memory, google.golang.org/adk/*\
    \ — all inward. The Telegram library\nis an outer-layer detail. Application Core is not touched.\n\nFuture follow-up (not\
    \ this card):\n- Graceful shutdown: signal.NotifyContext + bot.StopReceivingUpdates()\n- Session persistence across messages\
    \ (requires keying sessionID by chat ID)\n- Shared internal/appwire factory when a fourth entrypoint is added\n"
