- author: jobs
  at: '2026-03-22T23:00:00+08:00'
  text: '## Code Review by Jobs


    **Overall Assessment:** LGTM WITH COMMENTS

    **Code Health Impact:** Improves


    ### Critical Issues (Must Fix)


    None.


    ### Should Fix


    - `cmd/telegram/main.go:147` — `update.Message.From` can be `nil` for Telegram channel posts (messages forwarded from
    a channel, or anonymous admin messages). The line `strconv.FormatInt(update.Message.From.ID, 10)` will panic at runtime
    if `From` is absent. The existing guard `update.Message == nil || update.Message.Text == ""` does not protect against
    this because channel posts can have non-empty text with a nil `From`. Fix: add `update.Message.From == nil` to the early-return
    guard at the top of the handler. Suggested: `if update.Message == nil || update.Message.Text == "" || update.Message.From
    == nil { return }`. For a single-user MVP bot this edge case is unlikely, but it is a latent panic in production.


    - `docs/adr/0005-telegram-bot-mvp-architecture.md:75` — The ADR records the library decision as `github.com/go-telegram-bot-api/telegram-bot-api/v5`,
    but the implementation uses `github.com/go-telegram/bot` (v1.20.0). The ADR is now stale. The substituted library is context-first
    and arguably more idiomatic for Go 1.21+, so the technical choice is defensible, but the ADR should be updated to reflect
    the actual decision — recorded architecture decisions are only useful if they match the code.


    ### Nit


    - `cmd/telegram/main.go:202-205` — The error output for `checkBotToken` and `checkAPIKey` failures uses `"%v\n"` without
    an `"Error: "` prefix. `cmd/agent/main.go` uses `"Error: %v\n"` for the same pattern. Cosmetic inconsistency across cmd/
    entrypoints.


    - `cmd/telegram/main_test.go:14-15` — The negative-case test''s defer does `os.Setenv("TELEGRAM_BOT_TOKEN", original)`
    even when `original` was `""` (i.e., variable was unset). This sets the variable to an empty string rather than leaving
    it unset. No effect on correctness here since `checkBotToken()` checks `== ""`, but the positive test correctly uses the
    asymmetric restore pattern (`if original == "" { os.Unsetenv(...) } else { os.Setenv(...) }`). That pattern is the more
    correct one.


    ### Good Things


    - The Driving Adapter pattern is applied correctly. All Telegram API knowledge is contained in one file; the Application
    Core is untouched. This is exactly the architectural discipline that makes the codebase extensible.

    - The fallback `reply = "(no response)"` at line 175 is a thoughtful defensive touch — sending an empty string to the
    Telegram API returns an error, and this guard prevents a silent failure path.

    - Error handling throughout `runBot()` is consistent and idiomatic: every failure path returns a wrapped error with context
    string (`fmt.Errorf("creating runner: %w", err)`).

    - The package doc comment is excellent: it names the layer, describes the transport mechanism, states the MVP simplification
    (no persistence), and includes a ready-to-run usage example. Right level of documentation for an entrypoint file.

    - Test env-var isolation (save original, defer restore) is correct and prevents pollution across parallel test runs.

    - The decision to use real profile values rather than the TEMP context-window shrink from `cmd/agent` is correct for a
    production-facing entrypoint.


    ### Code Smells Detected


    | Smell | Location | Severity | Treatment |

    |-------|----------|----------|-----------|

    | Duplicate Code (assembly wiring) | cmd/telegram/main.go vs cmd/agent/main.go vs cmd/web/main.go | NIT (accepted per
    ADR-0005) | Extract internal/appwire factory when a fourth entrypoint is added — already the stated follow-up plan |


    ### Recommended Next Steps


    1. Add `update.Message.From == nil` to the handler guard (one-line fix, prevents production panic).

    2. Update ADR-0005 to record `github.com/go-telegram/bot` as the chosen library and note why it was preferred over `telegram-bot-api/v5`.

    3. (Follow-up card, not this CL) Graceful shutdown via `signal.NotifyContext` — already captured in the architecture notes.

    4. (Follow-up card, not this CL) Extract `internal/appwire` when a fourth entrypoint is added.

    '
