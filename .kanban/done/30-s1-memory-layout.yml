description: "Split the context window into four named segments: PINNED, SUMMARY,\
  \ ACTIVE, and BUFFER.\n\nOS equivalent: memory partitioning.\n\nKey rules:\n- BUFFER\
  \ >= max_output_tokens (take the larger value)\n- Ratio sum must equal exactly 100%\
  \ or NewLayout returns an error\n- When BUFFER is auto-raised, the deficit is deducted\
  \ proportionally from the other\n  three segments; if any segment would reach 0\
  \ tokens, return an error\n- Integer rounding: floor each segment, assign remainder\
  \ to ACTIVE so that\n  sum of all four segments equals context_window_tokens exactly\n\
  - Extremely small context_window (e.g. 10k tokens with 8.5k max_output) must be\n\
  \  caught and rejected with a clear error — not silently produce zero-token segments\n\
  \nFile: internal/memory/layout.go\n"
