  text: "Refinement notes:\n\nSPLITTING DECISION: No split needed. This is a single,\
    \ tightly scoped Value Object\nwith all logic in one file (layout.go). The story\
    \ delivers independent value — once\ndone, S2+S3 (MemoryPlugin) can use MemoryLayout\
    \ directly. Splitting would create\nartificial dependencies without adding value.\n\
    \nEDGE CASES ADDED:\n1. Extremely small context_window — when BUFFER auto-raise\
    \ consumes so many tokens\n   that remaining segments would be 0 or negative,\
    \ the system must return\n   an error rather than silently producing broken layouts.\
    \ Threshold:\n   each non-BUFFER segment must have at least MinSegmentTokens =\
    \ 1. Example:\n   context_window=10,000, max_output=8,500 → remaining after BUFFER\
    \ = 1,500 →\n   three segments each need at least 1 token so this passes, but\
    \ e.g.\n   context_window=5,000, max_output=4,998 → remaining = 2 → PINNED and\
    \ SUMMARY\n   cannot each get 1 token and also leave something for ACTIVE → error.\n\
    2. Rounding errors — integer floor division of float ratios will always lose a\n\
    \   few tokens. The invariant \"sum of segments == context_window_tokens exactly\"\
    \n   must hold. Strategy: floor all four segments, sum the floors, add the\n \
    \  remainder (context_window_tokens - sum) to ACTIVE. This is deterministic\n\
    \   and keeps ACTIVE as the flexible \"large\" segment. Tests should verify the\n\
    \   sum invariant with context_window values that produce non-integer splits.\n\
    \nTASK BREAKDOWN (aiming for ~1 hour each):\n8 tasks, each independently testable\
    \ and completable in ~1 hour:\n1. Type definitions (Segment constants + SegmentLimits\
    \ struct)\n2. LayoutConfig + JSON loading from configs/default.json\n3. Ratio\
    \ validation logic + ConfigurationError type\n4. Base segment calculation with\
    \ floor+remainder\n5. BUFFER auto-raise with proportional deduction\n6. Minimum-capacity\
    \ guard after BUFFER raise\n7. ConfigurationError typed error struct\n8. Full\
    \ unit test suite covering all acceptance criteria\n\nCLARITY IMPROVEMENTS:\n\
    - Original task \"定義 Segment 和 MemoryLayout struct\" was too vague about\n  whether\
    \ Segment is constants, enum, or a struct — clarified as named constants.\n- BUFFER\
    \ proportional deduction was underspecified — clarified that it reuses\n  the\
    \ same floor+remainder pattern as the base calculation to avoid double\n  rounding\
    \ errors.\n- \"ConfigurationError\" was mentioned but not specified as a typed\
    \ Go error —\n  clarified this is a struct implementing the error interface, not\
    \ a wrapped\n  string, so callers can inspect it programmatically.\n"
