- author: jobs
  at: '2026-03-22T12:30:00+00:00'
  text: '## Code Review by Jobs


    **Overall Assessment:** LGTM WITH COMMENTS

    **Code Health Impact:** Improves


    ### Critical Issues (Must Fix)

    - None.


    ### Should Fix


    - `internal/memory/layout.go:102-116` -- The BUFFER auto-raise block has a silent
    correctness gap: the `otherTotal > 0` guard lets the function skip the proportional
    deduction entirely when `otherTotal` is zero (meaning all three non-BUFFER segments
    floored to zero before the raise). In that case `pinned`, `summary`, and `active`
    remain at zero while `buffer` is set to `maxOutputTokens`, producing a layout
    whose non-BUFFER segments are all zero. The minimum-capacity guard on lines 126-132
    will catch this (0 < 3 * 1) and return an error, so no broken layout escapes --
    but the guard triggers with a misleading message that blames remaining capacity
    rather than the degenerate-zero state. The `otherTotal == 0` branch should return
    an explicit error before reaching the guard, or the guard message should cover
    this case.


    - `internal/memory/layout_test.go:34-56` -- `TestLayoutConfig_should_hold_per_segment_ratios`
    only asserts that struct fields hold the values that were just assigned to them.
    This tests the Go language, not the application. The test adds no failure-detection
    value: it cannot fail unless the Go compiler is broken. It should be removed or
    replaced with a test that exercises `DefaultLayoutConfig` or `NewLayout`.


    - `internal/memory/layout_test.go:11-28` -- `TestMemoryLayout_should_return_segment_values_via_accessors`
    constructs `MemoryLayout` directly via struct literal from within the package.
    This is valid Go (same package), but it tests accessor plumbing in isolation from
    `NewLayout`. The test provides no protection against a regression where `NewLayout`
    produces a zero-value struct and accessors still return zero correctly. Pairing
    or replacing it with a round-trip test through `NewLayout` would provide stronger
    regression coverage.


    ### Nit


    - `internal/memory/layout.go:89-92` -- The aligned spacing on the four assignment
    lines (`pinned  :=`, `summary :=`, etc.) is cosmetic and `gofmt` will strip it.
    Keep only if the team has agreed to allow gofmt-surviving manual alignment; otherwise
    it will create noisy diffs when gofmt runs in CI.


    - `internal/memory/layout.go:109-111` -- The deduction variable names `deductPinned`,
    `deductSummary`, `deductActive` are clear, but a one-line comment explaining that
    `deductActive` absorbs the floor remainder (mirroring the base-calculation pattern)
    would make the rounding intent self-documenting for future maintainers.


    - `internal/memory/layout.go:27-49` -- `DefaultLayoutConfig` uses `runtime.Caller(0)`
    to locate the source tree at runtime. This is a known Go idiom for test helpers
    but is fragile in production binaries (the source path is embedded at compile
    time and may not exist on the deployment host). A `//go:embed` directive or an
    injected path via build flags would be more robust. Not a bug for the current
    test-only use-case, but worth tracking as technical debt before this function
    is called from a deployed binary.


    ### Good Things


    - The Value Object pattern is executed precisely as ADR-0002 prescribes: unexported
    fields, exported accessor methods, `NewLayout` returns by value. The type-level
    enforcement of the sum invariant is exactly right.


    - Error messages follow ADR-0001 to the letter: all validation failures use `fmt.Errorf`
    with the function name prefix and field-level context. No custom error types were
    introduced where they do not belong.


    - The floor+remainder rounding strategy is correct and deterministic. Assigning
    the remainder to `active` (the largest, most flexible segment) is a sound choice
    consistent with Jensen''s architecture note.


    - The BUFFER proportional deduction reuses the floor+remainder pattern rather
    than naive division, which avoids a second category of rounding errors. This is
    non-obvious and done well.


    - Test naming follows the requirement-statement convention (`should_raise_buffer_to_max_output_tokens_when_floor_is_less`)
    consistently across all 14 tests. Readability is high.


    - AAA structure is clear in every test. The inline arithmetic comments in `TestNewLayout_should_compute_floor_segments_and_assign_remainder_to_active`
    (showing expected floor values step by step) are exactly the kind of load-bearing
    comments that make a test self-documenting.


    - `ratioEpsilon` is unexported and placed close to its use. `MinSegmentTokens`
    and `nonBufferSegments` are named rather than magic-numbered. These are the right
    decisions.


    ### Code Smells Detected


    | Smell | Location | Severity | Treatment |

    |-------|----------|----------|-----------|

    | Dispensable Test (tests the language, not the app) | layout_test.go:34-56 TestLayoutConfig_should_hold_per_segment_ratios
    | SHOULD_FIX | Remove or replace with a test that exercises real application behavior
    |

    | Silent No-Op Branch | layout.go:108 `if otherTotal > 0` guard | SHOULD_FIX |
    Make the zero-branch explicit -- fail fast with a clear error rather than leaving
    segments at zero and relying on a downstream guard |


    ### Recommended Next Steps


    1. (Should Fix) Add an explicit early-return error for the `otherTotal == 0` case
    inside the BUFFER auto-raise block, or expand the minimum-capacity guard message
    to cover this degenerate path.

    2. (Should Fix) Remove `TestLayoutConfig_should_hold_per_segment_ratios` -- it
    tests Go struct assignment, not application logic, and gives false confidence.

    3. (Nit) Decide on the `DefaultLayoutConfig` / `runtime.Caller` approach before
    the function is called from a deployed binary; track as a follow-up task.

    4. (Nit) Standardize alignment style with `gofmt` or document the exception in
    the style guide.


    Overall the implementation is clean, architecturally sound, and aligned with both
    ADRs. The two Should-Fix items are correctness-adjacent (the silent no-op branch
    caught downstream but with a misleading message) and test hygiene (a tautological
    test). Neither blocks shipping. The code health of the codebase is improved by
    this change.

    '
