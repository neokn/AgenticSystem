architecture:
  component: internal/memory
  layer: Domain Layer
  pattern: Value Object
  boundary: 'No ports or adapters needed. MemoryLayout is pure domain computation
    with no I/O.

    It is constructed by NewLayout (a domain factory function) and consumed by

    MemoryPlugin (Application Layer). Dependency flows inward: MemoryPlugin depends

    on MemoryLayout, never the reverse.

    '
  notes: "CONFIRMED: MemoryLayout is correctly placed as a Value Object in the Domain\
    \ Layer.\nIt has no identity — two layouts computed from identical inputs are\
    \ equivalent.\nIt carries no I/O, no infrastructure dependencies, and no use-case\
    \ logic.\nSee ADR-0002: docs/adr/0002-memory-layout-value-object-and-immutability.md\n\
    \nIMMUTABILITY (Go implementation):\nUse unexported fields with exported accessor\
    \ methods. NewLayout returns a value\n(not a pointer), giving callers an immutable\
    \ copy. This is the idiomatic Go\npattern for value objects and enforces the sum\
    \ invariant at the type level.\n\n  type MemoryLayout struct {\n      pinned,\
    \ summary, active, buffer int\n  }\n  func (l MemoryLayout) Pinned() int  { return\
    \ l.pinned }\n  func (l MemoryLayout) Summary() int { return l.summary }\n  func\
    \ (l MemoryLayout) Active() int  { return l.active }\n  func (l MemoryLayout)\
    \ Buffer() int  { return l.buffer }\n  func (l MemoryLayout) Total() int   { return\
    \ l.pinned + l.summary + l.active + l.buffer }\n\nERROR CONVENTION (ADR-0001 alignment):\n\
    The card previously described ConfigurationError as a typed struct so callers\n\
    can switch on error type. This contradicts the project's accepted ADR-0001.\n\
    ADR-0001 classifies NewLayout validation failures as programming mistakes caught\n\
    at startup — no runtime branching by callers is needed. Use fmt.Errorf with\n\
    descriptive field-level context instead of a named type.\n\nCorrected approach:\n\
    \  return MemoryLayout{}, fmt.Errorf(\"NewLayout: ratio sum must equal 1.0, got\
    \ %.4f\", sum)\n  return MemoryLayout{}, fmt.Errorf(\"NewLayout: all ratios must\
    \ be > 0; PINNED ratio is 0\")\n  return MemoryLayout{}, fmt.Errorf(\n      \"\
    NewLayout: BUFFER raised to max_output_tokens (%d), remaining capacity %d is \"\
    +\n      \"insufficient for %d non-BUFFER segments (MinSegmentTokens = %d)\",\n\
    \      maxOutput, remaining, 3, MinSegmentTokens)\n\nTask 7 (\"Define ConfigurationError\
    \ typed error struct\") should be dropped or\nconverted to: \"Verify error messages\
    \ follow ADR-0001 fmt.Errorf convention.\"\n\nROUNDING STRATEGY (Go idiom):\n\
    Integer floor division is the default for int(float64(n) * ratio) in Go.\nCollect\
    \ remainder with: remainder := total - (pinned + summary + active + buffer)\n\
    then: active += remainder\nThis is deterministic, has no floating-point accumulation\
    \ error, and guarantees\nthe sum invariant in a single pass. No special rounding\
    \ library needed.\n\nNAMED CONSTANT:\nconst MinSegmentTokens = 1  // minimum tokens\
    \ any non-BUFFER segment must receive\n\nFILE: internal/memory/layout.go\nADR:\
    \ docs/adr/0002-memory-layout-value-object-and-immutability.md\n"
