- author: jobs
  at: '2026-03-22T15:30:00+08:00'
  text: '## Code Review by Jobs


    **Overall Assessment:** LGTM WITH COMMENTS

    **Code Health Impact:** Improves


    ### Critical Issues (Must Fix)

    None.


    ### Should Fix


    go.mod:22 — dotprompt is listed as "// indirect" despite being a direct dependency
    imported in compress.go. Run "go mod tidy" to promote it to the direct require
    block. An indirect marker signals the package is pulled in transitively, but the
    production code imports it explicitly. This will mislead anyone auditing the dependency
    tree.


    internal/memory/compress.go:105-112 — The NewGenerational nil-store fallback silently
    swallows the dp.NewDirStore error and sets cfg.PromptStore = nil. The comment
    says "buildPrompt will return an error at render time", but the actual failure
    surfaces as the nil-store guard, not a meaningful DirStore error. The real error
    is discarded entirely. This should either return (*Generational, error) from NewGenerational
    or at minimum log the error before falling back — silent discard of an I/O error
    is a reliability hazard in production.


    ### Nit


    internal/memory/compress.go:164 — A new dp.NewDotprompt(nil) engine is constructed
    inside buildPrompt on every call. The engine is stateless, so this is functionally
    harmless, but it allocates an object per-render. The engine could be cached once
    in Generational at construction time.


    internal/memory/compress.go:189-196 — The message-extraction loop silently drops
    non-TextPart content items. This is correct for the current template, but there
    is no comment explaining the assumption. A one-liner noting that the summarize
    prompt is expected to produce only TextPart messages would protect future maintainers.


    prompts/summarize.prompt:18 — The trailing newline after "Provide a concise summary:"
    is intentional (prompting continuation), but is not documented. A Handlebars comment
    inside the file would clarify intent for future editors.


    ### Good Things


    - The inlinePromptStore + compileInlineStore pattern is excellent. Implementing
    dp.PromptStore in-memory for tests means tests are hermetic, fast, and do not
    break on working-directory changes. This is exactly the right abstraction.

    - The empty-turns guard at compress.go:170-173 compensates correctly for a genuine
    dotprompt limitation (no required-field enforcement at render time). Added in
    response to Judge''s finding — right iteration process.

    - Error wrapping throughout buildPrompt uses %w consistently, so callers can use
    errors.Is/errors.As for targeted error handling in the future.

    - formatTurns is a clean, single-purpose function. Extracting it separately from
    buildPrompt makes both functions easier to test and reason about.

    - All 6 acceptance criteria are met with 18 tests, all green per Judge''s final
    report. The test naming convention (TestX_should_Y_when_Z) is consistent and communicates
    intent without needing to read the body.

    - summarize.prompt frontmatter is clean: existingSummary? is correctly marked
    optional in Picoschema, and turns is correctly required. The {{#if existingSummary}}
    block matches the schema declaration exactly.

    - The compressWorker interface remains unchanged, so no callers outside internal/memory
    are affected by this refactoring.

    - text/template has been completely removed with zero residue confirmed by grep.


    ### Code Smells Detected

    | Smell | Location | Severity | Treatment |

    |-------|----------|----------|-----------|

    | Silent error discard | compress.go:106-112 (DirStore error discarded) | SHOULD_FIX
    | Return (*Generational, error) from constructor; propagate DirStore failure to
    caller |

    | Repeated object creation | compress.go:164 (engine per call) | NIT | Cache dp.NewDotprompt(nil)
    as a field on Generational at construction time |


    ### Recommended Next Steps

    1. Run "go mod tidy" to promote github.com/google/dotprompt/go from // indirect
    to a direct require entry.

    2. Consider changing NewGenerational to return (*Generational, error) so DirStore
    construction failures surface at wiring time rather than silently degrading to
    a nil store.

    3. Optionally cache the dotprompt engine in Generational to avoid per-call allocation
    (low priority).

    '
