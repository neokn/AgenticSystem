description: "將 Generational 壓縮策略的 prompt template 從 Go text/template 改為 Google dotprompt。\n\
  \ndotprompt (github.com/google/dotprompt/go/dotprompt) 提供：\n- .prompt 檔案格式：YAML\
  \ frontmatter + Handlebars template body\n- DirStore：從目錄載入 .prompt 檔案\n- 結構化渲染：產生\
  \ RenderedPrompt（Messages + Model + Config）\n- Picoschema：輕量的 input/output schema\
  \ 定義\n\n變更範圍：\n1. go get github.com/google/dotprompt/go/dotprompt\n2. 建立 prompts/summarize.prompt（Handlebars\
  \ 語法）\n3. 修改 compress.go：Generational.buildPrompt 改用 dotprompt 載入+渲染\n4. 修改 GenaiWorker：接收\
  \ RenderedPrompt.Messages 而非 raw string\n5. 移除 text/template 相關程式碼\n6. 更新測試\n\n\
  .prompt 檔案範例：\n```\n---\nmodel: googleai/gemini-2.0-flash-lite\ninput:\n  schema:\n\
  \    existingSummary?: string\n    turns: string\n---\n{{#if existingSummary}}\n\
  Previous context summary:\n{{existingSummary}}\n\n{{/if}}\nSummarize the following\
  \ conversation turns, preserving key information:\n{{turns}}\n```\n"
