acceptance:
- given: prompts/summarize.prompt exists with valid Handlebars frontmatter and body
  when: Generational.buildPrompt is called with existingSummary and a list of ConversationTurns
  then: dotprompt renders the template and returns a non-empty prompt string containing
    the turns content
- given: existingSummary is an empty string
  when: Generational.buildPrompt is called
  then: the rendered prompt omits the prior-summary block entirely (no blank heading
    or placeholder)
- given: GenaiWorker.Summarize receives the rendered prompt as a structured genai.Content
    message
  when: the worker calls genai.Models.GenerateContent
  then: the request contains exactly one user-role Content part with the rendered
    prompt text, and no raw string concatenation occurs in the call site
- given: prompts/summarize.prompt is absent from the DirStore directory
  when: buildPrompt attempts to load the prompt via DirStore
  then: an error is returned immediately — Compress returns (nil, error) with a message
    identifying the missing file; no fallback to text/template occurs
- given: the .prompt file frontmatter declares required input field turns but the
    caller omits it
  when: dotprompt renders the template
  then: rendering returns a descriptive error and Compress returns (nil, error) —
    no partial or silently empty prompt is sent to the model
- given: tests exercise Generational.buildPrompt in isolation
  when: the test constructs a Generational using dp.Compile(inlineSource, nil) instead
    of a DirStore
  then: the test runs without touching the filesystem and asserts the exact rendered
    output string
architecture:
  component: internal/memory
  layer: Infrastructure Layer
  pattern: Template Method (prompt loading)
  notes: '將 compress.go 中的 text/template 替換為 dotprompt。

