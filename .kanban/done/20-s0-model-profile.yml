description: |
  Implement the ModelProfile struct and Registry, providing hardware specs for
  Gemini models. All subsequent components (MemoryLayout, compress trigger,
  cost tracking) depend on this profile.

  OS equivalent: hardware detection (BIOS/UEFI hardware detection).

  MVP built-in profiles:
  - gemini-2.0-flash       (1,048,576 context, 8,192 output)
  - gemini-2.0-flash-lite  (1,048,576 context, 8,192 output)
  - gemini-2.5-pro         (1,048,576 context, 65,536 output)
  - gemini-2.5-flash       (1,048,576 context, 65,536 output)

  File: internal/memory/profile.go
tasks:
  # ~1h each
  - text: >
      Define ModelProfile struct with all fields from spec: ModelID (string), Provider (string, default "google"), ContextWindowTokens (int), MaxOutputTokens (int), CostPer1KInputTokens (float64), CostPer1KOutputTokens (float64), CompressModelID (string), CompressCostPer1KInputTokens (float64), CompressCostPer1KOutputTokens (float64)

    done: true
  - text: >
      Implement Registry type, NewRegistry(customProfiles ...ModelProfile) constructor, and GetProfile(modelID string) (ModelProfile, error) method

    done: true
  - text: >
      Hardcode the four built-in Gemini profiles as package-level variables or a map initialised in an init() function; include accurate token limits from spec

    done: true
  - text: >
      Implement custom profile override logic: when a custom profile is passed to NewRegistry, it replaces the built-in entry for the same ModelID

    done: true
  - text: >
      Implement required-field validation in NewRegistry: reject any profile where ModelID == "" or ContextWindowTokens == 0; return a descriptive error

    done: true
  - text: >
      Implement CompressModelID fallback helper (GetEffectiveCompressModelID) that returns CompressModelID if non-empty, else falls back to ModelID and emits a slog.Warn log entry

    done: true
  - text: >
      Write unit tests covering all 8 acceptance criteria above: happy paths for all four built-in models, unknown model_id error, missing ModelID error, missing ContextWindowTokens error, compress fallback with warning, and zero cost fields

    done: true
