    text: |-
      ## Code Review by Jobs

      **Overall Assessment:** LGTM WITH COMMENTS
      **Code Health Impact:** Improves

      ---

      ### Critical Issues (Must Fix)

      None.

      ---

      ### Should Fix

      - `internal/memory/profile.go:34` — Inconsistent whitespace in struct field alignment. `CompressCostPer1KInputTokens` has two leading spaces before `float64` while `CompressCostPer1KOutputTokens` has one, creating a misaligned block that gofmt would not produce. Run `gofmt -w` on the file before the next commit.

      - `internal/memory/profile_test.go:308-341` — `TestGetProfile_AC2_Gemini25Pro_CompressModelIDIsStringValue` tests nothing verifiable. The assertion body is `_ = p.CompressModelID`, which is a no-op. The spec (AC2) says CompressModelID is either empty or a valid string — both are acceptable — so the real invariant being guarded is simply that no error is returned on lookup, which is already tested by `TestGetProfile_ReturnsBuiltin_Gemini25Pro`. This test either needs a meaningful assertion (e.g. confirming the field is of type string and the zero value is acceptable) or it should be merged into the existing test to avoid a misleading green light. A test with no assertion can never fail, which means it provides no protection.

      ---

      ### Nit

      - `internal/memory/profile_test.go:119-131` — `TestGetProfile_ReturnsBuiltin_GeminiFlashLite` omits the AAA comment markers (`// Arrange`, `// Act`, `// Assert`) that all other tests in the file use. Inconsistent style within the same file is a minor friction point for readers.

      - `internal/memory/profile_test.go:133-145` and `147-159` — Same omission of AAA markers for Gemini25Pro and Gemini25Flash builtin tests. A simple convention sweep would bring these into line with the rest of the file.

      - `internal/memory/profile_test.go:61-62` — `reg, _ := NewRegistry(custom)` silently ignores the error. The test is isolated from built-ins, so the call is safe, but using `t.Fatalf` on the error is the project idiom (every other test does this). Nit: use the explicit form for consistency.

      ---

      ### Good Things

      - The `ErrModelNotFound` sentinel is declared correctly with `errors.New` and wrapped with `%w` in `GetProfile`, making `errors.Is` work exactly as ADR-0001 requires. This is a small detail that is easy to get wrong and James got it right.

      - `GetEffectiveCompressModelID` is a value receiver on `ModelProfile` — exactly right for an immutable value object. No pointer indirection, no mutation. The method design cleanly embodies the architecture note.

      - `NewRegistry` validates all custom profiles before allocating any map state (fail-fast, all-or-nothing). This is the correct order: do not partially apply state when inputs are invalid.

      - `builtinProfiles` is a package-level `var` composite literal — not `init()`. This is exactly what Jensen specified in the architecture notes and it means tests can read the data without init() ordering concerns.

      - The package-level godoc comment on line 1-4 of `profile.go` correctly scopes the package to the whole `memory` package, not just this file. This sets up godoc for the package correctly as more files are added.

      - Test naming follows the `TestSubject_Scenario_ExpectedResult` convention consistently, making the test list self-documenting.

      - 19 tests covering all 8 acceptance criteria, race detector clean, go vet clean — a solid foundation for the stories that depend on S0.

      ---

      ### Code Smells Detected

      | Smell | Location | Severity | Treatment |
      |-------|----------|----------|-----------|
      | Dead Assertion | `profile_test.go:340` (`_ = p.CompressModelID`) | SHOULD_FIX | Replace with a meaningful assertion or remove and consolidate into the existing builtin test for gemini-2.5-pro |

      ---

      ### Recommended Next Steps

      1. (Should Fix) Add a real assertion to `TestGetProfile_AC2_Gemini25Pro_CompressModelIDIsStringValue` — at minimum assert that no error is returned AND remove the dead `_ = p.CompressModelID` line; or consolidate this test into `TestGetProfile_ReturnsBuiltin_Gemini25Pro`.
      2. (Should Fix) Run `gofmt -w internal/memory/profile.go` — the double-space in the struct field alignment at line 34 will produce a diff and should be cleaned before downstream reviewers see the file.
      3. (Nit) Add AAA markers to the three builtin-profile tests that are missing them.
      4. (Nit) Replace the `reg, _ = NewRegistry(...)` silent-ignore pattern with `reg, err := NewRegistry(...); if err != nil { t.Fatalf(...) }` for consistency.

      The implementation correctly realises the Registry pattern, value object semantics, sentinel error strategy (ADR-0001), and constructor injection as specified by Jensen. The core domain logic is sound. The two Should Fix items are test hygiene issues — they do not affect production behaviour. Card is approved to proceed.
