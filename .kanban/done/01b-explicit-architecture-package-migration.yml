    text: |-
      ## Code Review by Jobs

      **Overall Assessment:** LGTM WITH COMMENTS
      **Code Health Impact:** Improves

      ---

      ### Critical Issues (Must Fix)

      None.

      ---

      ### Should Fix

      **1. `internal/app/ports.go:23` and `internal/app/appwire/wire.go:87-100` — ToolProvider port is defined but not consumed as an interface.**

      The `ToolProvider` interface exists in `internal/app/ports.go` but `appwire.New()` builds MCP toolsets directly inline (lines 85-100 of wire.go) rather than accepting a `ToolProvider`. This means the port has no consumer and provides no isolation — the MCP subprocess construction is still tightly coupled to the assembly layer. The entire value of the Ports and Adapters pattern is that the Application Layer depends on the port abstraction, not the concrete adapter. As written, the port is architecturally correct but structurally orphaned.

      Similarly, `AgentLoader` is declared in `domain/ports.go` but `appwire.New()` constructs `&agentdef.Loader{}` directly (wire.go:72) rather than accepting a `domain.AgentLoader`.

      Neither injection point exists in `appwire.Config`. The ports are defined correctly but the wiring does not use them — defeating the testability goal stated in ADR-0009 ("Assembly (appwire) can be tested without starting real external processes"). Recommend adding `AgentLoader domain.AgentLoader` and `ToolProvider app.ToolProvider` (or equivalent) to `appwire.Config` with concrete defaults constructed when nil, or document explicitly in the ADR that port injection into appwire is deferred to a later card.

      **2. `internal/infra/agentdef/loader.go:22-32` — `Definition` struct is now a Dispensable (Lazy Class).**

      The `Definition` struct is an internal type that mirrors `domain.AgentDefinition` field-for-field. The `Loader.Load()` method (lines 39-49) constructs one `Definition` via the package-level `Load()` function and then immediately maps it to `domain.AgentDefinition`. This two-step mapping through an identical intermediate struct serves no purpose. Either inline the mapping directly into the package-level `Load()` function and return `*domain.AgentDefinition` from it, or remove the `Definition` type entirely. The current code violates the Dispensables principle — no client is served by this type that could not be served by the domain type directly.

      ---

      ### Nit

      **Nit 1: `internal/infra/sessionstore/service.go` — stray double blank lines.**
      Lines 44-46 (after `sessionMeta` struct) and lines 353-355 (before `jsonlSession` type) have two consecutive blank lines. Go style convention is a single blank line between top-level declarations.

      **Nit 2: `internal/infra/agentdef/override.go:19` — `truncate` helper is not exported and has no doc comment.**
      The `truncate` function at line 19 is a private helper placed before the exported `InstructionOverridePlugin`. While correct, positioning an unexported helper above the exported function that uses it is atypical in Go — helpers usually follow the function that uses them, or are grouped at the bottom. No functional issue, purely a readability point.

      **Nit 3: `internal/infra/agentdef/override.go:48-52` — inconsistent brace indentation.**
      The struct literal `&genai.Content{ Parts: ...}` on lines 48-51 has its closing brace at an inconsistent indent level compared to the Go standard `gofmt` style. This is likely a minor `gofmt` violation — worth running `gofmt -w` on the file.

      **Nit 4: `cmd/agent/main.go:6-7` — package doc comment references old path.**
      The comment says "assembles all components from internal/memory/" (line 7) — this should now read `internal/infra/memory/` after migration.

      ---

      ### Good Things

      - The dependency direction is clean and verifiable: `internal/domain/` has zero imports — it is a pure Go package with only stdlib-free type declarations and interface definitions. This is exactly right and will remain trivially testable forever.
      - The `mcpconfig` loader is a model of infra-to-domain mapping: internal JSON types for parsing, then an explicit mapping to `domain.MCPConfig` before returning. The domain layer owns its types; infrastructure owns the wire format. Textbook Ports and Adapters.
      - The `debugplugin` extraction is well-executed. The extracted `beforeModelCallback` is a named function (not an anonymous closure), which makes it independently testable. No closures over assembly state, exactly as Jules specified in the refinement comment.
      - `appwire.MemoryMetrics` and `appwire.ModelProfile` type aliases keep cmd/ clean without requiring cmd/ to import infra directly. This is a pragmatic, low-friction solution to a real coupling problem.
      - The compile-time interface checks at the bottom of `sessionstore/service.go` (`var _ session.Service = (*jsonlService)(nil)` etc.) are excellent practice — they make interface satisfaction failures a compile error rather than a runtime surprise.
      - ADR-0009 is thorough and self-consistent. The rationale for placing `ToolProvider` in `internal/app/` rather than `internal/domain/` (because it references `google.golang.org/adk/tool` types) is correctly documented and the reasoning is sound.
      - All seven acceptance criteria verified by Judge. The migration is structurally complete.

      ---

      ### Code Smells Detected

      | Smell | Location | Severity | Treatment |
      |-------|----------|----------|-----------|
      | Lazy Class | `internal/infra/agentdef/loader.go:22-32` (`Definition` struct) | SHOULD_FIX | Remove `Definition`; return `*domain.AgentDefinition` directly from package-level `Load()` |
      | Speculative Generality | `internal/app/ports.go` + `internal/domain/ports.go` (ports with no injection points) | SHOULD_FIX | Wire ports into `appwire.Config` or document deferral explicitly |

      ---

      ### Recommended Next Steps

      1. (Should Fix) Add `AgentLoader` and `ToolProvider` to `appwire.Config` as injectable dependencies (with concrete defaults), so the ports are actually consumed as interfaces and `appwire.New()` becomes testable without real file I/O or MCP subprocesses. If this is intentionally deferred to a later card, add a TODO comment in `wire.go` referencing the card number so the debt is tracked.
      2. (Should Fix) Remove the `Definition` struct from `internal/infra/agentdef/loader.go` and return `*domain.AgentDefinition` directly from the package-level `Load()` function. This eliminates a Lazy Class with no clean-up cost.
      3. (Nit) Run `gofmt -w internal/infra/agentdef/override.go` to fix the brace indentation.
      4. (Nit) Update the `cmd/agent/main.go` package comment to reference `internal/infra/memory/` instead of `internal/memory/`.
      5. (Future) Add the grep-based CI check documented in ADR-0009 Section "Testable Constraint" to the build pipeline so the dependency direction rule is machine-enforced going forward.
