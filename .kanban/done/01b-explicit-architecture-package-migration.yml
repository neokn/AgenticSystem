      This is the earning story — the actual package moves. It depends on 01a
      having produced the ADR and port interface definitions so James has a clear
      spec before touching files.

      Key implementation notes:
      - Use `git mv` for each package directory to preserve history.
      - Go module path is github.com/neokn/agenticsystem; all imports must be
        updated to match new paths (e.g., internal/agentdef -> internal/infra/agentdef).
      - The debug plugin extraction is the trickiest part: it currently closes over
        local variables in appwire.New(). The extracted debugplugin.New() should
        return a *plugin.Plugin with no closures over appwire state.
      - mcpconfig has no external deps — it could live in internal/app/ or
        internal/infra/; the ADR from 01a should settle this. Lean toward infra/
        since it loads external config files (file system = infrastructure).
      - sessionstore depends on google.golang.org/adk/session and
        google.golang.org/genai — clearly infra/.
      - After the move, cmd/agent/main.go should only import internal/app/appwire
        and adk/session (for session.InMemoryService). cmd/telegram/main.go should
        only import internal/app/appwire and internal/infra/sessionstore.
