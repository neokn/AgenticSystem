comments:
  - author: jules
    at: 2026-03-22T00:00:00+08:00
    text: |
      Refinement notes.

      ADK session.Service interface (google.golang.org/adk@v0.6.0/session/service.go)
      requires 5 methods: Create, Get, List, Delete, AppendEvent.
      session.Session interface: ID(), AppName(), UserID(), State(), Events(), LastUpdateTime().

      JSONL line schema decision: serialize full session.Event, not a simplified
      role+text record. Rationale: ADK runner and plugins read event.Actions.StateDelta
      to merge session state, and event.Content.Parts can include function calls and
      function responses. A simplified schema would lose this data and break state
      replay on restart.

      Splitting decision (story-splitter strategy: Split by Examples of Usefulness):
      The original story contained two distinct value deliveries:
        1. Durable storage — sessions survive process restarts (this card, 05)
        2. Telegram per-chat continuity — bot reuses the same session for the
           same chat ID across messages (card 06, depends-on: 05)
      Card 06 is created separately because the behavior change (session lookup by
      chat ID vs. always creating new) is independent of the storage mechanism and
      can be verified and shipped independently once 05 is done.

      Concurrency: O_APPEND on POSIX is atomic for writes <= PIPE_BUF (~4KB).
      A single serialised Event line is well within this limit for normal
      conversations. No additional mutex is required at the file layer for AppendEvent.

      State scopes: ADK supports app:, user:, and temp: key prefixes.
      temp: keys are stripped by AppendEvent before storage (per ADK contract in
      session.Service docs). app: and user: scoped deltas must be replayed during
      Get to reconstruct full state.
  - author: jensen
    at: 2026-03-22T10:00:00+08:00
    text: |
      Architecture review complete.

      Component: SessionStore (Infrastructure layer — driven adapter).
      Package: internal/sessionstore/ (not internal/memory/, which handles
      context-window compression — a separate bounded context).

      Key decisions recorded in docs/adr/0007-jsonl-session-store.md:

      1. Metadata sidecar pattern (<id>.meta.json) — List() needs AppName/UserID
         enumeration without replaying event files. A small JSON sidecar makes
         this O(1) per session. Rejected alternative: encode metadata in a
         directory structure (app/user/<id>.jsonl) — would work for List but
         complicates Delete and makes the file layout less transparent.

      2. No persistent file handle — AppendEvent opens, writes, and closes on
         each call. This avoids fd leaks across long-lived processes and ensures
         O_APPEND atomicity is handled by the kernel on every call. The overhead
         is one open+close syscall per event, which is acceptable for LLM
         conversation throughput (events arrive at human interaction speed).

      3. No caching layer (MVP) — Get replays the full JSONL file on every call.
         The ADK runner calls Get once per invocation (not per event), so the
         cost is proportional to conversation length, not message count. For
         MVP conversation lengths this is fine.

      4. Concrete session type — session.Session is an interface; the ADK-internal
         *session.session is unexported. The implementation must define its own
         jsonlSession struct following the same pattern as session/database.localSession.
         This is not a design smell — it is the intended extension point.

      Labels confirmed: backend, core-logic.
      No card split required — this card is already scoped to a single component
      (Infrastructure adapter for session persistence).
