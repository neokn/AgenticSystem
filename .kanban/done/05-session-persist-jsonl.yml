  - author: jobs
    at: "2026-03-22T22:30:00+08:00"
    text: |-
      ## Code Review by Jobs

      **Overall Assessment:** LGTM WITH COMMENTS
      **Code Health Impact:** Improves

      ### Critical Issues (Must Fix)

      None.

      ### Should Fix

      - `cmd/agent/main.go:213` and `cmd/web/main.go:121` — The task description and card acceptance criteria explicitly state all three entrypoints should be wired: "替換 cmd/agent、cmd/web、cmd/telegram 的 InMemoryService() → sessionstore.NewJSONLService". Only `cmd/telegram` was updated. `cmd/agent` and `cmd/web` still call `session.InMemoryService()`. This is a scope gap, not a blocker for the wiring architecture — but the stated task is incomplete. Card 06 depends on JSONL persistence being active, so this should be completed before or alongside card 06. (Note: James comment says "Files modified: cmd/telegram/main.go" — the other two entrypoints appear to have been left intentionally pending card 06, but the card tasks mark this as done. Clarify and complete.)

      - `internal/sessionstore/service.go:119-136` — `Get` reads the meta sidecar to validate session identity, but does not cross-check `meta.AppName` against `req.AppName` or `meta.UserID` against `req.UserID`. A caller with the correct `SessionID` but wrong `AppName`/`UserID` will receive the session without error. `InMemoryService` may behave identically (making this consistent), but since the meta sidecar exists precisely to carry identity information, a defensive check `if meta.AppName != appName { return nil, fmt.Errorf(...) }` would harden the contract and make it explicit. This is a should-fix, not a blocker.

      ### Nit

      - `internal/sessionstore/service.go:379` — `copy := *event` shadows the built-in `copy` function. Rename to `evCopy := *event` (already done in `replayJSONL` at line 240 — apply the same convention in `trimTempDeltaState`).

      - `internal/sessionstore/service.go:291-296` — `List` returns sessions with `updatedAt: meta.CreatedAt`. This means `LastUpdateTime()` on a listed session reflects creation time, not last event time. The ADR acknowledges List does not replay events, but callers consuming `LastUpdateTime` for sorting will see misleading values. A doc comment on the returned `jsonlSession` noting this limitation would set expectations.

      - `internal/sessionstore/service_test.go:405` — `time.Sleep(time.Millisecond)` for timestamp ordering is a smell in unit tests. The test already forces explicit timestamps on `evOld` and `evNew` (`cutoff.Add(-time.Second)` and `cutoff.Add(time.Second)`), so the sleep is unnecessary. Remove it.

      ### Good Things

      - The compile-time interface check block (`var _ session.Service = (*jsonlService)(nil)` etc.) at line 521-527 is excellent practice — catches interface drift immediately at compile time without any runtime cost.

      - `replayJSONL` handles the scanner buffer ceiling explicitly (1 MiB) and documents the reason (base64 blobs). This shows the author thought about real-world data.

      - `trimTempDeltaState` builds a shallow copy rather than mutating the caller-provided event. Correct and safe.

      - The `bufio.Scanner` approach with per-line error tolerance (skip corrupt, log warn, continue) is exactly right for an append-only log. The fallback behavior (nil error, partial events) matches the ADK contract and the acceptance criteria.

      - `jsonlState.All()` clones the map before releasing the read lock and then iterates outside the lock. This is the correct pattern for snapshot iteration — avoids holding a lock during user-supplied yield callbacks.

      - The metadata sidecar design (`<id>.meta.json` for O(1) List vs replaying JSONL) is a clean, well-justified architectural decision. The ADR documents it clearly.

      - Test naming is excellent: `TestGet_should_skip_corrupt_last_line_and_log_warn` and friends read as requirement statements, not implementation descriptions.

      - 17 tests covering all 5 service methods, concurrency, boundary values, and fault tolerance is thorough coverage for MVP scope.

      ### Code Smells Detected

      | Smell | Location | Severity | Treatment |
      |-------|----------|----------|-----------|
      | Dispensable (Dead Init) | `service.go:379` — `copy` shadows built-in | NIT | Rename variable to `evCopy` |
      | Temporary Field | `service.go:291` — `updatedAt: meta.CreatedAt` for List sessions | NIT | Doc comment noting the limitation |

      ### Recommended Next Steps

      1. Wire `cmd/agent` and `cmd/web` to `sessionstore.NewJSONLService("data/sessions")` to complete the stated task (can be done in a follow-up commit or at the start of card 06).
      2. Add `AppName`/`UserID` cross-validation inside `Get` after reading the meta sidecar.
      3. Remove the `time.Sleep` in `TestGet_should_apply_after_filter` (no behavioral change).
      4. Rename `copy` variable in `trimTempDeltaState` to `evCopy` (already the convention used elsewhere in the file).
