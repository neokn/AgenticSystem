acceptance:
  - given: "JSONLService 已初始化，data/sessions/ 目錄存在"
    when: "呼叫 Create，再呼叫 AppendEvent N 次，再重啟 process 後呼叫 Get"
    then: "Get 回傳的 Session.Events().Len() 等於 N，每個 Event 的 Author、Timestamp、Content.Parts 與原始寫入值完全一致"
  - given: "現有 session 的 .jsonl 檔案已有若干行"
    when: "呼叫 AppendEvent 新增一個事件"
    then: "新事件被 append 到檔案末尾（不重寫舊行），AppendEvent 回傳 nil error，且 O_APPEND 保證不截斷現有內容"
  - given: "JSONLService 替換 cmd/telegram 的 InMemoryService"
    when: "Telegram bot 收到一則訊息並完成一輪對話"
    then: "data/sessions/<session-id>.jsonl 檔案存在，用 jq . 可成功解析每一行，且行數等於本輪產生的 ADK event 數"
  - given: ".jsonl 檔案的最後一行為不完整 JSON（模擬程序崩潰）"
    when: "呼叫 Get 載入該 session"
    then: "Get 回傳 nil error，損壞的末行被跳過，其餘事件完整載入，並以 slog.Warn 記錄跳過的行號及原始內容"
  - given: "呼叫 Get 時傳入不存在的 SessionID"
    when: "呼叫 Get"
    then: "Get 回傳 non-nil error，error 訊息包含該 SessionID 字串"
  - given: "AppendEvent 被兩個 goroutine 同時呼叫同一個 session"
    when: "兩次呼叫並行執行"
    then: "兩行都完整寫入檔案，無資料交叉或截斷（以 Get 後 Events().Len()==2 驗證）"
