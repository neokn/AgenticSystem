architecture:
  component: Tool Infrastructure
  layer: Infrastructure (mcpconfig) + Application Layer (appwire wiring)
  pattern: >
    None. Construction is a plain loop: for each ServerConfig, build exec.Cmd, wrap in mcp.CommandTransport, call mcptoolset.New. Only two participants and zero variation axis — no Factory or Builder pattern warranted. See ADR-0008.

  boundary: >
    internal/mcpconfig acts as a thin infrastructure function (not a Port interface) returning a plain value type (*MCPConfig). The Port is tool.Toolset (defined by ADK); mcptoolset.Toolset is the Driven Adapter that implements it. appwire is the wiring site — all ADK and MCP SDK imports stay there, matching the shelltool wiring model.

  notes: |
    ADR: docs/adr/0008-mcp-json-config-loader-and-toolset-wiring.md

    internal/mcpconfig — Infrastructure layer, config side
    - Imports: encoding/json, fmt, os, path/filepath only. No ADK, no MCP SDK.
    - Exports: MCPConfig{Servers []ServerConfig} and
      ServerConfig{Name, Command string, Args []string, Env map[string]string}
    - Load(agentDir string) (*MCPConfig, error)
      - Resolves path: filepath.Join(baseDir, "agents", agentDir, "mcp.json")
        Note: baseDir is NOT passed in; mimic agentdef.Load which takes (baseDir,
        name). Signature should be Load(baseDir, agentDir string) to be consistent.
      - Returns (nil, nil) on os.IsNotExist — the optional-config contract.
      - Validates each entry: Command must be non-empty; error message must contain
        "mcpconfig" and the server name (acceptance criteria requirement).
      - JSON parse error must wrap with "mcpconfig" and "parse" in the message.
    - No package-level state; pure function — consistent with agentdef.Load.

    internal/appwire/wire.go — Application Layer, wiring site
    - After the existing agentdef.Load call, add:
        mcpCfg, err := mcpconfig.Load(cfg.AgentDir, cfg.AgentName)
        if err != nil { return nil, fmt.Errorf("appwire: %w", err) }
    - Build toolsets slice:
        var toolsets []tool.Toolset
        if mcpCfg != nil {
            for _, srv := range mcpCfg.Servers {
                env := append(os.Environ(), envMapToSlice(srv.Env)...)
                cmd := exec.Command(srv.Command, srv.Args...)
                cmd.Env = env
                ts, err := mcptoolset.New(ctx, mcp.NewCommandTransport(cmd))
                if err != nil { return nil, fmt.Errorf("appwire: mcp server %q: %w", srv.Name, err) }
                toolsets = append(toolsets, ts)
            }
        }
    - Pass to llmagent.Config.Toolsets: Toolsets: toolsets
    - Shell tool stays in Config.Tools (unchanged).
    - envMapToSlice is a private helper: turns map[string]string into
      []string{"KEY=val"} — stdlib only, no new package needed.

    agents/demo_agent/mcp.json — example file
    - One entry with a commented-out command (e.g. "npx") for smoke-testing.
    - File is committed; its absence does not break tests (acceptance criterion 4).

    Integration test placement
    - Preferred location: internal/appwire/wire_test.go (existing test file or
      new one) — tests the full wiring path without a real MCP server binary.
    - Use a minimal Go binary compiled via TestMain + exec.Command pattern, or
      a mock that writes valid MCP JSON-RPC to stdout and reads from stdin.
comments:
  - author: jules
    at: 2026-03-23T10:00:00+08:00
    text: |
      Refinement notes:

      Story is well-scoped and does not need splitting. The ADK module (v0.6.0)
      already ships google.golang.org/adk/tool/mcptoolset which handles the full
      MCP-to-ADK tool conversion internally using
      github.com/modelcontextprotocol/go-sdk. The mcp.CommandTransport in that
      SDK takes an *exec.Cmd, which is exactly what we construct from mcp.json.
      The original task "将 MCP tool 轉為 ADK genai.Tool（FunctionDeclaration
      mapping)" is NOT required — that mapping is already done by mcptoolset.

      Splitting considered and rejected:
      - "Start with Dummy" (Strategy 6): hard-coding a single server in appwire
        skips the config file entirely, producing no user-visible value on its own.
      - "Split by Capacity" (Strategy 5): supporting N=1 vs N servers costs
        nothing extra — it is a loop over Servers[]. No savings from splitting.
      - "Simplify Outputs" (Strategy 7): mcptoolset handles tool conversion
        internally; there is no complex output surface to simplify here.

      Six acceptance criteria span two components (mcpconfig loader + appwire
      wiring), which is within single-story scope. All six map 1:1 to unit or
      integration tests.

      Implementation note for James: follow the shelltool pattern (ADR-0006).
      - internal/mcpconfig: pure config loader, imports only encoding/json and
        os. No ADK or MCP SDK imports. Testable in isolation.
      - appwire: imports mcpconfig plus mcptoolset and mcp (go-sdk). All ADK and
        MCP references remain at the wiring site.
      - llmagent.Config has both Tools []tool.Tool and Toolsets []tool.Toolset.
        Shell tool stays in Tools. MCP servers go into Toolsets.
