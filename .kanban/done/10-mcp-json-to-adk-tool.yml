description: |
  As a developer running AgenticSystem, I want to define MCP servers in a
  mcp.json config file so that the agent can call MCP-provided tools without
  hardcoding them in Go source.

  On startup, appwire reads mcp.json from the agent directory (same location as
  agent.prompt). Each entry declares a server name, the command + args to launch
  it, and optional env vars. For each server, appwire constructs a
  mcptoolset.Toolset backed by mcp.CommandTransport and passes it to
  llmagent.Config.Toolsets. The ADK mcptoolset package handles the MCP-to-ADK
  tool conversion internally.

  Scope:
  - stdio transport only (mcp.CommandTransport wrapping exec.Cmd)
  - mcp.json is optional: if the file is absent, appwire starts with zero MCP
    toolsets (no error)
  - env entries are merged into the subprocess environment (inherit + override)
  - No human-approval gate in this story (RequireConfirmation: false)

  Implementation path (matching the shelltool pattern from ADR-0006):
  - internal/mcpconfig: pure config-loading package (no ADK dependency), owns
    mcp.json schema, parsing, and validation. Independently testable.
  - internal/appwire/wire.go: reads config, constructs mcptoolset.Toolset per
    server, passes to llmagent.Config.Toolsets
  - agents/demo_agent/mcp.json: example file for manual verification
acceptance:
  - given: "an agents/demo_agent/mcp.json exists with one server entry (name echo-server, command node, args [echo-server.js])"
    when: appwire.New is called with AgentName "demo_agent"
    then: the returned App's LLM agent has one MCP toolset registered and the toolset's underlying CommandTransport uses the command "node" with argument "echo-server.js"
  - given: an agents/demo_agent/mcp.json exists with two server entries
    when: appwire.New is called with AgentName "demo_agent"
    then: the returned App's LLM agent has two MCP toolsets registered, one per server entry, in the order they appear in mcp.json
  - given: "an agents/demo_agent/mcp.json contains a server entry with an env map {MY_KEY: my_val}"
    when: appwire.New is called
    then: the exec.Cmd passed to mcp.CommandTransport for that server has an Env slice that includes both the process's inherited os.Environ() entries and the additional "MY_KEY=my_val" entry
  - given: no mcp.json file exists in the agents/demo_agent/ directory
    when: appwire.New is called with AgentName "demo_agent"
    then: no error is returned and the App has zero MCP toolsets while the shell tool and memory plugin are still registered normally
  - given: an agents/demo_agent/mcp.json exists but contains invalid JSON
    when: appwire.New is called
    then: an error is returned whose message contains "mcpconfig" and "parse"
  - given: an agents/demo_agent/mcp.json exists with an entry whose "command" field is an empty string
    when: mcpconfig.Load is called
    then: an error is returned whose message identifies the server name and states that "command" must not be empty
