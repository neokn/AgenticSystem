      Architecture decisions recorded in ADR-0008
      (docs/adr/0008-mcp-json-config-loader-and-toolset-wiring.md).

      Two-package split mirrors the shelltool / ADR-0006 pattern exactly:
      - internal/mcpconfig: Infrastructure layer, stdlib only (encoding/json,
        os, path/filepath). Pure config loader with no ADK or MCP SDK imports.
        Independently unit-testable. Returns (nil, nil) on missing file.
      - internal/appwire/wire.go: Application Layer wiring site. All
        mcptoolset and mcp.CommandTransport construction stays here alongside
        the existing shell tool wiring.

      No design pattern applied. The construction is a plain for-range loop
      with one product type and no variation axis. Factory or Builder would add
      indirection with zero benefit for this problem.

      The tool.Toolset interface (ADK) is the implicit Port; mcptoolset.Toolset
      is the Driven Adapter. No additional Port interface is needed because
      appwire already owns the wiring boundary.

      Load(baseDir, agentDir string) signature chosen for consistency with
      agentdef.Load(baseDir, name string). The baseDir pattern ensures tests
      can point at a temp directory without touching the real agents/ tree.

      Labels confirmed: backend, core-logic. James picks this up.
