  - author: jobs
    at: "2026-03-23T13:00:00+08:00"
    text: |-
      ## Code Review by Jobs

      **Overall Assessment:** LGTM WITH COMMENTS
      **Code Health Impact:** Improves

      ### Critical Issues (Must Fix)

      None.

      ### Should Fix

      - `internal/mcpconfig/integration_test.go:46-51` — The integration test constructs a toolset using `mcp.NewInMemoryTransports()` but then separately loads an `mcpconfig.MCPConfig` struct and asserts its field values independently. These are two disconnected verification paths joined in one test function. The test name promises "toolset construction when MCP server is running", but it does not actually verify toolset construction _from_ the loaded config — the `ts` and `cfg` variables are never connected. This makes the test misleading about what it proves. The two paths should either be split into separate tests, or the `ts` construction should be driven from the loaded `cfg` struct values (even with the in-memory transport substitution clearly commented). As written, a bug in the config-to-`exec.Cmd` path in `wire.go` would not be caught by this test.

      - `internal/appwire/wire.go:80` — `append(os.Environ(), envMapToSlice(srv.Env)...)` appends to the slice returned by `os.Environ()`. In Go, `os.Environ()` returns a freshly allocated slice each time, so there is no aliasing problem here. However, the pattern `env := append(os.Environ(), ...)` is subtly risky if someone refactors it to reuse the base slice across loop iterations. The ADR acknowledges the env-snapshot concern; a brief comment at the call site explaining why a fresh `os.Environ()` is called per iteration would help future readers avoid the wrong "optimization".

      ### Nit

      - `internal/mcpconfig/loader_test.go:15` — The helper is named `writeMCPFile` but its doc comment says `writeFile writes content to ...`. Minor copy-paste artifact from an initial draft.

      - `agents/demo_agent/mcp.json:5` — `"env": {}` is an empty object. The `ServerConfig.Env` field is declared `omitempty` in the JSON tag. An empty `{}` in the example file is slightly noisy (it will be preserved on round-trip, though it causes no functional issue). A comment in the ADR or a note in the file itself would help operators know `env` is optional and can be omitted entirely.

      - `internal/appwire/wire.go:84` — `&mcp.CommandTransport{Command: cmd}` uses a struct literal with a named field. This is correct and preferred over positional initialization. No action needed — just confirming it reads as intended.

      ### Good Things

      - The two-package split (`internal/mcpconfig` + wiring in `appwire`) perfectly mirrors the shelltool / ADR-0006 pattern. The stdlib-only constraint on `mcpconfig` is enforced cleanly and makes the unit tests fast and dependency-free.

      - `Load(baseDir, agentDir string)` signature is consistent with `agentdef.Load(baseDir, name string)`. Any developer familiar with one will recognize the other immediately.

      - The `(nil, nil)` optional-config contract for a missing file is documented in both the godoc and the ADR, and tested explicitly. This is the right behavior and it is properly communicated.

      - `envMapToSlice` is a well-named, well-tested private helper. The explicit skip of empty-key entries, tested in `Test_envMapToSlice_should_skip_entries_with_empty_key`, shows defensive thinking.

      - Test naming is consistent with the project convention (`Test_<Subject>_should_<outcome>_when_<condition>`) and the AAA structure is applied uniformly. Judge verified 11/11 passing.

      - ADR-0008 is thorough. The explicit rejection of Factory/Builder with the stated reason (one product, no variation axis) saves the next developer from a speculative-generality refactor.

      - Error messages satisfy the acceptance criteria shape contract (`mcpconfig`, `parse`, server name) and are verified by tests — not just assumed.

      ### Code Smells Detected

      | Smell | Location | Severity | Treatment |
      |-------|----------|----------|-----------|
      | Test does too much / misleading name | `integration_test.go:33-94` | SHOULD_FIX | Split into two focused tests or connect the config load to the transport construction |

      ### Recommended Next Steps

      1. (Should Fix) Refactor `integration_test.go` to make the two verification paths explicit and connected — either split the test or drive `ts` construction from the loaded `cfg` fields.
      2. (Should Fix) Add a one-line comment at `wire.go:80` explaining why `os.Environ()` is called per loop iteration.
      3. (Nit) Fix the `writeMCPFile` doc comment.
      4. (Nit) Remove or omit the empty `"env": {}` from `mcp.json` to reflect the `omitempty` contract in the schema.
