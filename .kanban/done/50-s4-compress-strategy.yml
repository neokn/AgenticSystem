  - author: jobs
    at: "2026-03-22T14:30:00+08:00"
    text: |
      ## Code Review by Jobs

      **Overall Assessment:** LGTM WITH COMMENTS
      **Code Health Impact:** Improves

      ---

      ### Critical Issues (Must Fix)

      None.

      ---

      ### Should Fix

      **compress.go:234 — NewStrategyRegistry injects a nil worker by default**
      The built-in factory in `NewStrategyRegistry` calls `NewGenerational(defaultGenerationalConfig(), nil)`. Any caller who resolves `"generational"` from the registry and immediately calls `Compress` will dereference a nil pointer through `g.worker.Summarize`. The registry comment says callers "must set a real worker before using in production via NewGenerational" — but the registry factory gives back a `Generational` with a nil worker and there is no compile-time or runtime guard against using it. Recommendation: either (a) remove the built-in auto-registration from `NewStrategyRegistry` and require callers to `Register` their own factory with a real worker, or (b) have `Generational.Compress` check `g.worker == nil` and return `(nil, fmt.Errorf("compress worker not initialised"))` with a clear message. Option (b) is safer and preserves the convenience of the built-in registration.

      **compress_test.go:236-246 — TestCompressResult_should_calculate_ratio_correctly does not test the production code path**
      This test constructs a `CompressResult` literal and manually computes the ratio inline in the test body. It does not call `Generational.Compress` at all. If someone removes or changes the ratio calculation in `Compress`, this test continues to pass. The test is a tautology — it is testing the test itself, not the production code. Recommendation: restructure to invoke `Generational.Compress` with a mock worker that returns a known `CandidatesTokenCount` and a known set of turns (each with a `TokenCount`), then assert `result.ActualCompressionRatio` equals the expected value. This is a meaningful delta-test.

      **compress.go:166 — Template execution error is silently discarded**
      In `buildPrompt`, `tmpl.Execute` errors are dropped: `_ = tmpl.Execute(&buf, ...)`. If the template data causes a render error (e.g. a malformed template that passes the parse step but fails on execution), the method returns an empty or partial prompt with no indication that anything went wrong. The caller (`Compress`) then sends this degraded prompt to the LLM, which may return a nonsensical or empty summary that gets stored. Recommendation: log the execution error (slog.Warn) and fall through to the same safe-fallback path used for the parse error, rather than silently accepting a potentially empty buffer.

      ---

      ### Nit

      - `compress.go:275 — Summarize godoc return tag`: Doc comment says `Returns (_, nil, error)` which is unusual Go convention. Standard form is `Returns ("", nil, err)` or simply describe it in prose. Minor wording nit.

      - `compress.go:132-136 — Comment about slice semantics`: "Copies the slice header — does not copy underlying array" is inaccurate because `make` + `copy` does copy the underlying elements. The struct fields are copied by value (ConversationTurn has no pointer fields), so mutations to elements in the returned slice do not affect the original. The comment should say: "Returns a new backing array; element values are copied — modifications to returned elements do not affect the source turns." The intent (caller should not mutate) is good; the explanation is misleading.

      - `compress.go:207 — Cost comment phrasing**: `// Cost calculation is out of scope for MVP` is clear and honest. Nit: consider a TODO tag so static analysis tools surface it: `// TODO(s4): cost calculation out of scope for MVP; leave at zero.`

      - `compress_test.go:89 — Direct struct literal bypasses constructor**: Tests like `TestGenerational_SelectCandidates_*` construct `&Generational{cfg: GenerationalConfig{OldestN: 5}}` directly rather than via `NewGenerational`. This means if the constructor ever acquires a required invariant (e.g. minimum OldestN), tests bypass it. Prefer `NewGenerational(GenerationalConfig{OldestN: 5}, nil)` for non-Compress path tests.

      ---

      ### Good Things

      - **Interface design is excellent.** `CompressStrategy` is properly stateless with I/O injected via parameters. The `compressWorker` interface is correctly package-private, preventing external dependencies from leaking through. This follows ADR-0003 DI guidance faithfully.

      - **Strategy registry error message is user-friendly.** Listing available strategies in the error ("unknown strategy: foo; available: generational") is exactly what an operator needs at configuration time. No hunting through source code.

      - **Prompt template fallback path is safe.** The parse-error fallback in `buildPrompt` guarantees the method always returns a usable string — the system degrades gracefully rather than panicking.

      - **SelectCandidates is clean and correct.** The `make` + `copy` pattern avoids aliasing bugs. All four boundary cases (empty, fewer-than-N, exact-N, more-than-N) are covered.

      - **`WorkerUsageMetadata` decouples domain layer from genai imports.** Mirroring the genai struct in the domain layer is the right call — it keeps `internal/memory` free of genai in non-worker code paths. Directly aligns with the architecture notes.

      - **Test naming reads as requirement statements.** `TestGenerational_SelectCandidates_should_return_empty_when_activeTurns_is_empty` — every test name communicates the behaviour it asserts. AAA structure is consistent throughout.

      - **Context is threaded correctly through the interface.** `Compress(ctx context.Context, ...)` passes `ctx` through to the worker. Many strategy interfaces omit context on inner calls and pay for it later. This implementation gets it right from the start.

      ---

      ### Code Smells Detected

      | Smell | Location | Severity | Treatment |
      |-------|----------|----------|-----------|
      | Speculative Generality (nil-worker registration) | compress.go:234 | SHOULD_FIX | Either require callers to Register with a real worker, or add a nil-guard in Compress with a clear error |
      | Dead / Misleading Test (ratio tautology) | compress_test.go:236-246 | SHOULD_FIX | Rewrite to call Compress with a known mock and assert the computed ratio |
      | Swallowed Error | compress.go:166 | SHOULD_FIX | Log and fall back rather than silently discarding tmpl.Execute error |

      ---

      ### AC8 Log Message Gap (per Judge)

      Judge flagged: AC8 specifies the log message text as `"compress_model_id not set, falling back to primary model"` (snake_case, comma). The implementation emits `"CompressModelID not set; falling back to primary model"` (PascalCase, semicolon) in `profile.go:109`. The functional fallback is correct; only the operator-visible string differs. Per the instruction: noting but not blocking. A follow-up card should either align the message text to the spec or update the spec to reflect the implementation wording, and add a test that captures the slog output (e.g. using a `slog.Handler` in a test helper).

      ---

      ### Recommended Next Steps

      1. **Must address before next dependent card (MemoryPlugin integration):** Add nil-worker guard in `Generational.Compress` — a nil dereference here would surface as a hard crash, not a clean error, in any integration path.
      2. Rewrite `TestCompressResult_should_calculate_ratio_correctly` to test the production code path via `Generational.Compress`.
      3. Add a slog.Warn call (or fall through to the parse-error fallback) when `tmpl.Execute` fails.
      4. Follow-up card: align AC8 log message wording and add a slog-capturing test.
