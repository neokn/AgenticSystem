      Refinement summary:

      ACCEPTANCE CRITERIA ADDITIONS (6 new scenarios added to the original 4):
      - SelectCandidates boundary: fewer turns than N -- must not panic, return all available turns
      - SelectCandidates boundary: empty activeTurns -- return empty slice, never invoke Compress
      - CompressModelID fallback: when unset, use primary model + emit warning log with exact message
      - existingSummary accumulation: prompt must include prior summary so multi-cycle compression
        preserves context (critical for correctness, was implicit in spec but untested)
      - Configurable prompt template: verified at the Worker construction point, not just config load
      - Worker LLM failure: Compress must return (nil, error) -- caller must not receive partial results

      TASK BREAKDOWN CHANGES:
      Original "Implement Compress Worker" was a single task spanning ADK Runner init, model
      selection fallback, and prompt construction. Split into two ~1-hour tasks:
        (a) Runner + LLMAgent creation with model fallback
        (b) Prompt template injection with existingSummary
      Unit tests split into three focused tasks by concern (boundary cases, interface compliance,
      result fields + error paths) to keep each session independent and reviewable.

      SPLITTING DECISION:
      Story not split. 9 tasks are all within internal/memory/compress.go and share the same
      interface boundary. Each task is ~1 hour. All tasks deliver value as a single shippable
      unit (MemoryPlugin cannot compress without this interface). Splitting by "interface only"
      vs "implementation" would create a non-shippable technical slice (Strategy 4 / Slice the
      Hamburger considered and rejected).

      NO architecture label added -- interface design is already specified in the spec
      (see S4 section). Jensen does not need to make new decisions before James can start.
