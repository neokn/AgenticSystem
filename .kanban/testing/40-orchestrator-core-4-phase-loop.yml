id: 40-orchestrator-core
title: "Implement Orchestrator Core — 4-Phase Loop"
labels: [backend, core-logic]
assignee: james
description: |
  Build the Orchestrator — the heart of the dynamic orchestration system. It drives
  a 4-phase loop: Plan → Execute → Evaluate → Respond, with an outer retry loop
  when Phase 3 returns satisfied=false.
acceptance-criteria:
  - Planner returns direct plan → immediate return, no Execute/Evaluate/Respond called
  - Plan → Execute → Evaluate(satisfied=true) → Respond → result returned
  - First Evaluate unsatisfied → retry with feedback → second Evaluate satisfied → Respond
  - Plan says max_retries=1, both evals unsatisfied → still Respond (forced by limit)
  - Plan says max_retries=10 but system limit is 2 → respects system limit
  - Planner returns invalid plan → error propagated
  - Executor returns error → error propagated
  - Domain logic is pure — no ADK/Gemini imports
architecture-notes: |
  Location: internal/core/application/orchestrator/
  Package: orchestrator
  Pure Application Layer — depends only on domain package and converter's TemplateLoader.
  All external concerns abstracted behind interfaces: Planner, Evaluator, Responder, Executor.
