description: "Implement the ADK MemoryPlugin in internal/memory/plugin.go. This is the central\norchestrator for the context window memory manager. It has two responsibilities:\n\n1. AfterModelCallback — store resp.UsageMetadata.TotalTokenCount as lastTotalTokens.\n   This single integer is the baseline for the next turn's estimation.\n\n2. BeforeModelCallback — two-layer token estimation and compression trigger:\n   - Offline (cheap): estimated = lastTotalTokens + genai/tokenizer.CountTokens(new_msg) + max_output_tokens\n   - If estimated < threshold: pass through (never call countTokens API)\n   - If estimated >= threshold: call countTokens API for precise_total\n     - If precise_total < threshold: pass through (false alarm, log it)\n     - If precise_total >= threshold: trigger compression\n\nCompression trigger:\n- Call CompressStrategy.SelectCandidates(activeTurns, targetReclaimTokens)\n- Call CompressStrategy.Compress(candidates, existingSummary, profile)\n- Rewrite req.Contents: [system_prompt + summary + recent_active_turns + user_msg]\n- Update plugin.summaries and plugin.compressedUpToIndex\n\nDesign decisions:\n- Threshold default 80%, configurable at initialization\n- Offline estimator is intentionally conservative (over-triggers API rather than misses)\n- Session history is never mutated (req.Contents rewrite is a view transformation)\n- lastTotalTokens starts at 0 on first turn; formula still works correctly\n- All internal state protected by sync.Mutex for goroutine safety\n\nMetrics emitted (into MemoryMetrics struct):\n- lastTotalTokens (gauge)\n- usageRatio (gauge: lastTotalTokens / context_window_tokens)\n- countTokensAPICallCount (counter)\n- compressTriggerCount (counter)\n- compressReclaimedTokens (histogram entry per compression event)\n\nFile: internal/memory/plugin.go\n"
