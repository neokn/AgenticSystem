acceptance:
  # --- Happy path: AfterModelCallback stores usage ---
  - given: a model turn completes and resp.UsageMetadata.TotalTokenCount is available
    when: AfterModelCallback is invoked
    then: plugin.lastTotalTokens is set to resp.UsageMetadata.TotalTokenCount (verified by reading the field or via a subsequent estimation)
  # --- Happy path: first turn (no prior usage) ---
  - given: plugin.lastTotalTokens is 0 (first turn, no prior AfterModelCallback has run)
    when: BeforeModelCallback is invoked with a new user message
    then: estimated_total = 0 + tokenizer(msg) + max_output_tokens; if estimated_total < threshold the request passes through without calling countTokens API
  # --- Happy path: short conversation, well below threshold ---
  - given: last_total_tokens + tokenizer(new_msg) + max_output_tokens < 80% of context_window_tokens
    when: BeforeModelCallback is invoked
    then: the request passes through unmodified and countTokens API is never called
  # --- Happy path: offline estimate triggers API, API confirms, compression fires ---
  - given: last_total_tokens + tokenizer(new_msg) + max_output_tokens >= 80% of context_window_tokens
    when: countTokens API returns a precise_total also >= 80% of context_window_tokens
    then: CompressStrategy.SelectCandidates and Compress are called; req.Contents is rewritten to [system_prompt + summary + recent_active_turns + user_msg]; plugin.summaries and plugin.compressedUpToIndex are updated
  # --- Edge case: false alarm (offline over-estimates) ---
  - given: offline estimated_total >= 80% threshold triggers countTokens API call
    when: the precise_total returned by countTokens API is < 80% of context_window_tokens
    then: request passes through unmodified (no compression); countTokens API call count metric is incremented, compress_trigger_count is not
  # --- Edge case: AfterModelCallback with nil or missing UsageMetadata ---
  - given: a model response arrives with nil UsageMetadata or TotalTokenCount == 0
    when: AfterModelCallback is invoked
    then: lastTotalTokens retains its previous value (no overwrite with zero); a warning is logged
  # --- Edge case: concurrent safety ---
  - given: two goroutines invoke BeforeModelCallback simultaneously on the same MemoryPlugin instance
    when: both read lastTotalTokens and one updates compressedUpToIndex
    then: no data race is detected (go test -race passes); each callback observes a consistent snapshot of plugin state
  # --- Edge case: configurable threshold ---
  - given: MemoryPlugin is initialized with a custom threshold of 70%
    when: estimated_total reaches 70% of context_window_tokens
    then: the 70% threshold is used for both offline and precise-total comparisons; the 80% default is not applied
architecture:
  component: internal/memory
  layer: Application Layer
  pattern: Plugin (ADK plugin.Plugin) — callback-container pattern; Strategy for CompressStrategy injection
  boundary: |
    Port (inward): CompressStrategy interface — MemoryPlugin calls SelectCandidates + Compress.
    Adapter (driven): *genai.Client — injected at construction; used only in BeforeModelCallback
    second layer (countTokens API call). The ADK plugin system does NOT provide genai.Client
    through CallbackContext or LLMRequest — the plugin must hold its own reference.
    No outward dependency on ADK framework internals beyond the two callback signatures.
  adr: docs/adr/0003-memory-plugin-dependency-injection-and-genai-client.md
  notes: |
    --- LAYER CONFIRMATION ---
    Application Layer: CORRECT. MemoryPlugin orchestrates use-case logic (token estimation,
    threshold decision, compress trigger, req.Contents rewrite). It does not contain domain
    rules (those live in MemoryLayout and CompressStrategy). It depends inward on domain types
    (ModelProfile, MemoryLayout, CompressStrategy) and outward only through the injected
    *genai.Client adapter.

    --- JULES'S QUESTION: genai.Client ACCESS IN BeforeModelCallback ---
    ANSWER: No. Inspected google.golang.org/adk@v0.5.1 (current closest to v0.6 in module
    cache). agent.CallbackContext (agent/context.go) exposes only: ReadonlyContext fields
    (UserContent, InvocationID, AgentName, ReadonlyState, UserID, AppName, SessionID, Branch),
    Artifacts, and State. No genai.Client accessor exists at any level.

    llmagent.BeforeModelCallback signature:
      func(ctx agent.CallbackContext, llmRequest *model.LLMRequest) (*model.LLMResponse, error)
    model.LLMRequest contains: Model string, Contents []*genai.Content, Config, Tools.
    No client reference anywhere in the callback surface.

    The geminiModel struct (model/gemini/gemini.go) holds a private *genai.Client field
    with no public accessor, and model.LLM interface exposes only Name() and GenerateContent().

    DECISION: MemoryPlugin constructor accepts *genai.Client directly (see ADR-0003).
    The same client instance created for gemini.NewModel is passed to NewMemoryPlugin.
    This is explicit DI — no global state, fully testable.

    countTokens API call (second layer of BeforeModelCallback):
      resp, err := p.client.Models.CountTokens(ctx, p.profile.ModelID, req.Contents, nil)
      preciseTotal := int(resp.TotalTokens) + p.profile.MaxOutputTokens

    --- DEPENDENCY INJECTION: CONSTRUCTOR SIGNATURE ---
    func NewMemoryPlugin(
        client    *genai.Client,
        layout    MemoryLayout,
        strategy  CompressStrategy,
        profile   ModelProfile,
        threshold float64,  // pass 0 to use default 0.80
    ) (*MemoryPlugin, error)

    All five dependencies are injected at construction. None are optional or mutable after
    construction except internal mutable state (lastTotalTokens, summaries, compressedUpToIndex)
    which is protected by sync.Mutex.

    --- STATE MANAGEMENT AND sync.Mutex ---
    Jules's sync.Mutex is CORRECT. ADK runners can invoke callbacks concurrently (the spec
    notes "two goroutines invoke BeforeModelCallback simultaneously" as an explicit test case).
    The Mutex must guard ALL reads and writes to: lastTotalTokens, summaries,
    compressedUpToIndex. See locking discipline below:

    AfterModelCallback:
      p.mu.Lock(); defer p.mu.Unlock()
      Read: none of mutable state used for decision
      Write: lastTotalTokens (guard: only write if value > 0)

    BeforeModelCallback (offline layer):
      p.mu.Lock()
      snapshot := p.lastTotalTokens   // read under lock
      p.mu.Unlock()
      estimated := snapshot + msgTokens + p.profile.MaxOutputTokens
      if estimated < threshold: return nil   // fast path, no re-lock needed

    BeforeModelCallback (online layer + compress trigger):
      Call countTokens API (no lock held — network I/O)
      If compress needed:
        p.mu.Lock(); defer p.mu.Unlock()
        Write: summaries, compressedUpToIndex (after compress)
        Re-read: lastTotalTokens not needed here (compression rewrite is independent)

    NOTE: Do NOT hold mu across the countTokens API call. Network I/O under a mutex
    would serialize all concurrent callers. Snapshot the integer under lock, release,
    then call the network.

    --- BOUNDARY: WHO OWNS summaries STATE ---
    MemoryPlugin owns summaries []string and compressedUpToIndex int.
    CompressStrategy is stateless — it receives candidates + existingSummary as parameters
    and returns *CompressResult. It does not hold or mutate the summaries slice.
    This is the correct boundary: CompressStrategy is a pure algorithm; MemoryPlugin is
    the stateful orchestrator that applies algorithm results to its own state.

    The existingSummary string passed to Compress is the last element of p.summaries
    (or "" on first compression). After a successful Compress call, MemoryPlugin appends
    CompressResult.CompressedText to p.summaries and advances p.compressedUpToIndex.

    --- STRUCT DEFINITION (authoritative) ---
    type MemoryPlugin struct {
        // injected dependencies (immutable after construction)
        client   *genai.Client
        layout   MemoryLayout
        strategy CompressStrategy
        profile  ModelProfile
        threshold float64

        // mutable state — all reads/writes under mu
        mu                  sync.Mutex
        lastTotalTokens     int
        summaries           []string
        compressedUpToIndex int

        // metrics — writes under mu, reads via GetSnapshot (copies under mu)
        metrics MemoryMetrics
    }
