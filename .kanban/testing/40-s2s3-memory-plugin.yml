    text: "Refinement notes for card 40-s2s3-memory-plugin:\n\nSPLITTING DECISION: Not split. Although the card has 10 tasks, all tasks form\na single inseparable deployable unit — AfterModel and BeforeModel must both work\nfor the plugin to deliver any value. CompressStrategy (S4) is already a separate\ncard. The depends-on relationship handles the build order.\n\nACCEPTANCE CRITERIA ADDITIONS:\n1. First-turn edge case: lastTotalTokens starts at 0; the offline estimator must\n   handle this correctly (estimated = 0 + tokenizer(msg) + max_output_tokens).\n   This is safe by design but must be explicitly tested.\n\n2. Nil/zero UsageMetadata guard: AfterModelCallback must not overwrite\n   lastTotalTokens with 0 when the API returns missing metadata — the previous\n   value is more useful than zero for the next estimation.\n\n3. Race condition / goroutine safety: sync.Mutex is required on all reads and\n   writes to lastTotalTokens, summaries, compressedUpToIndex. Test with\n   go test -race.\n\n4. Configurable threshold: the 80% default must be a constructor parameter\n   with validation, not a hardcoded constant.\n\nTASK ADDITIONS vs original card:\n- Added sync.Mutex to the struct definition task\n- Split the BeforeModelCallback into two explicit tasks (offline layer,\n  online layer) with their respective pass-through conditions\n- Added MemoryMetrics struct as an explicit task (spec section: Observability)\n- Explicitly required go test -race in the test task\n\nNOTE FOR JENSEN: No architecture review required. The spec is clear on the\ncomponent boundary. CompressStrategy is injected via constructor (DI), making\nthis unit-testable with a stub. The countTokens API call should use the same\ngenai.Client already held by the main Runner — confirm the ADK v0.6 Plugin\ninterface gives access to the client in BeforeModelCallback context, or whether\na separate client reference must be stored in the plugin struct.\n"
