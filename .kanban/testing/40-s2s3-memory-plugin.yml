  - author: jobs
    at: '2026-03-22T15:30:00+08:00'
    text: '## Code Review by Jobs


      **Overall Assessment:** REQUEST CHANGES

      **Code Health Impact:** Improves (conditionally — pending fixes)


      ---


      ### Step 0: Developer Self-Check


      CL is appropriately scoped: one plugin, one test file. The card description is thorough. All 10 tasks are marked done. Tests are in the same CL. `go test -race` passes. No self-check failures.


      ---


      ### Step 1: Broad View


      Well-structured implementation. The two-layer estimation strategy is correctly realized: offline fast-path -> countTokens API -> compression. The DI pattern (tokenCounter + apiTokenCounter interfaces + newMemoryPluginWithDeps) is exactly right for testability without a real genai.Client. The struct matches the authoritative definition in the architecture notes. ADR-0003 is faithfully implemented.


      ---


      ### Step 2: Main Part — plugin.go


      The largest logical changes are in runBeforeModel and triggerCompression. Design is sound. No fundamental design issues. Three functional bugs found — detailed below.


      ---


      ### Step 3: Detailed Review — 8 Dimensions


      #### 1. Design


      SOLID. Separation of concerns is clean:

      - MemoryPlugin is the stateful orchestrator (correct Application Layer)

      - CompressStrategy is stateless (correct)

      - tokenCounter / apiTokenCounter interfaces isolate I/O (correct DI)

      - newMemoryPluginWithDeps is the correct test seam


      Note: ADR-0003 drafted metrics as `*MemoryMetrics` (pointer). The implementation uses `metrics MemoryMetrics` (value embedded in struct). This is better — no separate heap allocation, GetSnapshot copies it correctly under lock. The ADR sketch was illustrative. No issue.


      BuildPlugin (plugin.go:153) silently discards the error from plugin.New. If plugin.New fails, the returned plugin may be nil or invalid and the caller has no way to detect it. Should fix.


      #### 2. Functionality


      **Mutex discipline — correct:**

      - plugin.go:250-252: snapshot lastTotalTokens under lock, release before network I/O. CORRECT.

      - plugin.go:267: countTokens API call with no lock held. CORRECT.

      - plugin.go:276-278: separate lock for metrics counter increment. Safe — no deadlock risk, no two locks held simultaneously. CORRECT.

      - plugin.go:327-332: compression state update under mu. CORRECT.

      - AfterModelCallback: nil resp guard, nil UsageMetadata guard, total <= 0 guard, lock wraps only the write. ALL CORRECT.


      **BUG 1 (Should Fix) — plugin.go:298:**

      `contentsToTurns(req.Contents)` passes ALL of req.Contents to activeTurns, including the last user message (the new turn about to be sent). This means SelectCandidates and Compress may select the brand-new user message as a compression candidate — incorrect behavior. Fix: pass `req.Contents[:len(req.Contents)-1]` to contentsToTurns.


      **BUG 2 (Should Fix) — plugin.go:349 / countMsgTokens:**

      On tokenizer failure, countMsgTokens returns 0. This makes the offline estimate `lastTotal + 0 + maxOutput` — an under-estimate. The spec states the offline estimator is "intentionally conservative (over-triggers API rather than misses)." Returning 0 is the opposite: it under-estimates and may silently skip the API call entirely. Fix: on tokenizer error, return a conservative fallback (e.g. p.profile.MaxOutputTokens) so the API layer is always triggered. The inline comment "Returns 0 on error (conservative)" is also factually wrong and must be corrected.


      **BUG 3 (Should Fix) — buildCompressedContents plugin.go:414:**

      When Config.SystemInstruction is present, the code prepends it to result. However, if ADK already encodes SystemInstruction as the first element of req.Contents, it would appear in recentActive and also be prepended again, resulting in a duplicate system prompt in the rewritten Contents. Verify whether ADK materializes SystemInstruction in req.Contents or keeps it exclusively in Config, and guard accordingly (e.g. only prepend if it is not already contents[0]).


      #### 3. Complexity


      runBeforeModel is 52 lines with clearly delineated layers and inline comments matching the architecture notes. Complexity is appropriate. triggerCompression is well extracted. No simplification needed.


      contentText (plugin.go:383-388) uses `s += part.Text` string concatenation in a loop. For production use with many parts this allocates O(n) strings. Nit: use strings.Builder.


      #### 4. Tests


      Coverage is excellent. All 8 acceptance criteria have direct test coverage per Judge''s report. Stubs are clean and minimal.


      The activeTurns bug (Bug 1) means TestBeforeModelCallback_TriggersCompression_WhenPreciseTotalAboveThreshold does not catch that the new user message is being passed to SelectCandidates — it only checks len(req.Contents) != 0 and compressCalls == 1, not which turns were selected. A test asserting the exact structure of req.Contents after compression (roles, order, no duplication) is missing and should be added.


      The concurrent safety test is correct and well-structured.


      #### 5. Naming


      Good overall. Nit: struct field names `tc` and `ac` are terse; `localCounter` / `apiCounter` would be marginally clearer at usage sites.


      #### 6. Comments


      All function-level comments explain why, not just what. The locking discipline comment on the MemoryPlugin struct doc is excellent. The comment at plugin.go:349 ("Returns 0 on error (conservative)") is factually incorrect and must be updated together with the behavior fix.


      #### 7. Style and Consistency


      Follows Go idioms throughout. Section dividers match the rest of the package. No style issues.


      #### 8. Documentation


      No user-facing behavior changes. No documentation update required. Struct doc is comprehensive.


      ---


      ### Critical Issues (Must Fix)


      None that are system-breaking, but the three functional bugs below must be addressed before merge.


      ---


      ### Should Fix


      1. `plugin.go:298` — contentsToTurns receives all of req.Contents including the new user message. activeTurns passed to SelectCandidates therefore includes the message about to be sent — incorrect. Fix: `contentsToTurns(req.Contents[:len(req.Contents)-1])`.


      2. `plugin.go:349` — countMsgTokens returns 0 on tokenizer error, making the offline estimator optimistic (under-estimates). Fix: return a conservative fallback on error (e.g. `p.profile.MaxOutputTokens`). Also correct the comment.


      3. `plugin.go:153` — BuildPlugin silently discards the error from plugin.New. Fix: return `(*plugin.Plugin, error)` and propagate.


      4. `plugin.go:414` — buildCompressedContents may prepend SystemInstruction from Config AND include it again if ADK already embedded it in req.Contents. Verify ADK behavior and guard against duplication.


      5. `plugin_test.go` — Add a test asserting the exact req.Contents structure after compression: correct roles, correct order, new user message appears exactly once, no system prompt duplication.


      ---


      ### Nit


      1. `plugin.go:383` — contentText uses `s += part.Text` in a loop. Prefer strings.Builder.

      2. `plugin.go:79-80` — `tc` / `ac` are terse field names. `localCounter` / `apiCounter` would be clearer.

      3. `plugin_test.go:64` — stubCompressStrategy uses `selectMu` to protect both selectCalls and compressCalls. Rename to `callsMu` for accuracy.


      ---


      ### Good Things


      - The two-interface DI pattern (tokenCounter + apiTokenCounter) is textbook testable Go. 100% unit coverage without a real genai.Client. Exactly right.

      - Mutex discipline is precisely correct: snapshot under lock, release, I/O, re-acquire only for writes. A subtle concurrency pattern executed cleanly.

      - GetSnapshot deep-copies CompressReclaimedTokens — preventing callers from accidentally mutating internal state. Defensive and correct.

      - The false alarm path is correctly handled: metric increment + pass-through, matching the spec precisely.

      - Test naming follows the project convention (TestSubject_Behavior_WhenCondition) across all 25 tests consistently.

      - existingSummary is read under lock then released before Compress is called — the same lock discipline as BeforeModel. This detail could have been missed; it was not.


      ---


      ### Code Smells Detected


      | Smell | Location | Severity | Treatment |

      |-------|----------|----------|-----------|

      | Incorrect comment describing opposite behavior | plugin.go:349 | SHOULD_FIX | Fix comment and behavior together |

      | Silent error discard | plugin.go:153 BuildPlugin | SHOULD_FIX | Return the error; callers must know if plugin registration fails |


      ---


      ### Recommended Next Steps


      1. Fix contentsToTurns call in triggerCompression to exclude the last user message: `req.Contents[:len(req.Contents)-1]` (plugin.go:298).

      2. Confirm ADK behavior re SystemInstruction in req.Contents — add guard in buildCompressedContents (plugin.go:414).

      3. Fix countMsgTokens to return a conservative fallback on tokenizer error, not 0 (plugin.go:349).

      4. Change BuildPlugin to return `(*plugin.Plugin, error)` and propagate plugin.New error (plugin.go:152).

      5. Add a test asserting the exact structure of req.Contents after compression.

