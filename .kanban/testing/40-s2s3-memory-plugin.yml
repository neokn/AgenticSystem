acceptance:
  - given: a model turn completes and resp.UsageMetadata.TotalTokenCount is available
    when: AfterModelCallback is invoked
    then: plugin.lastTotalTokens is set to resp.UsageMetadata.TotalTokenCount (verified by reading the field or via a subsequent estimation)
  - given: plugin.lastTotalTokens is 0 (first turn, no prior AfterModelCallback has run)
    when: BeforeModelCallback is invoked with a new user message
    then: estimated_total = 0 + tokenizer(msg) + max_output_tokens; if estimated_total < threshold the request passes through without calling countTokens API
  - given: last_total_tokens + tokenizer(new_msg) + max_output_tokens < 80% of context_window_tokens
    when: BeforeModelCallback is invoked
    then: the request passes through unmodified and countTokens API is never called
  - given: last_total_tokens + tokenizer(new_msg) + max_output_tokens >= 80% of context_window_tokens
    when: countTokens API returns a precise_total also >= 80% of context_window_tokens
    then: CompressStrategy.SelectCandidates and Compress are called; req.Contents is rewritten to [system_prompt + summary + recent_active_turns + user_msg]; plugin.summaries and plugin.compressedUpToIndex are updated
  - given: offline estimated_total >= 80% threshold triggers countTokens API call
    when: the precise_total returned by countTokens API is < 80% of context_window_tokens
    then: request passes through unmodified (no compression); countTokens API call count metric is incremented, compress_trigger_count is not
  - given: a model response arrives with nil UsageMetadata or TotalTokenCount == 0
    when: AfterModelCallback is invoked
    then: lastTotalTokens retains its previous value (no overwrite with zero); a warning is logged
  - given: two goroutines invoke BeforeModelCallback simultaneously on the same MemoryPlugin instance
    when: both read lastTotalTokens and one updates compressedUpToIndex
    then: no data race is detected (go test -race passes); each callback observes a consistent snapshot of plugin state
  - given: MemoryPlugin is initialized with a custom threshold of 70%
    when: estimated_total reaches 70% of context_window_tokens
    then: the 70% threshold is used for both offline and precise-total comparisons; the 80% default is not applied
architecture:
  component: internal/memory
  layer: Application Layer
  pattern: Plugin (ADK plugin.Plugin) — callback-container pattern; Strategy for CompressStrategy injection
  boundary: 'Port (inward): CompressStrategy interface — MemoryPlugin calls SelectCandidates + Compress.

    Adapter (driven): *genai.Client — injected at construction; used only in BeforeModelCallback

    second layer (countTokens API call). The ADK plugin system does NOT provide genai.Client

    through CallbackContext or LLMRequest — the plugin must hold its own reference.

    No outward dependency on ADK framework internals beyond the two callback signatures.

'
  adr: docs/adr/0003-memory-plugin-dependency-injection-and-genai-client.md
  notes: "--- LAYER CONFIRMATION ---\nApplication Layer: CORRECT. MemoryPlugin orchestrates use-case logic (token estimation,\nthreshold decision, compress trigger, req.Contents rewrite). It does not contain domain\nrules (those live in MemoryLayout and CompressStrategy). It depends inward on domain types\n(ModelProfile, MemoryLayout, CompressStrategy) and outward only through the injected\n*genai.Client adapter.\n\n--- JULES'S QUESTION: genai.Client ACCESS IN BeforeModelCallback ---\nANSWER: No. Inspected google.golang.org/adk@v0.5.1 (current closest to v0.6 in module\ncache). agent.CallbackContext (agent/context.go) exposes only: ReadonlyContext fields\n(UserContent, InvocationID, AgentName, ReadonlyState, UserID, AppName, SessionID, Branch),\nArtifacts, and State. No genai.Client accessor exists at any level.\n\nllmagent.BeforeModelCallback signature:\n  func(ctx agent.CallbackContext, llmRequest *model.LLMRequest) (*model.LLMResponse, error)\nmodel.LLMRequest contains: Model string, Contents []*genai.Content, Config, Tools.\nNo client reference anywhere in the callback surface.\n\nThe geminiModel struct (model/gemini/gemini.go) holds a private *genai.Client field\nwith no public accessor, and model.LLM interface exposes only Name() and GenerateContent().\n\nDECISION: MemoryPlugin constructor accepts *genai.Client directly (see ADR-0003).\nThe same client instance created for gemini.NewModel is passed to NewMemoryPlugin.\nThis is explicit DI — no global state, fully testable.\n\ncountTokens API call (second layer of BeforeModelCallback):\n  resp, err := p.client.Models.CountTokens(ctx, p.profile.ModelID, req.Contents, nil)\n  preciseTotal := int(resp.TotalTokens) + p.profile.MaxOutputTokens\n\n--- DEPENDENCY INJECTION: CONSTRUCTOR SIGNATURE ---\nfunc NewMemoryPlugin(\n    client    *genai.Client,\n    layout    MemoryLayout,\n    strategy  CompressStrategy,\n    profile   ModelProfile,\n    threshold float64,  // pass 0 to use default 0.80\n) (*MemoryPlugin, error)\n\nAll five dependencies are injected at construction. None are optional or mutable after\nconstruction except internal mutable state (lastTotalTokens, summaries, compressedUpToIndex)\nwhich is protected by sync.Mutex.\n\n--- STATE MANAGEMENT AND sync.Mutex ---\nJules's sync.Mutex is CORRECT. ADK runners can invoke callbacks concurrently (the spec\nnotes \"two goroutines invoke BeforeModelCallback simultaneously\" as an explicit test case).\nThe Mutex must guard ALL reads and writes to: lastTotalTokens, summaries,\ncompressedUpToIndex. See locking discipline below:\n\nAfterModelCallback:\n  p.mu.Lock(); defer p.mu.Unlock()\n  Read: none of mutable state used for decision\n  Write: lastTotalTokens (guard: only write if value > 0)\n\nBeforeModelCallback (offline layer):\n  p.mu.Lock()\n  snapshot := p.lastTotalTokens   // read under lock\n  p.mu.Unlock()\n  estimated := snapshot + msgTokens + p.profile.MaxOutputTokens\n  if estimated < threshold: return nil   // fast path, no re-lock needed\n\nBeforeModelCallback (online layer + compress trigger):\n  Call countTokens API (no lock held — network I/O)\n  If compress needed:\n    p.mu.Lock(); defer p.mu.Unlock()\n    Write: summaries, compressedUpToIndex (after compress)\n    Re-read: lastTotalTokens not needed here (compression rewrite is independent)\n\nNOTE: Do NOT hold mu across the countTokens API call. Network I/O under a mutex\nwould serialize all concurrent callers. Snapshot the integer under lock, release,\nthen call the network.\n\n--- BOUNDARY: WHO OWNS summaries STATE ---\nMemoryPlugin owns summaries []string and compressedUpToIndex int.\nCompressStrategy is stateless — it receives candidates + existingSummary as parameters\nand returns *CompressResult. It does not hold or mutate the summaries slice.\nThis is the correct boundary: CompressStrategy is a pure algorithm; MemoryPlugin is\nthe stateful orchestrator that applies algorithm results to its own state.\n\nThe existingSummary string passed to Compress is the last element of p.summaries\n(or \"\" on first compression). After a successful Compress call, MemoryPlugin appends\nCompressResult.CompressedText to p.summaries and advances p.compressedUpToIndex.\n\n--- STRUCT DEFINITION (authoritative) ---\ntype MemoryPlugin struct {\n    // injected dependencies (immutable after construction)\n    client   *genai.Client\n    layout   MemoryLayout\n    strategy CompressStrategy\n    profile  ModelProfile\n    threshold float64\n\n    // mutable state — all reads/writes under mu\n    mu                  sync.Mutex\n    lastTotalTokens     int\n    summaries           []string\n    compressedUpToIndex int\n\n    // metrics — writes under mu, reads via GetSnapshot (copies under mu)\n    metrics MemoryMetrics\n}\n"
