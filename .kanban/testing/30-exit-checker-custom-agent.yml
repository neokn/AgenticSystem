id: 30-exit-checker-custom-agent
title: "Implement Exit-Checker Custom Agent"
labels: [backend, core-logic]
assignee: james
description: |
  Custom agent that enables LoopAgent early termination. ADK's LoopAgent only
  terminates early when a sub-agent emits an event with Actions.Escalate = true.
  BeforeAgentCallback CANNOT trigger escalation (ADK v1.0.0 limitation).

  The exit-checker is injected by PlanConverter as the last sub-agent in a loop
  body. It checks session state for a pattern match and escalates if found.
acceptance-criteria:
  - NewExitChecker returns a non-nil agent.Agent
  - exitCheckShouldEscalate returns true when val contains pattern
  - exitCheckShouldEscalate returns false when val does not contain pattern
  - exitCheckShouldEscalate returns false when val is empty
  - exitCheckShouldEscalate returns false when pattern is empty
  - Session state is read via State().Get() (interface, not map access)
  - Escalation event emitted with Actions.Escalate = true when condition met
architecture-notes: |
  Location: internal/core/application/orchestrator/exitchecker.go
  Package: orchestrator
  Uses agent.New (custom agent) — ADK import required.
  State read via ctx.Session().State().Get() — session.State is an interface.
tasks:
  - description: "Write tests for NewExitChecker constructor and exitCheckShouldEscalate predicate"
    done: true
  - description: "Implement exitchecker.go with NewExitChecker and exitCheckShouldEscalate"
    done: true
