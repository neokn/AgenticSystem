        internal/sessionstore/service.go    — JSONLService, jsonlSession, jsonlEvents, jsonlState, trimTempDeltaState, extractStateDeltas, mergeStates
        internal/sessionstore/service_test.go — 17 unit tests (all pass)

      Files modified:
        cmd/telegram/main.go — replaced session.InMemoryService() with sessionstore.NewJSONLService("data/sessions")

      Pattern applied: Adapter (driven adapter) — JSONLService implements session.Service port defined by ADK.

      Key design decisions:
        - ADK internal/sessionutils is module-internal; extractStateDeltas and mergeStates are reimplemented locally.
        - O_APPEND per-call open-write-close; no persistent fd; kernel serialises concurrent writes.
        - Corrupt JSONL lines skipped with slog.Warn (Level 1 fault tolerance on read path).
        - session.Session interface implemented by jsonlSession (mirrors database/localSession pattern).

