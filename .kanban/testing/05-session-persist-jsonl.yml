description: |
  目前所有 entrypoint（cmd/agent, cmd/web, cmd/telegram）都使用
  session.InMemoryService()，對話結束即消失。

  最小可行版本：用 JSONL（每行一個 JSON object）格式將對話 turns
  儲存到本地檔案。每個 session 一個 .jsonl 檔案，每輪對話 append
  一行，重啟時讀回來恢復 session 狀態。

  JSONL 的優勢：
  - append-only 寫入，不需要讀-改-寫整個檔案
  - 每行獨立解析，檔案損壞時只丟最後一行
  - 可直接用 grep/jq 查詢，debug 友好
  - 是 GFS 分層策略（卡 90）的前置依賴

  儲存路徑：data/sessions/<session-id>.jsonl
  每行格式：序列化完整 session.Event（含 Content, Actions.StateDelta）

  Notes (from refinement):
  - JSONL line schema must serialise the full session.Event (not just text+role),
    because ADK runner and plugins read event.Actions.StateDelta and
    event.Content.Parts (which can be function calls, not just text).
  - session.Session interface requires State (app/user/session scopes),
    Events (ordered list), and LastUpdateTime — the JSONL file stores events;
    state deltas are replayed from StateDelta fields on load.
  - AppendEvent is the hot path (called after every ADK event); file must be
    opened in O_APPEND mode so no read-modify-write occurs.
  - Splitting decision: Telegram per-chat session reuse is split to card 06
    (depends on this card). This card wires JSONLService into all three
    entrypoints as a drop-in replacement only — session lifecycle logic
    (one session per chat) is handled in card 06.
architecture:
  component: SessionStore
  layer: Infrastructure
  pattern: "Adapter — JSONLService is a driven adapter that implements the session.Service port (defined by ADK) and injects persistence behaviour into the Application Core. No additional design pattern is needed; the interface is already well-defined by ADK and has only one implementation here."
  boundary: |
    Port (inbound contract, owned by ADK):
      session.Service — Create / Get / List / Delete / AppendEvent

    Adapter (outbound, owned by this project):
      internal/sessionstore.JSONLService — implements session.Service
      File layout: data/sessions/<session-id>.jsonl (events) +
                   data/sessions/<session-id>.meta.json (identity sidecar)

    Driving side (callers):
      cmd/agent/main.go, cmd/web/main.go, cmd/telegram/main.go —
      each receives a session.Service value; swap InMemoryService() -> JSONLService("data/sessions")
  notes: |
    Concrete session type:
      session.Session is an interface; the ADK-internal *session.session is
      unexported. JSONLService must define its own jsonlSession struct
      implementing session.Session (ID, AppName, UserID, State, Events,
      LastUpdateTime), following the same pattern as session/database.localSession.

    File structure per session:
      data/sessions/<id>.jsonl   — one JSON line per session.Event (append-only)
      data/sessions/<id>.meta.json — {"app_name":"...","user_id":"...","session_id":"...","created_at":"..."}

    Rationale for metadata sidecar:
      List(AppName, UserID) must enumerate sessions without replaying event
      files. Reading a small JSON sidecar is O(1); it avoids scanning JSONL.

    State replay on Get:
      1. Read <id>.meta.json to validate AppName/UserID/SessionID.
      2. Read <id>.jsonl line by line; unmarshal each line into *session.Event.
         On json.Unmarshal error: log slog.Warn with line number and raw bytes,
         skip the line, continue.
      3. For each event, call sessionutils.ExtractStateDeltas(event.Actions.StateDelta)
         to split into app/user/session deltas. Accumulate separately.
      4. After all lines: call sessionutils.MergeStates(appState, userState, sessionState)
         to build the final state map for the returned Session.
      5. Apply NumRecentEvents and After filters in-memory (post-replay).

    AppendEvent behaviour:
      - Skip if event.Partial == true (matches ADK contract).
      - Strip temp: keys from StateDelta before serialising
        (call trimTempDeltaState equivalent).
      - Open file with os.O_WRONLY|os.O_CREATE|os.O_APPEND; write JSON line + '\n'.
      - Close file after each write (no persistent handle); O_APPEND is atomic
        for single-line writes <= PIPE_BUF (~4 KB), so no mutex needed.

    Concurrency guarantee for acceptance criterion:
      Two goroutines calling AppendEvent on the same session: each opens the
      file independently with O_APPEND; the kernel serialises the two writes at
      the VFS level. Each complete line arrives intact. Get after both calls
      returns Events().Len() == 2.

    No caching layer (MVP constraint):
      Every Get replays the full JSONL file. Acceptable for session lengths
      typical in LLM conversations (tens to low hundreds of events).

    ADR: docs/adr/0007-jsonl-session-store.md
