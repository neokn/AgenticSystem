description: |
  Execute the package migration defined in ADR from card 01a. Move all packages
  from their current flat internal/ location into the four-layer structure, update
  all import paths, and verify that the dependency direction rule is enforced:

    Interface -> Application -> Domain <- Infrastructure

  Target directory structure (no new external dependencies added):

    internal/
      domain/
        ports.go         — port interfaces (AgentLoader, ToolProvider)
      app/
        appwire/         — moved from internal/appwire/ (assembly only, no inline logic)
      infra/
        agentdef/        — moved from internal/agentdef/
        mcpconfig/       — moved from internal/mcpconfig/
        memory/          — moved from internal/memory/
        sessionstore/    — moved from internal/sessionstore/
        shelltool/       — moved from internal/shelltool/
        debugplugin/     — extracted from appwire/wire.go (the inline debug plugin)

  The debug plugin currently defined inline in appwire/wire.go (~70 lines) must be
  extracted into internal/infra/debugplugin/plugin.go so that appwire contains
  only assembly logic.

  This is a PURE STRUCTURAL REFACTOR. No behaviour changes, no new features.
  Every existing test must pass after migration.

  Value: After this card lands, all subsequent multi-agent cards (05, 15, 20, 25, 35)
  can add components in the correct layer without violating architecture boundaries.
acceptance:
  - given: All packages have been moved to their target layer directories
    when: go build ./... is run
    then: Build succeeds with zero errors and zero changes to go.mod (no new dependencies, no removed dependencies)
  - given: The migration is complete
    when: go test ./... is run
    then: All existing tests pass with zero failures; no test files are deleted or have their assertions changed
  - given: The dependency direction rule must hold
    when: Any file under internal/domain/ is inspected for its import statements
    then: No file in internal/domain/ imports any path containing internal/infra/, internal/app/, google.golang.org/adk, google.golang.org/genai, or any MCP SDK package
  - given: appwire is responsible for assembly only
    when: internal/app/appwire/wire.go is read
    then: "The file contains no inline plugin.Config BeforeModelCallback literals; the debug plugin is imported from internal/infra/debugplugin/"
  - given: The old flat package paths no longer exist
    when: ls of the six original package directories is run
    then: Each path returns no such file or directory (all old paths are removed)
  - given: cmd/ entrypoints must stay thin
    when: Any file under cmd/ is inspected
    then: No cmd/ file imports any path under internal/infra/; all infra access goes through internal/app/appwire
