id: 20-plan-converter
title: "Implement PlanConverter — PlanNode to AgentNodeConfig"
labels: [backend, core-logic]
assignee: james
description: |
  Build a converter that transforms a PlanNode tree (from Root LLM JSON output)
  into an AgentNodeConfig tree that the existing Builder can consume to construct
  ADK agents.
acceptance-criteria:
  - step PlanNode maps to AgentNodeConfig with Type AgentTypeLLM
  - sequential PlanNode maps to AgentNodeConfig with Type AgentTypeSequential
  - loop PlanNode maps to AgentNodeConfig with Type AgentTypeLoop
  - parallel PlanNode maps to AgentNodeConfig with Type AgentTypeParallel
  - Auto-generated names are unique (depth-first counter)
  - Template loader used when role has a template (instruction appended)
  - Direct instruction used when no template exists
  - Loop with exit_condition injects exit_checker_<N> sub-agent at end of body
  - Loop body wrapped in a sequential agent
  - Two steps with same role get different auto-generated names
architecture-notes: |
  Location: internal/core/application/orchestrator/
  Package: orchestrator
  Pure function — no I/O, no ADK imports.
  TemplateLoader is a func type (port-style injection).
