title: "S6: OOM Handler（Graceful Degradation）"
labels: [backend, core-logic]
depends-on: [40-s2s3-memory-plugin, 50-s4-compress-strategy]
completed-by:
  backlog: "jules"
  in-progress: james
  testing: judge
acceptance:
  # --- Happy path ---
  - given: 正常壓縮後 precise_total 仍 >= 90% context window，且 SUMMARY segment 非空
    when: OOM handler 觸發
    then: >
      對現有 SUMMARY 執行二次壓縮（summary of summary）， 壓縮完成後重新計算 precise_total； assert precise_total < 90% * context_window_tokens 且 req.Contents 已更新為包含新摘要的版本

  - given: 二次壓縮後 precise_total 仍 >= 90% context window
    when: OOM handler 繼續執行
    then: >
      BeforeModelCallback 回傳 (*llm.LLMResponse, error)， 其中 LLMResponse.Content 包含型別為 OOMWarningEvent 的 custom event， 欄位包含 UsageRatio float64、Recommendation string（值為 "start a new conversation"）； callback 不修改也不截斷 req.Contents

  - given: 設定檔中 emergency_threshold_pct 設為 85（非預設 90）
    when: 正常壓縮後 precise_total 為 87% context window
    then: OOM handler 被觸發（使用自訂閾值而非預設值）
  # --- Edge cases / failure scenarios ---
  - given: SUMMARY segment 為空（對話尚未產生過任何摘要）
    when: OOM handler 觸發，嘗試對 SUMMARY 執行二次壓縮
    then: >
      跳過二次壓縮步驟（無內容可壓）， 直接進入 OOMWarning 路徑； 不得 panic，不得回傳 nil event

  - given: 二次壓縮後 SUMMARY token 數與壓縮前相差 < 5%（壓縮已達極限）
    when: OOM handler 評估二次壓縮結果
    then: >
      視為壓縮無效（maximally compressed）， 立即跳至 OOMWarning，不再重試壓縮； CompressResult.ActualCompressionRatio 被記錄至 metrics

  - given: OOM handler 在任何步驟中遇到 CompressStrategy 回傳 error
    when: 二次壓縮執行失敗
    then: >
      不靜默忽略 error； 回傳 OOMWarning event（附帶 error 訊息）， 並在 metrics 中遞增 oom_event_count； req.Contents 維持壓縮前狀態，不截斷

architecture:
  component: internal/memory
  layer: Domain Layer
  pattern: Chain of Responsibility
  notes: |
    OOM handler 作為 MemoryPlugin 中的 fallback 方法。
    依序嘗試：二次壓縮 → OOMWarning。

    OOMWarningEvent Go struct 定義建議：
      type OOMWarningEvent struct {
          UsageRatio     float64  // precise_total / context_window_tokens
          Recommendation string   // "start a new conversation"
          Reason         string   // 人類可讀說明（e.g. "secondary compression ineffective"）
      }

    ADK Go v0.6 的 BeforeModelCallback 簽名為：
      func(ctx context.Context, req *llm.LLMRequest) (*llm.LLMResponse, error)
    OOMWarning 透過回傳 non-nil *llm.LLMResponse（中斷模型呼叫）傳遞，
    不透過 error 傳遞（error 保留給系統錯誤）。

    Emergency threshold 90% 可配置，透過 MemoryPluginConfig 注入。
