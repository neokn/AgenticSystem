    text: "## Code Review by Jobs\n\n**Overall Assessment:** LGTM WITH COMMENTS\n**Code Health Impact:** Improves\n\n### Critical Issues (Must Fix)\n\nNone.\n\n### Should Fix\n\n**1. `internal/memory/plugin.go:468` — Secondary compression passes wrong `compressedCount` to `buildCompressedContents`**\n\nIn `handleOOM`, when secondary compression succeeds and `req.Contents` is rewritten:\n\n    req.Contents = buildCompressedContents(req, secondaryResult.CompressedText, len(req.Contents)-1)\n\n`buildCompressedContents` interprets `compressedCount` as the number of prior turns to skip (replaced by the summary). Passing `len(req.Contents)-1` skips every prior turn except the new user message, leaving no `recentActive` turns. The intent is to replace only the existing summary turn (1 turn), so the correct value is `1`. At this point `req.Contents` has already been rewritten by primary compression, so `len(req.Contents)-1` is not a meaningful compressed-turn count.\n\nChange to:\n    req.Contents = buildCompressedContents(req, secondaryResult.CompressedText, 1)\n\nThe AC1 test passes because it only checks `len(req.Contents) != 0` — it does not verify that recent active turns are preserved. In production a conversation would silently lose message history whenever secondary compression succeeds, violating the card contract \"Never truncates req.Contents\" and the no-silent-truncation requirement.\n\n**2. `internal/memory/plugin.go` — `emergencyThreshold` is not injectable via a public constructor or config struct**\n\nTask 4 on the card states \"Emergency threshold 90% configurable (MemoryPluginConfig.EmergencyThresholdPct)\" but no `MemoryPluginConfig` struct was created. The field is configured by direct struct mutation in tests (`p.emergencyThreshold = emergencyThreshold`). `NewMemoryPlugin` and `newMemoryPluginWithDeps` have no parameter for it; production callers cannot customise the threshold without accessing an unexported field.\n\nRecommend: add an `emergencyThreshold float64` parameter to `newMemoryPluginWithDeps` following the same `0 -> default` pattern as `threshold`, or introduce a `MemoryPluginConfig` options struct grouping both thresholds. Either eliminates the struct-field mutation in test code.\n\n### Nit\n\n- `internal/memory/plugin.go:418` — `emergencyTokens` is computed twice: once at the top of `handleOOM` and once in `runBeforeModel` before `handleOOM` is called. The caller already performed the comparison. Consider removing the recomputation inside `handleOOM` or passing `emergencyTokens` as a parameter for a cleaner caller/callee contract.\n\n- `internal/memory/oom_test.go:91-109` — `TestOOMWarningEvent_HasRequiredFields` tests struct field assignment. Useful as a compile-time canary but adds no runtime logic coverage. Not a blocker.\n\n- `internal/memory/oom_test.go:344` — AC5 test only asserts `event.Reason != \"\"`. A `strings.Contains(event.Reason, \"maximally compressed\")` assertion would guard against returning an OOMWarning via an unintended code path.\n\n### Good Things\n\n- The Chain of Responsibility in `handleOOM` is clean and easy to follow: each step has a clear guard, structured log, and a single exit to `returnOOMWarning`. The Step 1-5 comments make the control flow navigable.\n- Level 3 robustness (graceful degradation on compress error) is implemented exactly as the architecture note specifies: compress errors never propagate as Go errors and always degrade to OOMWarning.\n- `returnOOMWarning` is a well-factored single-responsibility helper. Metric increment and response construction are co-located, eliminating any chance of a forgotten OOMEventCount increment.\n- `seqAPICounter` and `seqCompressStrategy` stubs are excellent: per-call injection without global state, each with its own mutex. The `secondaryErr` field cleanly distinguishes first vs second compress call.\n- The AC4 fix (calling `handleOOM` directly with empty `p.summaries` and asserting `event.Reason` contains \"SUMMARY segment empty\") is the right approach. The judge-reported false-green was properly corrected.\n- All structured log calls include relevant context fields. This will make production debugging tractable.\n- `OOMWarningEvent` delivered via `LLMResponse.CustomMetadata` (not as a Go error) matches the ADK BeforeModelCallback contract precisely.\n\n### Code Smells Detected\n\n| Smell | Location | Severity | Treatment |\n|-------|----------|----------|-----------|\n| Primitive Obsession | `emergencyThreshold` set by direct struct mutation in tests | SHOULD_FIX | Introduce constructor parameter or MemoryPluginConfig options struct |\n| Speculative Generality | `TestOOMWarningEvent_HasRequiredFields` | NIT | Fold into AC tests or remove — tests no runtime behaviour |\n\n### Recommended Next Steps\n\n1. Fix `buildCompressedContents` call in `handleOOM` line 468: change `len(req.Contents)-1` to `1`. Add AC1 assertion verifying recent active turns are preserved after secondary compression.\n2. Expose `emergencyThreshold` via a constructor parameter (default 0 -> defaultEmergencyThreshold), removing the direct struct mutation from `newOOMTestPlugin`.\n3. Optional: tighten AC5 Reason assertion to strings.Contains(event.Reason, \"maximally compressed\").\n"
