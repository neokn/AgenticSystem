description: '壓縮後仍不夠空間的最後手段。


  OS 等價：OOM Killer


  策略（依序嘗試，每步重新檢查）：

  1. 對 SUMMARY segment 再次壓縮（摘要的摘要）

  2. 仍不夠 → 回傳 OOMWarning event，建議開新對話

  3. 絕對不靜默截斷


  Emergency threshold: 90%（可配置）


  整合於 MemoryPlugin.BeforeModelCallback 中，

  在正常壓縮後仍超閾值時觸發。


  檔案：內嵌於 internal/memory/plugin.go 或獨立方法

'
