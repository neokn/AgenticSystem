comments:
  - author: joshua
    at: 2026-03-22T18:00:00+08:00
    text: |
      dotprompt 研究摘要：
      - Go import: github.com/google/dotprompt/go/dotprompt
      - Template engine: Handlebars（非 Go template）
      - 載入方式: DirStore(dir) + store.Load(name, opts) 或 dp.Compile(source, nil) inline
      - 渲染: promptFunc(DataArgument{Input: map[string]any{...}}) → RenderedPrompt
      - RenderedPrompt.Messages 需手動轉換為 genai.Content
      - 支援 variants（A/B testing prompt）、partials、conditionals
  - author: jules
    at: "2026-03-22T18:30:00+08:00"
    text: |-
      Refinement notes:

      Dependency on card 50 is correct — card 50 introduced Generational.buildPrompt and GenerationalConfig.PromptTemplate, which this card replaces.

      No splitting applied. The 7 tasks form a single non-divisible refactoring chain: none of them delivers independent production value if the chain is broken (e.g. adding dotprompt without wiring it to buildPrompt leaves text/template still in use). Strategy "Split by Examples of Usefulness" was considered but all scenarios require the full chain to be useful.

      Three edge cases added to acceptance criteria:
      1. Missing .prompt file — Compress must return (nil, error); no fallback to text/template.
      2. Wrong template variables — render error must propagate as (nil, error); no silent empty prompt.
      3. Test isolation — tests must use dp.Compile(inlineSource, nil) so they never touch the filesystem. DirStore is only used in production wiring.

      Task 3 was split from task 4 to separate the struct API change (removing PromptTemplate field) from the implementation change (rewriting buildPrompt). This makes review cleaner.

      GenaiWorker.Summarize signature stays unchanged (model, prompt string). The dotprompt rendering stays inside buildPrompt — no changes needed to the compressWorker interface.
