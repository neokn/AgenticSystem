description: |
  Split the context window into four named segments: PINNED, SUMMARY, ACTIVE, and BUFFER.

  OS equivalent: memory partitioning.

  Key rules:
  - BUFFER >= max_output_tokens (take the larger value)
  - Ratio sum must equal exactly 100% or NewLayout returns an error
  - When BUFFER is auto-raised, the deficit is deducted proportionally from the other
    three segments; if any segment would reach 0 tokens, return an error
  - Integer rounding: floor each segment, assign remainder to ACTIVE so that
    sum of all four segments equals context_window_tokens exactly
  - Extremely small context_window (e.g. 10k tokens with 8.5k max_output) must be
    caught and rejected with a clear error — not silently produce zero-token segments

  File: internal/memory/layout.go
