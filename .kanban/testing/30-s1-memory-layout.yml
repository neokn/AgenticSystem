acceptance:
  # Happy path — standard model with headroom
  - given: ModelProfile loaded with context_window_tokens = 1,048,576 and max_output_tokens = 8,192; LayoutConfig ratios PINNED=15%, SUMMARY=25%, ACTIVE=50%, BUFFER=10% summing to 100%
    when: NewLayout(profile, config) is called
    then: each segment token limit equals floor(context_window_tokens * ratio), rounding remainder is added to ACTIVE, and the four limits sum exactly to context_window_tokens
  # BUFFER auto-raise — large max_output
  - given: ModelProfile with context_window_tokens = 200,000 and max_output_tokens = 65,536; default config gives BUFFER = floor(200,000 * 0.10) = 20,000 which is less than max_output_tokens
    when: NewLayout(profile, config) is called
    then: BUFFER is set to 65,536, the deficit of 45,536 tokens is deducted from PINNED, SUMMARY, and ACTIVE proportionally (rounded to integers), and the four limits sum exactly to context_window_tokens
  # Edge case — extremely small context_window (BUFFER consumes near-all space)
  - given: ModelProfile with context_window_tokens = 10,000 and max_output_tokens = 8,500; default config gives BUFFER = floor(10,000 * 0.10) = 1,000 which is less than max_output_tokens
    when: NewLayout(profile, config) is called
    then: NewLayout returns an error with message indicating remaining capacity after BUFFER adjustment (10,000 - 8,500 = 1,500 tokens) is insufficient to give every other segment at least 1 token each (or a configured minimum floor per segment)
  # Rounding invariant — sum must always equal context_window_tokens exactly
  - given: ModelProfile with context_window_tokens = 1,000 (prime-like to force fractional splits) and max_output_tokens = 50; LayoutConfig ratios 15/25/50/10 summing to 100%
    when: NewLayout(profile, config) is called
    then: the four segment limits are non-negative integers whose sum equals exactly 1,000 (no tokens lost or double-counted)
  # Failure — ratio sum is not 100%
  - given: LayoutConfig with ratios PINNED=20%, SUMMARY=25%, ACTIVE=50%, BUFFER=10% (sum = 105%)
    when: NewLayout(profile, config) is called
    then: NewLayout returns an error indicating the ratio sum must equal 100%
  # Failure — any segment ratio is zero or negative
  - given: LayoutConfig with ratios PINNED=0%, SUMMARY=35%, ACTIVE=55%, BUFFER=10% (sum = 100%)
    when: NewLayout(profile, config) is called
    then: NewLayout returns an error indicating each segment ratio must be greater than zero
architecture:
  component: internal/memory
  layer: Domain Layer
  pattern: Value Object
  boundary: |
    No ports or adapters needed. MemoryLayout is pure domain computation with no I/O.
    It is constructed by NewLayout (a domain factory function) and consumed by
    MemoryPlugin (Application Layer). Dependency flows inward: MemoryPlugin depends
    on MemoryLayout, never the reverse.
  notes: |
    CONFIRMED: MemoryLayout is correctly placed as a Value Object in the Domain Layer.
    It has no identity — two layouts computed from identical inputs are equivalent.
    It carries no I/O, no infrastructure dependencies, and no use-case logic.
    See ADR-0002: docs/adr/0002-memory-layout-value-object-and-immutability.md

    IMMUTABILITY (Go implementation):
    Use unexported fields with exported accessor methods. NewLayout returns a value
    (not a pointer), giving callers an immutable copy. This is the idiomatic Go
    pattern for value objects and enforces the sum invariant at the type level.

      type MemoryLayout struct {
          pinned, summary, active, buffer int
      }
      func (l MemoryLayout) Pinned() int  { return l.pinned }
      func (l MemoryLayout) Summary() int { return l.summary }
      func (l MemoryLayout) Active() int  { return l.active }
      func (l MemoryLayout) Buffer() int  { return l.buffer }
      func (l MemoryLayout) Total() int   { return l.pinned + l.summary + l.active + l.buffer }

    ERROR CONVENTION (ADR-0001 alignment):
    The card previously described ConfigurationError as a typed struct so callers
    can switch on error type. This contradicts the project's accepted ADR-0001.
    ADR-0001 classifies NewLayout validation failures as programming mistakes caught
    at startup — no runtime branching by callers is needed. Use fmt.Errorf with
    descriptive field-level context instead of a named type.

    Corrected approach:
      return MemoryLayout{}, fmt.Errorf("NewLayout: ratio sum must equal 1.0, got %.4f", sum)
      return MemoryLayout{}, fmt.Errorf("NewLayout: all ratios must be > 0; PINNED ratio is 0")
      return MemoryLayout{}, fmt.Errorf(
          "NewLayout: BUFFER raised to max_output_tokens (%d), remaining capacity %d is "+
          "insufficient for %d non-BUFFER segments (MinSegmentTokens = %d)",
          maxOutput, remaining, 3, MinSegmentTokens)

    Task 7 ("Define ConfigurationError typed error struct") should be dropped or
    converted to: "Verify error messages follow ADR-0001 fmt.Errorf convention."

    ROUNDING STRATEGY (Go idiom):
    Integer floor division is the default for int(float64(n) * ratio) in Go.
    Collect remainder with: remainder := total - (pinned + summary + active + buffer)
    then: active += remainder
    This is deterministic, has no floating-point accumulation error, and guarantees
    the sum invariant in a single pass. No special rounding library needed.

    NAMED CONSTANT:
    const MinSegmentTokens = 1  // minimum tokens any non-BUFFER segment must receive

    FILE: internal/memory/layout.go
    ADR: docs/adr/0002-memory-layout-value-object-and-immutability.md
