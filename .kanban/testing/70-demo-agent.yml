acceptance:
  # --- Happy path: short conversation (compress must NOT fire) ---
  - given: gemini-2.0-flash ModelProfile loaded, threshold=80%, conversation stays under 60% context window
    when: demo agent runs a 5-turn stdin/stdout conversation loop
    then: >
      compress_trigger_count == 0, countTokens_api_call_count == 0, every response is returned successfully, exit code 0

  # --- Happy path: long conversation (compress MUST fire, continuity preserved) ---
  - given: gemini-2.0-flash ModelProfile loaded, threshold=80%, conversation loop runs 50 turns with progressively longer messages
    when: demo agent completes all 50 turns
    then: >
      compress_trigger_count >= 1, turn 50 response correctly references a fact stated in turn 1 (verified by keyword presence in response text), no turn returns an error or empty response, exit code 0

  # --- countTokens API efficiency ---
  - given: 50-turn conversation that triggers compression at least once
    when: demo agent completes the run
    then: >
      countTokens_api_call_count < 50 (i.e. not called every turn — offline tokenizer estimate is used as first gate), countTokens_api_call_count >= 1 (i.e. at least one precision check occurred before compression)

  # --- OOM handler activation ---
  - given: ModelProfile configured with an artificially small context_window_tokens (e.g. 2000 tokens), threshold=80%, emergency_threshold=90%
    when: demo agent runs a conversation long enough to exhaust even the compressed context
    then: >
      OOMWarning event is emitted to stderr or the metrics report, oom_event_count >= 1, no content is silently dropped (agent returns an explicit warning message instead of an empty response), process does not panic

  # --- Metrics report completeness and format ---
  - given: any completed run (short or long)
    when: demo agent exits
    then: >
      a metrics report is printed to stdout (or written to a file if --metrics-out flag is given) in the following format (one metric per line, colon-separated label and value):









        usage_ratio_curve: [list of per-turn float values, e.g. 0.12,0.24,...,0.81]
        compress_trigger_count: <integer>
        countTokens_api_call_count: <integer>
        compress_cost_usd: <float with 6 decimal places>
        oom_event_count: <integer>
  # --- Edge: missing API key ---
  - given: GEMINI_API_KEY environment variable is not set
    when: demo agent is started
    then: >
      process exits immediately with exit code 1, prints a human-readable error to stderr: "GEMINI_API_KEY is not set", no partial output is written

  # --- Edge: false alarm (offline estimate fires but precise count is below threshold) ---
  - given: conversation where offline tokenizer estimate crosses 80% but countTokens API returns a value below 80%
    when: that turn is processed by BeforeModelCallback
    then: >
      compress is NOT triggered, countTokens_api_call_count increments by 1 for that turn, compress_trigger_count remains unchanged, the request passes through normally

architecture:
  component: cmd/agent
  layer: Infrastructure Layer
  notes: |
    cmd/agent/main.go 組裝 ADK Runner + MemoryPlugin + demo LLMAgent。
    用於端到端驗證壓縮流程。

    How to run:
      go run ./cmd/agent/main.go [--turns N] [--metrics-out FILE]

    Conversation loop reads from stdin line-by-line; each line is one user turn.
    Scripted mode: pipe a file of N lines to stdin for automated test runs.
    Interactive mode: type turns manually; Ctrl-D ends the session.

    Metrics are always printed to stdout at exit. Use --metrics-out to also write
    a machine-readable copy (same colon-separated format) to a file.

    The demo uses a built-in system prompt that asks the agent to remember a
    "secret word" stated in turn 1, so that turn-50 recall can be asserted
    deterministically in automated runs.
