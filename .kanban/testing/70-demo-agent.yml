comments:
  - author: jules
    at: 2026-03-22T10:00:00+00:00
    text: |
      Refined from 2 vague scenarios to 7 concrete acceptance criteria.

      Key decisions:
      1. Run mode: CLI binary (cmd/agent/main.go). Reads user turns from stdin
         line-by-line; scripted CI runs pipe a prepared script file. Flags:
         --turns N (auto-generates N turns if no stdin), --metrics-out FILE.

      2. Metrics output format: colon-separated, one metric per line, printed to
         stdout at exit. Machine-readable copy written to file if --metrics-out given.
         Fields: usage_ratio_curve (comma-separated float list), compress_trigger_count,
         countTokens_api_call_count, compress_cost_usd (6 decimal places), oom_event_count.

      3. Long-conversation continuity is verified deterministically: the built-in
         system prompt instructs the agent to remember a "secret word" stated in
         turn 1; turn-N recall is verified by keyword presence in the response.

      4. OOM scenario uses an artificially small context_window_tokens (e.g. 2000)
         so it can be triggered in a short automated run without a real 1M-token window.

      5. False-alarm scenario (offline estimate fires, API check passes) added as
         an explicit edge case — important to confirm the two-gate logic works correctly.

      No split performed. All 6 tasks are tightly coupled within one CLI binary and
      deliver a single atomic value: "the full system is proven to work end-to-end."
      Splitting would produce fragments with no independent runnable value.
  - author: james
