  驗證項目：
  - 短對話（< 80%）不觸發壓縮
  - 長對話自動觸發壓縮
  - 壓縮後 LLM 仍能引用早期資訊
  - countTokens API 呼叫次數合理（不是每輪都 call）
  - OOM handler 在極端情況下觸發
  - Metrics 輸出完整

  檔案：cmd/agent/main.go

  Run modes:
    Interactive: echo turns via stdin, metrics printed on exit
    Scripted:    pipe a prepared N-line script file to stdin for CI validation
