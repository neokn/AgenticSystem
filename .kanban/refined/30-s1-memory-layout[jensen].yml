comments:
  - author: jules
    at: 2026-03-22T10:00:00+00:00
    text: |
      Refinement notes:

      SPLITTING DECISION: No split needed. This is a single, tightly scoped Value Object
      with all logic in one file (layout.go). The story delivers independent value — once
      done, S2+S3 (MemoryPlugin) can use MemoryLayout directly. Splitting would create
      artificial dependencies without adding value.

      EDGE CASES ADDED:
      1. Extremely small context_window — when BUFFER auto-raise consumes so many tokens
         that remaining segments would be 0 or negative, the system must return
         ConfigurationError rather than silently producing broken layouts. Threshold:
         each non-BUFFER segment must have at least MinSegmentTokens = 1. Example:
         context_window=10,000, max_output=8,500 → remaining after BUFFER = 1,500 →
         three segments each need at least 1 token so this passes, but e.g.
         context_window=5,000, max_output=4,998 → remaining = 2 → PINNED and SUMMARY
         cannot each get 1 token and also leave something for ACTIVE → error.
      2. Rounding errors — integer floor division of float ratios will always lose a
         few tokens. The invariant "sum of segments == context_window_tokens exactly"
         must hold. Strategy: floor all four segments, sum the floors, add the
         remainder (context_window_tokens - sum) to ACTIVE. This is deterministic
         and keeps ACTIVE as the flexible "large" segment. Tests should verify the
         sum invariant with context_window values that produce non-integer splits.

      TASK BREAKDOWN (aiming for ~1 hour each):
      8 tasks, each independently testable and completable in ~1 hour:
      1. Type definitions (Segment constants + SegmentLimits struct)
      2. LayoutConfig + JSON loading from configs/default.json
      3. Ratio validation logic + ConfigurationError type
      4. Base segment calculation with floor+remainder
      5. BUFFER auto-raise with proportional deduction
      6. Minimum-capacity guard after BUFFER raise
      7. ConfigurationError typed error struct
      8. Full unit test suite covering all acceptance criteria

      CLARITY IMPROVEMENTS:
      - Original task "定義 Segment 和 MemoryLayout struct" was too vague about
        whether Segment is constants, enum, or a struct — clarified as named constants.
      - BUFFER proportional deduction was underspecified — clarified that it reuses
        the same floor+remainder pattern as the base calculation to avoid double
        rounding errors.
      - "ConfigurationError" was mentioned but not specified as a typed Go error —
        clarified this is a struct implementing the error interface, not a wrapped
        string, so callers can inspect it programmatically.
