title: "S1: Memory Layout Initialization"
labels: [backend, core-logic]
depends-on: [20-s0-model-profile]
completed-by:
  backlog: "jules"
acceptance:
  # Happy path — standard model with headroom
  - given: ModelProfile loaded with context_window_tokens = 1,048,576 and max_output_tokens = 8,192; LayoutConfig ratios PINNED=15%, SUMMARY=25%, ACTIVE=50%, BUFFER=10% summing to 100%
    when: NewLayout(profile, config) is called
    then: each segment token limit equals floor(context_window_tokens * ratio), rounding remainder is added to ACTIVE, and the four limits sum exactly to context_window_tokens

  # BUFFER auto-raise — large max_output
  - given: ModelProfile with context_window_tokens = 200,000 and max_output_tokens = 65,536; default config gives BUFFER = floor(200,000 * 0.10) = 20,000 which is less than max_output_tokens
    when: NewLayout(profile, config) is called
    then: BUFFER is set to 65,536, the deficit of 45,536 tokens is deducted from PINNED, SUMMARY, and ACTIVE proportionally (rounded to integers), and the four limits sum exactly to context_window_tokens

  # Edge case — extremely small context_window (BUFFER consumes near-all space)
  - given: ModelProfile with context_window_tokens = 10,000 and max_output_tokens = 8,500; default config gives BUFFER = floor(10,000 * 0.10) = 1,000 which is less than max_output_tokens
    when: NewLayout(profile, config) is called
    then: NewLayout returns a ConfigurationError with message indicating remaining capacity after BUFFER adjustment (10,000 - 8,500 = 1,500 tokens) is insufficient to give every other segment at least 1 token each (or a configured minimum floor per segment)

  # Rounding invariant — sum must always equal context_window_tokens exactly
  - given: ModelProfile with context_window_tokens = 1,000 (prime-like to force fractional splits) and max_output_tokens = 50; LayoutConfig ratios 15/25/50/10 summing to 100%
    when: NewLayout(profile, config) is called
    then: the four segment limits are non-negative integers whose sum equals exactly 1,000 (no tokens lost or double-counted)

  # Failure — ratio sum is not 100%
  - given: LayoutConfig with ratios PINNED=20%, SUMMARY=25%, ACTIVE=50%, BUFFER=10% (sum = 105%)
    when: NewLayout(profile, config) is called
    then: NewLayout returns a ConfigurationError indicating the ratio sum must equal 100%

  # Failure — any segment ratio is zero or negative
  - given: LayoutConfig with ratios PINNED=0%, SUMMARY=35%, ACTIVE=55%, BUFFER=10% (sum = 100%)
    when: NewLayout(profile, config) is called
    then: NewLayout returns a ConfigurationError indicating each segment ratio must be greater than zero

architecture:
  component: internal/memory
  layer: Domain Layer
  pattern: Value Object
  notes: |
    MemoryLayout is an immutable value object. All segment limits are computed once
    at initialization time and never mutated afterward.
    BUFFER auto-raise logic ensures the LLM response space is never truncated.
    Rounding must be deterministic: use integer floor division for all segments,
    collect the remainder, add it to ACTIVE.
    ConfigurationError must be a typed Go error (not just fmt.Errorf) so callers
    can distinguish configuration problems from runtime errors.
    Minimum viable remaining capacity after BUFFER (e.g., at least 3 tokens — one
    per non-BUFFER segment) should be a named constant: MinSegmentTokens = 1.
