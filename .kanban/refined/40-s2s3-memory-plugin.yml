comments:
  - author: jules
    at: 2026-03-22T12:00:00+08:00
    text: |
      Refinement notes for card 40-s2s3-memory-plugin:

      SPLITTING DECISION: Not split. Although the card has 10 tasks, all tasks form
      a single inseparable deployable unit — AfterModel and BeforeModel must both work
      for the plugin to deliver any value. CompressStrategy (S4) is already a separate
      card. The depends-on relationship handles the build order.

      ACCEPTANCE CRITERIA ADDITIONS:
      1. First-turn edge case: lastTotalTokens starts at 0; the offline estimator must
         handle this correctly (estimated = 0 + tokenizer(msg) + max_output_tokens).
         This is safe by design but must be explicitly tested.

      2. Nil/zero UsageMetadata guard: AfterModelCallback must not overwrite
         lastTotalTokens with 0 when the API returns missing metadata — the previous
         value is more useful than zero for the next estimation.

      3. Race condition / goroutine safety: sync.Mutex is required on all reads and
         writes to lastTotalTokens, summaries, compressedUpToIndex. Test with
         go test -race.

      4. Configurable threshold: the 80% default must be a constructor parameter
         with validation, not a hardcoded constant.

      TASK ADDITIONS vs original card:
      - Added sync.Mutex to the struct definition task
      - Split the BeforeModelCallback into two explicit tasks (offline layer,
        online layer) with their respective pass-through conditions
      - Added MemoryMetrics struct as an explicit task (spec section: Observability)
      - Explicitly required go test -race in the test task

      NOTE FOR JENSEN: No architecture review required. The spec is clear on the
      component boundary. CompressStrategy is injected via constructor (DI), making
      this unit-testable with a stub. The countTokens API call should use the same
      genai.Client already held by the main Runner — confirm the ADK v0.6 Plugin
      interface gives access to the client in BeforeModelCallback context, or whether
      a separate client reference must be stored in the plugin struct.
