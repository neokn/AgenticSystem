description: |
  Implement the ADK MemoryPlugin in internal/memory/plugin.go. This is the central
  orchestrator for the context window memory manager. It has two responsibilities:

  1. AfterModelCallback — store resp.UsageMetadata.TotalTokenCount as lastTotalTokens.
     This single integer is the baseline for the next turn's estimation.

  2. BeforeModelCallback — two-layer token estimation and compression trigger:
     - Offline (cheap): estimated = lastTotalTokens + genai/tokenizer.CountTokens(new_msg) + max_output_tokens
     - If estimated < threshold: pass through (never call countTokens API)
     - If estimated >= threshold: call countTokens API for precise_total
       - If precise_total < threshold: pass through (false alarm, log it)
       - If precise_total >= threshold: trigger compression

  Compression trigger:
  - Call CompressStrategy.SelectCandidates(activeTurns, targetReclaimTokens)
  - Call CompressStrategy.Compress(candidates, existingSummary, profile)
  - Rewrite req.Contents: [system_prompt + summary + recent_active_turns + user_msg]
  - Update plugin.summaries and plugin.compressedUpToIndex

  Design decisions:
  - Threshold default 80%, configurable at initialization
  - Offline estimator is intentionally conservative (over-triggers API rather than misses)
  - Session history is never mutated (req.Contents rewrite is a view transformation)
  - lastTotalTokens starts at 0 on first turn; formula still works correctly
  - All internal state protected by sync.Mutex for goroutine safety

  Metrics emitted (into MemoryMetrics struct):
  - lastTotalTokens (gauge)
  - usageRatio (gauge: lastTotalTokens / context_window_tokens)
  - countTokensAPICallCount (counter)
  - compressTriggerCount (counter)
  - compressReclaimedTokens (histogram entry per compression event)

  File: internal/memory/plugin.go
