acceptance:
  # Happy path: known model lookup
  - given: Registry is initialised with built-in profiles
    when: GetProfile("gemini-2.0-flash") is called
    then: >
      Returns a ModelProfile where ContextWindowTokens == 1048576,
      MaxOutputTokens == 8192, ModelID == "gemini-2.0-flash",
      and Provider == "google"

  # Happy path: known model with compress model
  - given: Registry is initialised with built-in profiles
    when: GetProfile("gemini-2.5-pro") is called
    then: >
      Returns a ModelProfile where ContextWindowTokens == 1048576,
      MaxOutputTokens == 65536, and CompressModelID is either empty or a
      valid model_id string (no error returned)

  # Happy path: custom profile overrides built-in
  - given: A custom ModelProfile is provided for "gemini-2.0-flash" with ContextWindowTokens == 500000
    when: Registry is initialised with that custom profile and GetProfile("gemini-2.0-flash") is called
    then: Returns the custom profile with ContextWindowTokens == 500000 (custom value wins)

  # Edge: unknown model_id
  - given: Registry contains only the four built-in Gemini profiles
    when: GetProfile("gpt-4o") is called
    then: Returns a non-nil error with a message indicating the model_id was not found; no profile is returned

  # Edge: custom profile missing required field model_id
  - given: A custom ModelProfile is provided with an empty ModelID string
    when: Registry is initialised with that custom profile
    then: Initialisation returns a non-nil error; the registry is not created

  # Edge: custom profile missing required field context_window_tokens
  - given: A custom ModelProfile is provided with ModelID set but ContextWindowTokens == 0
    when: Registry is initialised with that custom profile
    then: Initialisation returns a non-nil error; the registry is not created

  # Edge: compress_model_id absent — fallback to primary model
  - given: A valid ModelProfile has CompressModelID == "" (empty)
    when: A component reads CompressModelID to select the compress worker model
    then: >
      The compress worker falls back to the primary ModelID, and a warning
      is emitted via the Go standard logger (log.Println / slog.Warn level)

  # Edge: cost fields omitted (zero values are valid)
  - given: A custom ModelProfile is provided with all cost fields left at their zero values (0.0)
    when: Registry is initialised and GetProfile returns that profile
    then: No error is returned; cost fields read back as 0.0 (zero cost is acceptable for testing/private models)

architecture:
  component: internal/memory
  layer: Domain Layer
  pattern: >
    Registry — a lookup table initialized once at startup with built-in entries that
    can be overridden by caller-supplied values. Correct choice: the Registry holds
    static capability data with no I/O, no lifecycle, and a well-defined lookup
    contract. It is the canonical Domain Layer pattern for this use case.
  boundary: >
    No ports or adapters needed. ModelProfile and Registry are pure in-process value
    types. The Registry is constructed in main.go (or MemoryPlugin constructor) and
    passed by dependency injection to MemoryPlugin and MemoryLayout. No interface
    abstraction is required at MVP scale — a concrete *Registry is sufficient.
  notes: |
    VALUE OBJECT — ModelProfile is an immutable value object.
    - Pass by value everywhere (the spec's Compress() signature already does this).
    - Two profiles with identical fields are equivalent; identity comes from ModelID
      field content, not pointer address.
    - No setter methods. Construction only via NewRegistry (validated) or literal
      struct init in built-in data table.

    REGISTRY INJECTION — constructor injection, not global state.
    - NewRegistry(customProfiles ...ModelProfile) (*Registry, error) is called once
      during plugin/application startup.
    - The returned *Registry is passed to MemoryPlugin and MemoryLayout constructors.
    - No init() global, no sync.Once singleton. This keeps tests hermetic.

    ERROR CONVENTIONS — see docs/adr/0001-error-type-conventions.md.
    - GetProfile unknown model: sentinel var ErrModelNotFound = errors.New(...)
      so callers can use errors.Is(err, memory.ErrModelNotFound).
    - NewRegistry validation failures (empty ModelID, zero ContextWindowTokens):
      plain fmt.Errorf with field-level context — these are startup mistakes,
      no programmatic detection needed.
    - GetEffectiveCompressModelID fallback: not an error — emit slog.Warn and
      return the primary ModelID. No error return on this helper.

    BUILT-IN DATA — declare as a package-level var (map or slice) initialized
    via a composite literal, NOT via init(). This makes the data visible and
    overridable in tests without init() ordering surprises.

    FILE: internal/memory/profile.go
    ADR: docs/adr/0001-error-type-conventions.md
