description: |
  Implement the ModelProfile struct and Registry, providing hardware specs for
  Gemini models. All subsequent components (MemoryLayout, compress trigger,
  cost tracking) depend on this profile.

  OS equivalent: hardware detection (BIOS/UEFI hardware detection).

  MVP built-in profiles:
  - gemini-2.0-flash       (1,048,576 context, 8,192 output)
  - gemini-2.0-flash-lite  (1,048,576 context, 8,192 output)
  - gemini-2.5-pro         (1,048,576 context, 65,536 output)
  - gemini-2.5-flash       (1,048,576 context, 65,536 output)

  File: internal/memory/profile.go

tasks:
  # ~1h each
  - text: >
      Define ModelProfile struct with all fields from spec: ModelID (string),
      Provider (string, default "google"), ContextWindowTokens (int),
      MaxOutputTokens (int), CostPer1KInputTokens (float64),
      CostPer1KOutputTokens (float64), CompressModelID (string),
      CompressCostPer1KInputTokens (float64), CompressCostPer1KOutputTokens (float64)
    done: false
  - text: >
      Implement Registry type, NewRegistry(customProfiles ...ModelProfile) constructor,
      and GetProfile(modelID string) (ModelProfile, error) method
    done: false
  - text: >
      Hardcode the four built-in Gemini profiles as package-level variables
      or a map initialised in an init() function; include accurate token limits from spec
    done: false
  - text: >
      Implement custom profile override logic: when a custom profile is passed to
      NewRegistry, it replaces the built-in entry for the same ModelID
    done: false
  - text: >
      Implement required-field validation in NewRegistry: reject any profile where
      ModelID == "" or ContextWindowTokens == 0; return a descriptive error
    done: false
  - text: >
      Implement CompressModelID fallback helper (GetEffectiveCompressModelID) that
      returns CompressModelID if non-empty, else falls back to ModelID and emits a
      slog.Warn log entry
    done: false
  - text: >
      Write unit tests covering all 8 acceptance criteria above: happy paths for all
      four built-in models, unknown model_id error, missing ModelID error, missing
      ContextWindowTokens error, compress fallback with warning, and zero cost fields
    done: false

comments:
  - author: jensen
    at: 2026-03-22T14:00:00+08:00
    text: |
      Architecture review complete. Card stays in refined/ — blocked on card 10
      (project-init) completing first.

      Key decisions recorded:

      1. REGISTRY PATTERN + DOMAIN LAYER — confirmed correct. The Registry is a
         pure in-process lookup table with no I/O. ModelProfile is a value object:
         immutable, passed by value, no pointer receiver needed. Both belong
         squarely in the Domain Layer.

      2. VALUE OBJECT IMMUTABILITY — ModelProfile should be treated as immutable.
         Go enforces this by convention: pass by value (not *ModelProfile), no
         setters, construction only through NewRegistry or validated struct
         literals in the built-in data table. The spec's Compress() signature
         already passes ModelProfile by value — keep this pattern throughout.

      3. REGISTRY INJECTION — constructor injection only. NewRegistry returns
         *Registry which is wired at startup (main.go or MemoryPlugin constructor)
         and passed explicitly to dependents. No global singleton, no init()
         side-effect. This keeps each test hermetic.

      4. ERROR CONVENTIONS (cross-cutting, affects S0–S6):
         - GetProfile unknown model: sentinel ErrModelNotFound (errors.Is-compatible).
         - NewRegistry validation errors: plain fmt.Errorf with field context
           (startup mistakes, callers never branch on these).
         - GetEffectiveCompressModelID fallback: slog.Warn + return primary ModelID,
           no error return.
         ADR written: docs/adr/0001-error-type-conventions.md

      5. BUILT-IN DATA — declare as package-level var composite literal, not init().
         Avoids init() ordering surprises and keeps data visible in tests.

      No split needed — Jules' assessment confirmed: all tasks live in one file
      (profile.go), single component, no external I/O.
  - author: jules
    at: 2026-03-22T12:00:00+08:00
