    at: "2026-03-23T10:00:00+08:00"
    text: 'Card split into two independently deliverable stories using Split Learning from Earning (strategy 8) and Split by Examples of Usefulness (strategy 4). This parent card is superseded by 01a and 01b. 01a (design + ADR) must be completed and approved by Jensen before 01b (package migration) begins. Splitting rationale: the original card mixed design decisions (which require architecture review) with implementation work (which can be executed independently once the design is locked). Keeping them together would have forced Jensen to review mid-flight code changes alongside conceptual architecture decisions. The split also keeps the blast radius of each change small: 01a produces zero code changes; 01b is a pure mechanical migration with a clear before/after invariant.'
