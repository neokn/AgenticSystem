description: |
  在推進 multi-agent 之前，先用 Explicit Architecture（Hexagonal / Ports & Adapters /
  Clean Architecture）重構現有專案結構，建立清晰的層級邊界。

  這張卡是所有後續 Phase 的地基 — 沒有乾淨的分層，multi-agent 的複雜度
  會讓 codebase 迅速失控。

  目標：
    - Domain Layer：agent 定義、state schema、workflow 合約（純邏輯，零外部依賴）
    - Application Layer：use case orchestration、appwire（組裝，不含業務邏輯）
    - Infrastructure Layer：ADK adapter、Gemini client、session store、MCP、shelltool
    - Interface Layer：cmd/agent、cmd/telegram、cmd/web（薄入口）

  現狀問題：
    - internal/ 下的 package 沒有明確的層級歸屬
    - appwire 同時做組裝和業務邏輯（debug plugin inline）
    - agentdef/mcpconfig/shelltool/memory 全部平鋪在 internal/，沒有分層
    - 外部依賴（ADK、genai、MCP SDK）直接散落在各處，沒有 Port 隔離

  重構策略：
    - 先畫出目標目錄結構
    - 定義 Port interfaces（domain 對外部的合約）
    - 搬移現有 package 到正確的層級
    - 確保依賴方向：Interface → Application → Domain ← Infrastructure
    - 不改功能，純結構重構，所有測試必須繼續通過
