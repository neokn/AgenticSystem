description: |
  Implement a pluggable compression strategy subsystem.

  OS analogy: Pluggable page replacement policy.

  CompressStrategy interface (internal/memory/compress.go):
    - Name() string
    - SelectCandidates(activeTurns []ConversationTurn, targetReclaimTokens int) []ConversationTurn
    - Compress(candidates []ConversationTurn, existingSummary string, profile ModelProfile) (*CompressResult, error)

  MVP strategy -- Generational:
    - Selects the oldest N turns (default N=5)
    - Executes compression via an isolated ADK Runner + LLMAgent (Compress Worker)
    - Prefers CompressModelID (e.g. Flash-Lite) to reduce cost; falls back to primary model with warning
    - Incorporates existingSummary into the summarization prompt so context is preserved across
      multiple compress cycles

  Compress Worker:
    - Isolated Runner + LLMAgent (isolated context window -- never pollutes the main session)
    - Summarization prompt template is configurable; built-in default is safe to use out of the box

  Strategy registry:
    - Maps strategy name strings to factory functions
    - Unknown name at init returns error listing available names

  File: internal/memory/compress.go
