acceptance:
  # --- Happy path ---
  - given: compress is triggered with strategy = generational and activeTurns has 8 turns
    when: SelectCandidates is called with targetReclaimTokens = 1000
    then: returns the 5 oldest turns (index 0..4) in original order

  - given: Generational.Compress is called with 5 candidate turns and an empty existingSummary
    when: the Compress Worker (isolated ADK Runner + LLMAgent) executes successfully
    then: >
      CompressResult.CompressedText is non-empty;
      CompressResult.OriginalTokens > 0;
      CompressResult.CompressedTokens < CompressResult.OriginalTokens;
      CompressResult.ActualCompressionRatio == float64(CompressedTokens) / float64(OriginalTokens);
      CompressResult.WorkerUsage reflects the isolated runner's token counts

  - given: profile.CompressModelID is set to "gemini-2.0-flash-lite"
    when: Compress Worker initialises its ADK Runner + LLMAgent
    then: the runner uses "gemini-2.0-flash-lite", not the primary model

  - given: Generational.Compress is called with a non-empty existingSummary
    when: compression succeeds
    then: >
      CompressResult.CompressedText incorporates context from existingSummary;
      the summarization prompt sent to the worker includes both existingSummary and the candidate turns

  - given: the summarization prompt template is set in config
    when: Compress Worker builds its LLMAgent system prompt
    then: the configured template string is used verbatim (not the built-in default)

  # --- Edge / failure cases ---
  - given: activeTurns contains only 3 turns and N = 5
    when: SelectCandidates is called
    then: returns all 3 available turns (does not panic or return an empty slice)

  - given: activeTurns is empty
    when: SelectCandidates is called
    then: returns an empty slice and Compress is never invoked downstream

  - given: profile.CompressModelID is empty
    when: Compress Worker initialises its ADK Runner
    then: falls back to profile.ModelID and emits a warning log with message containing "compress_model_id not set, falling back to primary model"

  - given: an unknown strategy name is provided at initialisation
    when: the strategy registry resolves the name
    then: returns an error whose message lists all registered strategy names (e.g. "unknown strategy: foo; available: generational")

  - given: the Compress Worker's LLM call fails (e.g. network error)
    when: Generational.Compress returns
    then: returns a non-nil error and a nil *CompressResult (caller is responsible for handling gracefully)

architecture:
  component: internal/memory
  layer: Domain Layer
  pattern: Strategy
  notes: |
    CompressStrategy is a Go interface; Generational is the MVP-only implementation.
    Compress Worker uses an isolated ADK Runner + LLMAgent to avoid compress-causes-OOM.
    Strategy registry maps name → factory so unknown names produce a clear error listing
    all registered strategies.
    Summarization prompt template is a configurable string field on GenerationalConfig,
    with a safe built-in default. Template receives candidate turns and existing summary
    as named placeholders.
