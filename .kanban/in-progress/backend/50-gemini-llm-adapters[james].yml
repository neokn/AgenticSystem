id: 50-gemini-llm-adapters
title: Implement Gemini LLM Adapters (Planner, Evaluator, Responder)
assignee: james
labels:
  - backend
  - core-logic
  - infra
priority: high
story: |
  As the Orchestrator, I need concrete Gemini-backed implementations of the
  Planner, Evaluator, and Responder interfaces so the 4-phase loop can call
  real LLM API endpoints.

acceptance-criteria:
  - GeminiPlanner implements orchestrator.Planner — calls Gemini with PlanSchema and parses JSON into *domain.PlanOutput
  - GeminiEvaluator implements orchestrator.Evaluator — calls Gemini with EvalSchema and parses JSON into *domain.EvalOutput
  - GeminiResponder implements orchestrator.Responder — calls Gemini free-form and returns the text string
  - System prompt template variables AVAILABLE_TOOLS and AVAILABLE_ROLES are replaced before each call
  - Results map is formatted as key=value pairs in user content for Evaluate and Respond
  - All adapters live in internal/infra/llm/
  - Tests cover buildPlanSystemInstruction, parsePlanOutput, parseEvalOutput, formatResults
  - go vet passes

architecture:
  - All adapters depend on *genai.Client (injected)
  - Uses client.Models.GenerateContent(ctx, model, contents, config)
  - SystemInstruction set via GenerateContentConfig.SystemInstruction
  - ResponseSchema set for Plan and Eval; free-form for Respond
  - Response extracted via response.Text()
  - No I/O in domain — adapters are infra layer only

