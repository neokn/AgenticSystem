    at: 2026-03-22T14:00:00+08:00
    text: |
      architecture review:

      Component: memory — sole bounded context for the MVP per spec decision.
      Go's internal/ rule enforces the boundary at the module level without additional
      tooling.

      Layer assignment: Infrastructure (this card), with cmd/agent/main.go as the
      Driving Adapter entry point. internal/memory/ will co-locate Application +
      Domain layers — proportionate for MVP scale, consistent with spec's
      "internal-first, single package" decision.

      Pattern: none. This card is pure scaffolding. Design patterns (Strategy for
      CompressStrategy, possible Factory Method for ModelProfile loading) will be
      evaluated on S0-S4 cards where actual behaviour is defined.

      Key conventions locked in:
      - Module path github.com/neokn/agenticsystem is immutable once go.sum lands.
      - Config injected via constructors — no global state, no init() side effects.
      - (value, error) return convention; sentinel errors for branching (ErrOOM etc).
      - ADK coupling stays in cmd/; internal/memory/ testable without a full runner.

      No card split — single component, single work stream, < 2h.
      No ADR produced — project structure is already captured in the spec and the
      decision is not independently reversible at this stage.
