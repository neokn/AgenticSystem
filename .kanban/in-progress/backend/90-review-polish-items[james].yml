description: |
  Consolidates all non-blocking should-fix and nit items from Jobs' code reviews
  on cards 10-70. Items are organized into five ~1-hour chunks for a developer
  to work through sequentially. Each chunk is independently committable.

  --- ITEMS VERIFIED AS ALREADY FIXED ---
  - Card 10 main.go TODO for ADR-0003: the runDemo function comment already
    documents the architecture steps and references ADR-0003 by name. Dropped.

  --- ITEMS DROPPED (design decisions, not bugs) ---
  - Card 70 main.go:98 %f vs %g: %f is intentional — the acceptance criteria
    spec explicitly states "6-decimal float" for usage_ratio_curve. Dropped.
  - Card 70 main.go:303 compress_cost_usd comment: documents known MVP scope
    limitation, not a TODO that blocks anything. Dropped.
  - Card 30 DefaultLayoutConfig runtime.Caller fragility: go:embed would require
    embedding configs/ into the binary. This is an architectural trade-off for
    Jensen to evaluate; flagged below but not blocking development work.
  - Card 50 AC8 log message wording: no corresponding test assertion found;
    cannot verify without running full integration suite. Dropped from this card.

  --- CHUNK A (~30 min): go.mod direct dependency fix ---
  Card 10: google.golang.org/genai is used directly in compress.go and main.go
  but is listed as "// indirect" in go.mod. Run `go get google.golang.org/genai`
  then `go mod tidy` to promote it to a direct dependency.

  --- CHUNK B (~45 min): profile.go + profile_test.go cleanup ---
  Card 20, four fixes:
  1. profile.go line 34: gofmt double-space before float64 — run gofmt.
  2. profile_test.go line 340: "_ = p.CompressModelID" — replace with a real
     assertion (e.g., assert CompressModelID == "" for a profile that has no
     compress model set, confirming the zero value is returned correctly).
  3. Three tests (GeminiFlashLite, Gemini25Pro, Gemini25Flash) lack // Arrange
     // Act // Assert markers — add them.
  4. "reg, _" ignores NewRegistry error in multiple test functions — add at
     least t.Fatalf for the main test sites; document rationale for any that
     are intentionally ignored (e.g., setup helpers where error is impossible).

  --- CHUNK C (~30 min): layout.go guard + test removal ---
  Card 30, three fixes:
  1. layout.go: when otherTotal==0 after initial floor calculation, NewLayout
     currently does nothing (the if block is skipped). Return an explicit error:
     this situation means the profile's ContextWindowTokens is so small that all
     three non-buffer segments floor to zero, which is an invalid state.
  2. layout_test.go: remove TestLayoutConfig_should_hold_per_segment_ratios —
     it only proves Go struct literals work, not application behavior.
  3. layout.go line 111: expand the "floor+remainder" comment to explain that
     deductActive = deficit - deductPinned - deductSummary ensures the total
     deduction equals deficit exactly (no rounding loss).

  --- CHUNK D (~60 min): compress.go fixes ---
  Card 50, four fixes:
  1. Generational.Compress: add nil-worker guard at the top — return error
     "compress: worker is nil" before attempting g.worker.Summarize.
  2. compress_test.go ratio test: rewrite to call g.Compress with a mock worker
     that returns a known CandidatesTokenCount; assert result.ActualCompressionRatio
     equals float64(candidatesTokenCount)/float64(originalTokens).
  3. buildPrompt: change "_ = tmpl.Execute(&buf, ...)" to capture the error and
     emit slog.Warn then fall through to return buf.String() (partial output is
     still better than empty; or fall back to plain-text builder).
  4. SelectCandidates comment: correct "Copies the slice header — does not copy
     underlying array" to accurately describe make+copy behavior.

  --- CHUNK E (~30 min): main.go wording + stale comment ---
  Card 70, three fixes:
  1. Dual genai.Client: either pass genaiClient to gemini.NewModel (if the ADK
     API supports it) or add a comment explaining why two clients are needed.
     Check the google.golang.org/adk/model/gemini API for a constructor that
     accepts an existing *genai.Client.
  2. OOM wording: align line 274 ("context window exhausted, please start a new
     conversation") with line 285 ("Context window exhausted. Please start a new
     conversation.") — pick one style and apply consistently.
  3. main_test.go line 191: update comment to "Assembles MemoryLayout using
     real memory types without a genai.Client — no API key required."

  --- ARCHITECTURE NOTE (for Jensen) ---
  Card 30 DefaultLayoutConfig uses runtime.Caller(0) to find configs/default.json
  relative to the source file. This breaks if the binary is compiled and run from
  a directory without the source tree present. Consider go:embed as a follow-up
  architectural decision (new card if Jensen decides to address it).

