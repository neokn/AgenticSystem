acceptance:
  # --- Chunk A: go.mod genai direct dependency (Card 10) ---
  - given: google.golang.org/genai is imported directly in compress.go and main.go
    when: go.mod is corrected
    then: go mod tidy leaves genai listed as a direct dependency (no "// indirect" marker)

  # --- Chunk B: profile.go + profile_test.go cleanup (Card 20) ---
  - given: profile.go line 34 has a double-space gofmt violation before float64
    when: gofmt is applied
    then: go vet and gofmt -l report zero formatting errors on profile.go

  - given: profile_test.go line 340 uses "_ = p.CompressModelID" with no assertion
    when: the dead assignment is replaced with a real assertion
    then: the test verifies CompressModelID is a string (non-nil type check via comparison to "")

  - given: TestGetProfile_ReturnsBuiltin_GeminiFlashLite, Gemini25Pro, Gemini25Flash lack AAA markers
    when: "// Arrange", "// Act", "// Assert" comments are added
    then: all three tests follow the same AAA structure as surrounding tests

  - given: NewRegistry calls in profile_test.go use "reg, _" ignoring the error
    when: error handling is added
    then: at minimum one of the call sites uses t.Fatalf on the ignored error; remaining sites are audited and documented with inline rationale if intentionally ignored

  # --- Chunk C: layout.go defensive guard + test removal (Card 30) ---
  - given: NewLayout reaches the otherTotal==0 branch (all three non-buffer segments happen to be zero) with no explicit error
    when: an explicit error is returned for otherTotal==0
    then: NewLayout returns a non-nil error with a message containing "otherTotal" or "non-buffer segments" when pinned+summary+active==0 after initial floor calculation

  - given: TestLayoutConfig_should_hold_per_segment_ratios tests that Go struct literal assignment works
    when: the test is removed
    then: go test ./internal/memory/... passes and test count decreases by one; the removed test covered no application behaviour

  - given: layout.go line 111 has the comment "floor+remainder" on the deductActive assignment
    when: the comment is expanded
    then: the comment explains that deductActive absorbs the rounding remainder so that (deductPinned + deductSummary + deductActive) == deficit exactly

  # --- Chunk D: compress.go fixes (Card 50) ---
  - given: NewStrategyRegistry creates a Generational with a nil worker; calling Compress on it will panic
    when: a nil-worker guard is added to Generational.Compress
    then: calling Compress with a nil worker returns a non-nil error containing "worker is nil" instead of panicking; go test -race ./... passes

  - given: compress_test.go TestCompressResult_should_calculate_ratio_correctly computes the ratio itself and never calls Compress
    when: the test is rewritten to call g.Compress via a mock worker
    then: the test asserts that result.ActualCompressionRatio equals candidateTokens/originalTokens using values returned from a real Compress call

  - given: compress.go buildPrompt calls tmpl.Execute with "_ =" silently discarding the error
    when: the error is handled
    then: a slog.Warn is emitted with the execute error and the fallback plain-text path is taken; go test -race ./... passes

  - given: compress.go SelectCandidates comment says "Copies the slice header — does not copy underlying array" but make+copy copies elements
    when: the comment is corrected
    then: the comment accurately states that a new backing array is allocated and elements are copied, so mutations to the returned slice do not affect activeTurns

  # --- Chunk E: main.go wording + stale comment (Card 70) ---
  - given: main.go creates a genai.Client (genaiClient) at line 141 and then creates a second implicit client inside gemini.NewModel at line 185 using a separate ClientConfig
    when: the dual-client pattern is documented or consolidated
    then: either a single genai.Client is reused for both the compress worker and the ADK Gemini model, OR a clear comment explains why two clients are intentional (e.g., ADK model requires its own client lifecycle)

  - given: OOM warning at line 274 prints "context window exhausted, please start a new conversation" (lower-case) while line 285 prints "[OOM] Context window exhausted. Please start a new conversation." (sentence-case)
    when: the wording is aligned
    then: both messages use the same casing and punctuation style; go test ./cmd/agent/... passes

  - given: main_test.go line 191 comment says "Uses stubs instead of real genai.Client (no API key needed)" but the test uses concrete memory types, not stubs
    when: the comment is corrected
    then: the comment accurately describes what the test does (e.g., "Assembles real memory types without a genai.Client")

